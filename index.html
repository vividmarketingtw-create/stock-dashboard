        ${condRow(macdBuy, false,
          `MACD 底部轉折：柱 ${F.num(cHist,2)}`,
          macdFlipBuy?'✅ 柱狀圖由負翻正，底部動能確認':macdBuildBuy?'✅ 零線下方柱狀圖連2日放大，蓄積中':'柱狀圖需在零線以下翻正或連2日放大')}
        ${condRow(volDivBuy, false,
          `量能 / K線型態 / 背離`,
          hasBullDiv?`✅ ${divRSI?.type==='bull'?'RSI':'MACD'}多頭背離（最強信號 +1.2分）`:bullEngulf?'✅ 多頭吞噬（今日大陽吃掉昨日大陰，+0.8分）':volClimaxBuy?'✅ 恐慌爆量（量 > 3×MA，恐慌枯竭見底 +0.7分）':hammerBuy?'✅ 槌子線（下影 > 2倍實體）':consec2Low?'✅ 連2日縮量下跌（賣壓枯竭）':'需：背離/吞噬/爆量/槌子線/縮量')}
        <!-- MFI 第7條件 -->
        ${condRow(mfiBuy, mfiEarly,
          `MFI 資金流量：${F.num(cMFI,1)}`,
          mfiBuy?'✅ MFI < 20，機構資金大量撤出（資金超賣底部）':mfiEarly?'⚠️ MFI < 30，資金流出放緩（早期警示）':'目標 MFI < 20（結合量與價的超賣信號）')}
        <!-- OBV 加分項 -->
        ${condRow(obvBull, false,
          `OBV 能量潮：${obvBull?'高於':'低於'} 20日均線`,
          obvBull?'✅ OBV > 均線 (+0.5分)，量能多頭確認':'OBV < 均線，量能偏空')}
        ${hasBullDiv?`<div style="background:rgba(16,185,129,.18);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:0.75rem;color:var(--green);font-weight:700">
          🌟 背離加分 +1.5：${divRSI?.type==='bull'?'RSI多頭背離 ':''}${divMACD?.type==='bull'?'MACD多頭背離':''}
        </div>`:''}
        ${cATR?`<div style="background:rgba(16,185,129,.08);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:0.75rem;color:var(--t2)">
          🛡️ 停損：<b style="color:var(--red)">${atrStopBuy} 元</b>（-1.5×ATR）&nbsp;｜&nbsp;
          🎯 目標：<b style="color:var(--green)">${atrTargetBuy} 元</b>（+2.5×ATR）
        </div>`:''}
        ${stageTable(buyW, true)}
      </div>

      <!-- 逢高賣出欄 -->
      <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.28);border-radius:12px;padding:16px">
        <div style="font-size:0.9rem;font-weight:800;color:var(--red);margin-bottom:12px">
          📤 賣出條件（${sellCnt}/7 達標 · 加權 ${sellW}/10）
        </div>
        ${condRow(rsiSell, rsiEarlyS,
          `RSI 過熱：${F.num(cRSI,1)}`,
          rsiSell?'✅ RSI > 70，嚴重過熱':rsiEarlyS?'⚠️ RSI > 62，接近過熱（早期警示）':'目標 RSI > 70')}
        ${condRow(kdSell, kdEarlyS,
          `KD 超買死亡叉：K=${F.num(cK,1)} D=${F.num(cD,1)}`,
          kdSell?'✅ K > 70 且 K < D，頂部死亡交叉':kdEarlyS?'⚠️ K > 60 且 K < D，動能轉空中':'目標 K > 70 且 K 下穿 D')}
        ${condRow(psySell, psyEarlyS,
          `PSY 心理線：${F.num(cPSY,1)}%`,
          psySell?'✅ PSY > 75，市場過度樂觀':psyEarlyS?'⚠️ PSY > 65，情緒偏熱（早期警示）':'目標 PSY > 75')}
        ${condRow(bollSell, bollEarlyS,
          `布林上軌：位置 ${(bollPosRaw*100).toFixed(0)}%`,
          bollSell?'✅ 布林位置 > 85%，貼近強力壓力區':bollEarlyS?'⚠️ 布林位置 > 75%（早期警示）':'目標布林位置 > 85%')}
        ${condRow(macdSell, macdDecayEarlyS,
          `MACD 頂部轉折：柱 ${F.num(cHist,2)}`,
          macdFlipSell?'✅ 柱狀圖由正翻負，頂部動能衰竭':macdDecaySell?'✅ 零線上方柱狀圖連2日縮小':macdDecayEarlyS?'⚠️ MACD柱連2日縮減（頂部蓄積，早期警示）':'柱狀圖需在零線以上轉負或連2日縮小')}
        ${condRow(volDivSell, false,
          `量能 / K線型態 / 背離`,
          hasBearDiv?`✅ ${divRSI?.type==='bear'?'RSI':'MACD'}空頭背離（最強信號 +1.2分）`:bearEngulf?'✅ 空頭吞噬（今日大陰吃掉昨日大陽，+0.8分）':volClimaxSell?'✅ 吹頂爆量（量 > 3×MA，主力拉高出貨 +0.7分）':shootingStar?'✅ 射擊之星（上影 > 2倍實體）':consec2High?'✅ 連2日高量下跌（主動賣壓持續）':'需：背離/吞噬/爆量/射擊之星/高量下跌')}
        <!-- MFI 第7條件 -->
        ${condRow(mfiSell, mfiEarlyS,
          `MFI 資金流量：${F.num(cMFI,1)}`,
          mfiSell?'✅ MFI > 80，機構資金大量湧入（資金超買頂部）':mfiEarlyS?'⚠️ MFI > 70，資金流入放緩（早期警示）':'目標 MFI > 80（結合量與價的超買信號）')}
        ${condRow(obvBear, false,
          `OBV 能量潮：${obvBear?'低於':'高於'} 20日均線`,
          obvBear?'✅ OBV < 均線 (+0.5分)，量能空頭確認':'OBV > 均線，量能偏多')}
        ${hasBearDiv?`<div style="background:rgba(239,68,68,.18);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:0.75rem;color:var(--red);font-weight:700">
          🌟 背離加分 +1.5：${divRSI?.type==='bear'?'RSI空頭背離 ':''}${divMACD?.type==='bear'?'MACD空頭背離':''}
        </div>`:''}
        ${cATR?`<div style="background:rgba(239,68,68,.08);border-radius:8px;padding:8px 12px;margin-top:8px;font-size:0.75rem;color:var(--t2)">
          🛡️ 停損（空單）：<b style="color:var(--red)">${atrStopSell} 元</b>（+1.5×ATR）&nbsp;｜&nbsp;
          🎯 目標：<b style="color:var(--green)">${atrTargetSell} 元</b>（-2.5×ATR）
        </div>`:''}
        ${stageTable(sellW, false)}
      </div>
    </div>

    <!-- 52週高低位置 -->
    ${w52Bar}

    <!-- 布林通道視覺化 -->
    <div style="background:var(--card2);border-radius:12px;padding:16px;margin-bottom:12px">
      <div style="font-size:0.75rem;color:var(--t2);margin-bottom:8px;font-weight:700">
        📍 布林通道位置（深綠區＝強力買進 ／ 深紅區＝強力賣出 ／ 虛線為各 1/3 分界）
      </div>
      ${bollBar}
    </div>

    <!-- Pivot Point 關卡 -->
    ${pivotHtml}

    <!-- 費波那契支撐壓力 -->
    ${fibHtml}

  </div>`;
}


function renderEntryPanel(ctx){
  const { ES, AM, sm, dirRatio, volK, volMAK, cVol, cVolMA, chg, ES_pct } = ctx;
  const scoreColor = ES.total >= 78 ? 'var(--green)' : ES.total >= 58 ? 'var(--green2)'
                  : ES.total >= 38 ? 'var(--yellow)' : 'var(--t2)';
  const bollPct = ctx.bollPct;
  const cBoll = ctx.cBoll, last = ctx.last;
  return `
  <div class="sec">🎯 進出場時機評分 <span class="sec-cnt">綜合量能、位置、布林帶給出 0-100 分的進場評估，分數越高越適合進場</span></div>
  <div class="entry-panel">
    <div class="entry-top">
      <div class="entry-score-ring">
        ${SVG.ring(ES.total)}
        <div class="score-num">
          <div class="big" style="color:${scoreColor}">${ES.total}</div>
          <div class="sm">/ 100</div>
        </div>
      </div>
      <div class="entry-action">
        <div class="action-label" style="color:${AM.color}">${AM.label}</div>
        <div class="action-sub">${AM.sub}</div>
        <div class="action-tag" style="background:${AM.tagBg};color:${AM.color}">
          整體方向：${sm.label} ｜ 進出點評分：${ES.total >= 78 ? '強烈' : ES.total >= 58 ? '適中' : ES.total >= 38 ? '觀察中' : '尚未到位'}
        </div>
        <div class="entry-pct">📍 此分數在過去一年的百分位：第 ${ES_pct ?? '--'}%（越高越罕見）</div>
      </div>
    </div>
    <div class="pillars">
      <div class="pillar">
        <div class="p-label">層一　技術指標共振強度</div>
        <div class="p-val" style="color:${ES.layer1>=28?'var(--green)':ES.layer1>=18?'var(--yellow)':'var(--red)'}">${ES.layer1} <span style="font-size:0.75rem;color:var(--t2)">/ 40</span></div>
        ${SVG.pillarBar(ES.layer1, 40, ES.layer1>=28?'#10b981':ES.layer1>=18?'#f59e0b':'#ef4444')}
        <div class="p-detail">
          指標同向率：${(Math.abs(dirRatio)*100).toFixed(0)}%
          PSY：${(ES.psyExtreme*100).toFixed(0)}%
          KD：${(ES.kdExtreme*100).toFixed(0)}%
          RSI：${(ES.rsiExtreme*100).toFixed(0)}%
        </div>
      </div>
      <div class="pillar">
        <div class="p-label">層二　量能配合度</div>
        <div class="p-val" style="color:${ES.layer2>=24?'var(--green)':ES.layer2>=14?'var(--yellow)':'var(--red)'}">${ES.layer2} <span style="font-size:0.75rem;color:var(--t2)">/ 35</span></div>
        ${SVG.pillarBar(ES.layer2, 35, ES.layer2>=24?'#10b981':ES.layer2>=14?'#f59e0b':'#ef4444')}
        <div class="p-detail">
          量能倍率：${ES.volRatio.toFixed(2)}x（20日均量）<br>
          今 ${volK}張 ｜ 均 ${volMAK}張
          ${chg>0&&cVol>cVolMA?'✅ 量增價漲':chg<0&&cVol>cVolMA?'❌ 量增價跌':chg>0&&cVol<cVolMA?'⚠️ 量縮上漲':'⚪ 量縮整理'}
        </div>
      </div>
      <div class="pillar">
        <div class="p-label">層三　價格位置適合度</div>
        <div class="p-val" style="color:${ES.layer3>=17?'var(--green)':ES.layer3>=10?'var(--yellow)':'var(--red)'}">${ES.layer3} <span style="font-size:0.75rem;color:var(--t2)">/ 25</span></div>
        ${SVG.pillarBar(ES.layer3, 25, ES.layer3>=17?'#10b981':ES.layer3>=10?'#f59e0b':'#ef4444')}
        <div class="p-detail">
          距 MA20：${ES.distPct>=0?'+':''}${ES.distPct.toFixed(1)}%
          ${Math.abs(ES.distPct)<=5?'✅ 適中':Math.abs(ES.distPct)<=10?'⚠️ 偏離':'❌ 過遠'}<br>
          布林位置：${bollPct}%
          ${cBoll?(((last-cBoll.lower)/(cBoll.upper-cBoll.lower))<0.2?'✅ 近下軌':((last-cBoll.lower)/(cBoll.upper-cBoll.lower))>0.8?'❌ 近上軌':'⚪ 中間區'):'-'}
        </div>
      </div>
    </div>
  </div>`;
}

function renderAnalysis(ctx){
  const { last, prev, chg, chgP, lastDate,
          cMA5, cMA10, cMA20, cMA60, cMA120, cMA240,
          cK, cD, pK, pD, cRSI, cPSY,
          cDIF, cDEA, cHist, pHist,
          cBoll, cVol, cVolMA, cATR,
          dirResult, sm, ES, AM, divRSI, divMACD, sr, foreign } = ctx;
  const G = t => `<span class="hl-g">${t}</span>`;
  const R = t => `<span class="hl-r">${t}</span>`;
  const Y = t => `<span class="hl-y">${t}</span>`;
  const B = t => `<span class="hl-b">${t}</span>`;
  const H = t => `<span class="hl">${t}</span>`;
  const f2 = (n, d=1) => n==null||isNaN(n) ? '--' : n.toFixed(d);

  // ── 1. 今日概況 ──
  const priceDir = chg >= 0;
  const chgAbs = Math.abs(chg).toFixed(0);
  const chgPAbs = Math.abs(chgP).toFixed(2);
  let sec1 = `台積電今天收在 ${H(f2(last,0)+'元')}，`;
  if(Math.abs(chgP) < 0.5){
    sec1 += `幾乎平盤，漲跌幅僅 ${Y(chgPAbs+'%')}，市場上多空雙方都在觀望。`;
  }else if(priceDir){
    sec1 += `上漲 ${G(chgAbs+'元（+'+chgPAbs+'%）')}。`;
    if(chgP > 3) sec1 += `這是相當強勁的漲幅，買盤力道強。`;
    else if(chgP > 1.5) sec1 += `漲幅還不錯。`;
    else sec1 += `漲幅溫和。`;
  }else{
    sec1 += `下跌 ${R(chgAbs+'元（-'+chgPAbs+'%）')}。`;
    if(chgP < -3) sec1 += `跌幅明顯，需留意基本面消息。`;
    else if(chgP < -1.5) sec1 += `跌幅不算小。`;
    else sec1 += `屬於正常技術性修正。`;
  }

  // ── 2. 均線 ──
  let sec2 = '';
  const aboveMA5 = cMA5 && last > cMA5;
  const aboveMA20 = cMA20 && last > cMA20;
  const aboveMA60 = cMA60 && last > cMA60;
  const distMA20 = cMA20 ? ((last-cMA20)/cMA20*100) : 0;
  if(aboveMA5 && aboveMA20 && aboveMA60){
    sec2 = `股價站在 ${G('所有主要均線之上')}（MA5 ${f2(cMA5,0)} / MA20 ${f2(cMA20,0)} / MA60 ${f2(cMA60,0)}），多頭結構完整。`;
    if(distMA20 > 10) sec2 += ` 但距 MA20 已 ${Y(distMA20.toFixed(1)+'%')}，短線偏高，追高要小心。`;
    else if(distMA20 <= 3) sec2 += ` 距 MA20 ${G(distMA20.toFixed(1)+'%')}，位置適中。`;
    else sec2 += ` 距 MA20 ${H(distMA20.toFixed(1)+'%')}，尚可接受。`;
  }else if(!aboveMA20 && !aboveMA60){
    sec2 = `股價跌到 ${R('均線下方')}，MA20 (${f2(cMA20,0)}) 與 MA60 (${f2(cMA60,0)}) 同時形成壓力，反彈遇阻機率高。`;
  }else{
    sec2 = `股價處於 ${Y('均線糾結區')}，MA20 ${f2(cMA20,0)} 元、MA60 ${f2(cMA60,0)} 元，方向尚未明朗，可多觀察一兩天。`;
  }

  // ── 3. 情緒 ──
  let psyW='', kdW='', rsiW='';
  if(cPSY > 75) psyW = `${R('過熱（'+f2(cPSY,1)+'）')}`;
  else if(cPSY > 50) psyW = `${H(f2(cPSY,1)+'，偏多')}`;
  else if(cPSY >= 25) psyW = `${Y(f2(cPSY,1)+'，中性')}`;
  else psyW = `${G('超賣（'+f2(cPSY,1)+'）')}`;
  if(cK > 80) kdW = `K=${f2(cK,1)} ${R('超買')}`;
  else if(cK < 20) kdW = `K=${f2(cK,1)} ${G('超賣')}`;
  else if(cK > cD) kdW = `K=${f2(cK,1)} > D=${f2(cD,1)} ${H('多方稍佔優')}`;
  else kdW = `K=${f2(cK,1)} < D=${f2(cD,1)} ${Y('空方稍佔優')}`;
  const cross = (pK<=pD&&cK>cD) ? G('（剛黃金交叉✨）') : (pK>=pD&&cK<cD) ? R('（剛死亡交叉⚠）') : '';
  if(cRSI > 70) rsiW = `RSI=${f2(cRSI,1)} ${R('過熱')}`;
  else if(cRSI < 30) rsiW = `RSI=${f2(cRSI,1)} ${G('超賣')}`;
  else rsiW = `RSI=${f2(cRSI,1)} ${cRSI>=50?H('偏多'):Y('偏空')}`;
  let sec3 = `PSY ${psyW}；${kdW} ${cross}；${rsiW}。`;

  // ── 4. 量能 ──
  const volRatio = cVolMA > 0 ? cVol/cVolMA : 1;
  const volK = (cVol/1000).toFixed(0), volMAK = (cVolMA/1000).toFixed(0);
  const volHL = volRatio>=1.5?'明顯高於':volRatio>=1.1?'略高於':volRatio>=0.9?'接近':volRatio>=0.7?'略低於':'明顯低於';
  let sec4 = `今日成交 ${H(volK+'張')}，${volHL} 20日均量（${volMAK}張），倍率 ${H(volRatio.toFixed(2)+'x')}。`;
  if(priceDir && volRatio > 1.1) sec4 += ` ${G('量增價漲是最健康的組合')}。`;
  else if(priceDir && volRatio < 0.9) sec4 += ` 量縮上漲，需留意後續是否有量能跟上。`;
  else if(!priceDir && volRatio > 1.1) sec4 += ` ${R('量增價跌是危險訊號')}，賣壓較重。`;
  else if(!priceDir && volRatio < 0.9) sec4 += ` 量縮下跌算正常休息。`;
  else sec4 += ` 量能表現中性。`;

  // ── 5. MACD ──
  const macdBull = cDIF > cDEA;
  const histGrowing = cHist > pHist;
  const histFlip = (pHist<0&&cHist>0) || (pHist>0&&cHist<0);
  let sec5 = `DIF=${f2(cDIF,1)} ${macdBull?G('>'):R('<')} DEA=${f2(cDEA,1)}，趨勢${macdBull?'偏多':'偏空'}。`;
  if(histFlip){
    sec5 += cHist>0 ? ` ${G('柱狀圖剛由負翻正')}，動能轉折強勁。` : ` ${R('柱狀圖剛由正翻負')}，要防守。`;
  }else if(histGrowing && cHist>0) sec5 += ` 紅柱擴大（${f2(pHist,1)}→${f2(cHist,1)}），${G('多頭加速')}。`;
  else if(!histGrowing && cHist>0) sec5 += ` 紅柱縮短（${f2(pHist,1)}→${f2(cHist,1)}），${Y('多頭減速')}。`;
  else if(!histGrowing && cHist<0) sec5 += ` 綠柱加長（${f2(pHist,1)}→${f2(cHist,1)}），${R('空頭增強')}。`;
  else sec5 += ` 綠柱縮短（${f2(pHist,1)}→${f2(cHist,1)}），空頭減弱。`;

  // ── 6. 布林 + 支撐壓力 ──
  let sec6 = '';
  if(cBoll){
    const bp = (last-cBoll.lower)/(cBoll.upper-cBoll.lower);
    const bw = ((cBoll.upper-cBoll.lower)/cBoll.mid*100).toFixed(1);
    const posW = bp>0.85 ? `${R('近上軌（'+f2(cBoll.upper,0)+'）短線壓力大')}`
              : bp>0.6 ? `${H('中上軌之間')}`
              : bp>0.4 ? `${G('中軌附近（'+f2(cBoll.mid,0)+'）')}`
              : bp>0.15 ? `${H('中下軌之間')}`
              : `${G('近下軌（'+f2(cBoll.lower,0)+'）支撐強')}`;
    sec6 = `布林位置：${posW}。帶寬 ${H(bw+'%')}。`;
    if(parseFloat(bw) < 5) sec6 += ` ${Y('帶寬偏窄，可能即將啟動大行情。')}`;
  }
  if(sr){
    sec6 += ` 近期支撐 ${G(F.int(sr.support)+'元')}（距今 ${sr.supportPct.toFixed(1)}%），壓力 ${R(F.int(sr.resistance)+'元')}（距今 ${sr.resistancePct.toFixed(1)}%）。`;
  }

  // ── 7. 背離 ──
  let sec7 = '';
  if(divRSI || divMACD){
    sec7 = '⚠️ 偵測到背離訊號：';
    if(divRSI) sec7 += divRSI.type === 'bull'
      ? ` ${G('RSI 多頭背離')}（價創低但 RSI 上抬）— 跌勢可能衰竭。`
      : ` ${R('RSI 空頭背離')}（價創高但 RSI 走弱）— 漲勢動能不足。`;
    if(divMACD) sec7 += divMACD.type === 'bull'
      ? ` ${G('MACD 多頭背離')}— 中期反轉訊號。`
      : ` ${R('MACD 空頭背離')}— 警示拉回風險。`;
  }else{
    sec7 = `RSI 與 MACD 目前均無明顯背離訊號，趨勢結構正常。`;
  }

  // ── 8. 外資 ──
  let sec8 = '';
  if(foreign && !isNaN(foreign.foreignNet)){
    const fn = foreign.foreignNet;
    const fnK = Math.abs(fn / 1000).toFixed(0);
    if(fn > 0) sec8 = `外資今日 ${G('買超 '+fnK+' 張')}，籌碼面偏正向。`;
    else if(fn < 0) sec8 = `外資今日 ${R('賣超 '+fnK+' 張')}，需留意是否進入連續調節。`;
    else sec8 = `外資今日買賣超持平。`;
    if(!isNaN(foreign.trustNet)){
      const tn = foreign.trustNet;
      const tnK = Math.abs(tn / 1000).toFixed(0);
      sec8 += tn > 0 ? ` 投信亦${G('買超 '+tnK+' 張')}` : tn < 0 ? ` 投信${R('賣超 '+tnK+' 張')}` : '';
    }
  }

  // ── 結論 ──
  const r = dirResult.ratio;
  const dirWord = r > 0.55 ? '強多頭' : r > 0.20 ? '小幅偏多'
                : r > -0.20 ? '多空均衡' : r > -0.55 ? '小幅偏空' : '強空頭';
  const actW = ES.total >= 78 ? (r>0?'是積極布局的好時機。':'是退場/減碼的好時機。')
             : ES.total >= 58 ? (r>0?'可分批進場，設好停損。':'可分批減碼。')
             : ES.total >= 38 ? '尚不是最佳操作時機，建議再等。'
             : '不適合倉促進場/出場。';
  const summary = `綜合 ${H(dirResult.bullN)} 多 / ${H(dirResult.bearN)} 空 / ${dirResult.neutN} 中性，加權方向 ${H(dirWord)}（${(r*100).toFixed(0)}%），進出場評分 ${H(ES.total+' 分')}。${actW}`;

  const sect = (icon, title, headColor, body) => `
    <div class="ac-section">
      <div class="ac-head" style="color:${headColor}"><span class="ac-icon">${icon}</span>${title}</div>
      <div class="ac-body">${body}</div>
    </div><hr class="ac-divider">`;

  return `
  <div class="sec">📝 今日完整盤後解析 <span class="sec-cnt">用白話文說明今日各項指標的意義，新手必讀，快速掌握盤後重點</span></div>
  <div class="analysis-card">
    <div class="ac-title">
      AI 自動生成解析
      <span class="badge">${lastDate}</span>
    </div>
    ${sect('📍','今日收盤概況', chg>=0?'#10b981':'#ef4444', sec1)}
    ${sect('📐','均線位置',
       (cMA5&&cMA20&&cMA60&&last>cMA5&&last>cMA20&&last>cMA60)?'#10b981'
       :(cMA20&&last<cMA20)?'#ef4444':'#f59e0b', sec2)}
    ${sect('🌡️','市場情緒（PSY/KD/RSI）',
       cPSY>75||cK>80||cRSI>70?'#ef4444':cPSY<25||cK<20||cRSI<30?'#10b981':'#f59e0b', sec3)}
    ${sect('💧','成交量', priceDir&&cVol>cVolMA?'#10b981':!priceDir&&cVol>cVolMA?'#ef4444':'#94a3b8', sec4)}
    ${sect('⚡','MACD 趨勢動能', cDIF>cDEA?'#10b981':'#ef4444', sec5)}
    ${cBoll?sect('🎯','布林通道 + 支撐壓力','#8b5cf6', sec6):''}
    ${sect('🔍','背離偵測（高勝率反轉訊號）',
       divRSI||divMACD?(divRSI?.type==='bear'||divMACD?.type==='bear'?'#ef4444':'#10b981'):'#94a3b8', sec7)}
    ${foreign && !isNaN(foreign.foreignNet) ? sect('🏦','外資籌碼動向', foreign.foreignNet>0?'#10b981':foreign.foreignNet<0?'#ef4444':'#94a3b8', sec8) : ''}
    <div class="ac-summary"><strong>📊 今日總結：</strong>${summary}</div>
  </div>`;
}

function ic(cls, name, tipKey, val, valCls, sigCls, sigTxt, detail){
  const tip = tipKey && TIPS[tipKey] ? `<span class="tip" data-tip="${TIPS[tipKey]}">?</span>` : '';
  return `
    <div class="ic ${cls}">
      <div class="nm">${name}${tip}</div>
      <div class="vl ${valCls}">${val}</div>
      <span class="sg ${sigCls}">${sigTxt}</span>
      <div class="dt">${detail}</div>
    </div>`;
}

function renderIndicators(ctx){
  const { S, cPSY, cK, cD, pK, pD, cRSI, cDIF, cDEA, cHist, pHist,
          cBoll, bollPct, cVol, cVolMA, volK, volMAK,
          cOBV, cOBVMA, cATR, cATRMean, divRSI, divMACD, sr, foreign, last } = ctx;
  const cls = sigKey => sc(S[sigKey]);
  const valC = sigKey => 'val-' + cls(sigKey);

  const bgVolDir = cVol > cVolMA
    ? (cVol/cVolMA-1)*100
    : -(1-cVol/cVolMA)*100;

  // OBV 訊號：OBV vs OBV-MA
  const obvSig = cOBV > cOBVMA ? 1 : cOBV < cOBVMA ? -1 : 0;
  // ATR 趨勢：ATR > 平均 = 波動放大
  const atrUp = cATR > cATRMean;

  const divSig = (divRSI?.type==='bull' || divMACD?.type==='bull') ? 1
              : (divRSI?.type==='bear' || divMACD?.type==='bear') ? -1 : 0;
  const divDesc = divRSI && divMACD
    ? `RSI: ${divRSI.type==='bull'?'多頭':'空頭'}背離 ／ MACD: ${divMACD.type==='bull'?'多頭':'空頭'}背離`
    : divRSI ? `RSI ${divRSI.type==='bull'?'多頭':'空頭'}背離`
    : divMACD ? `MACD ${divMACD.type==='bull'?'多頭':'空頭'}背離`
    : '無背離訊號（趨勢結構正常）';

  // 外資卡片
  let foreignCard = '';
  if(foreign && !isNaN(foreign.foreignNet)){
    const fn = foreign.foreignNet;
    const fnK = (fn / 1000).toFixed(0);
    const fSig = fn > 1000000 ? 1 : fn < -1000000 ? -1 : 0;
    foreignCard = ic(sc(fSig), '外資買賣超', 'foreign',
      `${fn>=0?'+':''}${fnK} 張`, 'val-' + sc(fSig), sc(fSig),
      fn>0?'▲ 買超':fn<0?'▼ 賣超':'— 持平',
      `日期 ${foreign.date.slice(0,4)}/${foreign.date.slice(4,6)}/${foreign.date.slice(6,8)}<br>${!isNaN(foreign.trustNet) ? `投信 ${foreign.trustNet>=0?'+':''}${(foreign.trustNet/1000).toFixed(0)} 張` : ''}`);
  }

  // 支撐壓力卡片
  let srCard = '';
  if(sr){
    const distPct = ((sr.resistance - sr.support) / sr.support * 100).toFixed(1);
    const intLine = sr.intSupport && sr.intResistance
      ? `<br>整數關 ${F.int(sr.intSupport)} ／ ${F.int(sr.intResistance)}`
      : '';
    const vcLine = sr.volClusterSup
      ? `<br>量密帶 ${F.int(sr.volClusterSup)} ／ ${sr.volClusterRes?F.int(sr.volClusterRes):'--'}`
      : '';
    srCard = ic('neut', '支撐 / 壓力', 'sr',
      `${F.int(sr.support)} ／ ${F.int(sr.resistance)}`, '',
      'neut', '🎯 多層關卡',
      `Pivot 幅度 ${distPct}%<br>支撐距現價 ${sr.supportPct.toFixed(1)}% ｜ 壓力距現價 ${sr.resistancePct.toFixed(1)}%${intLine}${vcLine}`);
  }

  // ── 計算多空共識摘要 ──
  const sigKeys = ['psy','kdCross','kdLevel','rsi','macdDir','macdMom','boll','vol','ma5','ma20','ma60','maAlign'];
  let bullN=0, bearN=0, neutN=0;
  const activeTags=[];
  sigKeys.forEach(k=>{
    const v = S[k];
    if(v>0){ bullN++; } else if(v<0){ bearN++; } else { neutN++; }
  });
  // 加入背離
  if(divSig>0){ bullN++; activeTags.push({t:'多頭背離',c:'bull'}); }
  else if(divSig<0){ bearN++; activeTags.push({t:'空頭背離',c:'bear'}); }
  // 重要訊號標籤
  if(S.kdCross===1)  activeTags.push({t:'KD 黃金交叉',c:'bull'});
  if(S.kdCross===-1) activeTags.push({t:'KD 死亡交叉',c:'bear'});
  if(cRSI>70)  activeTags.push({t:'RSI 過熱',c:'bear'});
  if(cRSI<30)  activeTags.push({t:'RSI 超賣',c:'bull'});
  if(S.macdMom>0&&S.macdDir>0)  activeTags.push({t:'MACD 雙多',c:'bull'});
  if(S.macdMom<0&&S.macdDir<0)  activeTags.push({t:'MACD 雙空',c:'bear'});
  if(S.maAlign>0)  activeTags.push({t:'均線多排',c:'bull'});
  if(S.maAlign<0)  activeTags.push({t:'均線空排',c:'bear'});
  const total2 = bullN+bearN+neutN||1;
  const bullPct2 = Math.round(bullN/total2*100);
  const bearPct2 = Math.round(bearN/total2*100);
  const summaryVerdict = bullPct2>60?'多方主導 🟢':bearPct2>60?'空方主導 🔴':bullPct2>bearPct2?'略偏多 🟡':'略偏空 🟡';
  const summaryClr = bullPct2>60?'var(--green)':bearPct2>60?'var(--red)':'var(--yellow)';
  const tagHtml = activeTags.slice(0,5).map(t=>`
    <span class="ind-sum-tag" style="
      color:${t.c==='bull'?'var(--green)':'var(--red)'};
      border-color:${t.c==='bull'?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};
      background:${t.c==='bull'?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)'}">${t.t}</span>`).join('');

  return `
  <div class="sec collapsible-hd" onclick="(function(el){const b=document.getElementById('ind-body');b.classList.toggle('col-closed');el.querySelector('.col-toggle').textContent=b.classList.contains('col-closed')?'▶ 展開':'▼ 收折'})(this)">

    <span class="col-toggle">▼ 收折</span>
  </div>
  <div id="ind-body" class="collapsible-body" style="max-height:9999px">
  <!-- 共識摘要列 -->
  <div class="ind-summary">
    <div class="ind-sum-verdict" style="color:${summaryClr}">${summaryVerdict}</div>
    <div class="ind-sum-bar-wrap">
      <div class="ind-sum-bar-track">
        <div class="ind-sum-bar-bull" style="width:${bullPct2}%"></div>
        <div class="ind-sum-bar-bear" style="width:${bearPct2}%"></div>
      </div>
      <div class="ind-sum-counts">
        <span style="color:var(--green)">多 ${bullN}</span>
        <span>中 ${neutN}</span>
        <span style="color:var(--red)">空 ${bearN}</span>
      </div>
    </div>
    <div class="ind-sum-tags">${tagHtml||'<span style="color:var(--t3);font-size:.7rem">無特殊訊號</span>'}</div>
  </div>
  <div class="ind-grid">
    ${ic(cls('psy'),'PSY 心理線（12日）','psy',F.num(cPSY,1),valC('psy'),cls('psy'),st(S.psy),
      `&gt;75 過熱 ｜ &lt;25 超賣<br>狀態：${cPSY>75?'🔴 過熱':cPSY<25?'🟢 超賣':'⚪ 正常'}`)}
    ${ic(cls('kdCross'),'KD 交叉訊號（9日）','kd',`K ${F.num(cK,1)} ／ D ${F.num(cD,1)}`,'',cls('kdCross'),
      S.kdCross===1?'▲ 黃金交叉':S.kdCross===-1?'▼ 死亡交叉':'— 無交叉',
      `前日 K${F.num(pK,1)} D${F.num(pD,1)} → 今 K${F.num(cK,1)} D${F.num(cD,1)}`)}
    ${ic(cls('kdLevel'),'KD 超買超賣','kd',`K = ${F.num(cK,1)}`,valC('kdLevel'),cls('kdLevel'),

    ${ic(cls('rsi'),'RSI 相對強弱（14日）','rsi',F.num(cRSI,1),valC('rsi'),cls('rsi'),st(S.rsi),

    ${ic(cls('macdDir'),'MACD 多空方向','macd',`DIF ${F.num(cDIF,1)}`,valC('macdDir'),cls('macdDir'),

function renderMarketRegime(ctx){
  const { adxCtx, todaySpecial } = ctx;
  if(!adxCtx || adxCtx.cADX == null) return '';
  const { cADX, cDiP, cDiM, adxRegime } = adxCtx;
  const regimeLabel = adxRegime==='trend' ? '趨勢盤 🚀' : adxRegime==='weak' ? '趨勢萌芽 📈' : '盤整盤 🔄';
  const regimeCol   = adxRegime==='trend' ? 'var(--green)' : adxRegime==='weak' ? 'var(--yellow)' : 'var(--cyan)';
  const tip = adxRegime==='trend'
    ? '趨勢明確（ADX≥25），技術指標可信度高，順勢操作效果最佳。'
    : adxRegime==='weak'
    ? '趨勢剛起步（ADX 18-25），方向可能強化也可能夭折，部位宜輕。'
    : '盤整震盪（ADX<18），技術訊號假突破頻率高，建議縮小部位或觀望。';
  const diTrend = cDiP != null && cDiM != null
    ? (cDiP > cDiM ? `<span style="color:var(--green)">DI+ ${cDiP.toFixed(1)}</span> > DI− ${cDiM.toFixed(1)}（多頭主導）`
                   : `DI+ ${cDiP.toFixed(1)} < <span style="color:var(--red)">DI− ${cDiM.toFixed(1)}</span>（空頭主導）`)

/* ── 量價背離警示燈 ── */
function renderVolPriceDivAlert(ctx){
  const { chg, cVol, cVolMA, divRSI, divMACD } = ctx;
  const volRatio = cVol / (cVolMA || 1);
  const priceUp = chg > 0;
  const volUp = cVol > (cVolMA || 0);

  let level, icon, title, detail;
  if(!priceUp && volUp){
    level='alert'; icon='🚨'; title='量增價跌';
    detail='放量下跌是最危險的賣壓訊號，避免逆勢承接，考慮減碼或出場。';
  } else if(divMACD?.type==='bear' || divRSI?.type==='bear'){
    level='warn'; icon='⚠️'; title='指標空頭背離';
    detail='價格續創高但動能指標下彎，漲勢可能衰竭，高檔要謹慎追買。';
  } else if(priceUp && !volUp){
    level='warn'; icon='⚠️'; title='價漲量縮';
    detail='上漲缺乏量能支撐，動能不足，不宜追高；等放量突破再確認。';
  } else if(divRSI?.type==='bull' || divMACD?.type==='bull'){
    level='ok'; icon='✅'; title='多頭背離（醞釀反彈）';
    detail='下跌動能衰竭訊號，可能是底部區域，小批試單機會。';
  } else if(priceUp && volUp){
    level='ok'; icon='✅'; title='量增價漲';
    detail='最健康的上漲型態，量能確認，趨勢可信度高。';
  } else {
    level='neutral'; icon='—'; title='量縮整理';
    detail='低量橫盤，等待方向選擇，宜觀望。';
  }
  const cols = { alert:'var(--red)', warn:'var(--yellow)', ok:'var(--green)', neutral:'var(--t3)' };
  const col = cols[level];
  return `
  <div style="background:var(--card2);border-left:4px solid ${col};border-radius:10px;
    padding:11px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div style="font-size:1.6rem;line-height:1">${icon}</div>
    <div style="flex:1;min-width:180px">
      <div style="font-size:0.9rem;font-weight:800;color:${col}">${title}</div>
      <div style="font-size:0.75rem;color:var(--t2);margin-top:2px">${detail}</div>
    </div>
    <div style="font-size:0.75rem;color:var(--t2);text-align:right;min-width:100px">
      量比 <span style="font-weight:700;color:${volRatio>=1.5?'var(--green)':volRatio<=0.7?'var(--red)':'var(--t1)'}">
        ${volRatio.toFixed(2)}x</span><br>
      日變動 <span style="color:${chg>=0?'var(--green)':'var(--red)'}">
        ${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(0)}</span>
    </div>
  </div>`;
}

/* ── 籌碼流向（三大法人連續） ── */
function renderChipFlow(ctx){
  const { chipStats, foreign } = ctx;
  const fk = (n) => n == null || isNaN(n) ? '--' : (n >= 0 ? '+' : '') + (n/1000).toFixed(0) + 'K張';
  const streak = (n) => {
    if(!n) return '—';
    const abs = Math.abs(n);
    return n > 0
      ? `<span style="color:var(--green)">連買 ${abs} 日 ▲</span>`
      : `<span style="color:var(--red)">連賣 ${abs} 日 ▼</span>`;
  };
  const todayF = foreign ? fk(foreign.foreignNet) : '--';
  const todayT = foreign && !isNaN(foreign.trustNet) ? fk(foreign.trustNet) : '--';
  const cum5F  = chipStats ? fk(chipStats.foreignCum5) : '--';
  const cum5T  = chipStats ? fk(chipStats.trustCum5)   : '--';
  const fColor = foreign?.foreignNet > 0 ? 'var(--green)' : foreign?.foreignNet < 0 ? 'var(--red)' : 'var(--t2)';
  const tColor = !isNaN(foreign?.trustNet) ? (foreign.trustNet > 0 ? 'var(--green)' : foreign.trustNet < 0 ? 'var(--red)' : 'var(--t2)') : 'var(--t2)';

  return `
  <div class="sec">🏦 法人籌碼流向 <span class="sec-cnt">外資（外國機構）、投信（本土基金）連續買賣超 — 連續買超代表法人看多，賣超代表看空</span></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px">
    <div class="ic">
      <div class="nm">外資 今日買賣超</div>
      <div class="vl" style="color:${fColor}">${todayF}</div>
      <div class="dt">連續方向：${chipStats ? streak(chipStats.foreignConsec) : '—'}<br>近 5 日累積：${cum5F}</div>
    </div>
    <div class="ic">
      <div class="nm">投信 今日買賣超</div>
      <div class="vl" style="color:${tColor}">${todayT}</div>
      <div class="dt">連續方向：${chipStats ? streak(chipStats.trustConsec) : '—'}<br>近 5 日累積：${cum5T}</div>
    </div>
    <div class="ic">
      <div class="nm">法人合力判斷</div>
      <div class="vl" style="font-size:1rem;margin-top:6px">
        ${chipStats ? (() => {
          const fc = chipStats.foreignConsec, tc = chipStats.trustConsec;
          if(fc >= 3 && tc >= 2) return '<span style="color:var(--green)">🚀 外投信雙買，主力建倉訊號</span>';
          if(fc >= 3)            return '<span style="color:var(--green)">📈 外資持續買超，多頭籌碼穩</span>';
          if(fc <= -3 && tc <= -1) return '<span style="color:var(--red)">🚨 外投信雙賣，注意下行風險</span>';
          if(fc <= -3)           return '<span style="color:var(--red)">📉 外資連賣，籌碼鬆動</span>';
          if(tc >= 3)            return '<span style="color:var(--green2)">💼 投信強力買超</span>';
          return '<span style="color:var(--t2)">— 方向尚不明確</span>';
        })() : '<span style="color:var(--t2)">— 累積資料中</span>'}
      </div>
      <div class="dt" style="margin-top:8px;font-size:0.68rem;color:var(--t3)">
        每次重新整理後自動記錄，累積 5 日以上連續資料更可信。

}

/* ── 杜金龍功能 1：週/月 KD 共振卡片 ── */
function renderDuKDResonance(ctx){
  const { mtfResult, cK, cD, rows } = ctx;
  if(!mtfResult) return '';

  // 計算週線 KD（用 5 日聚合後的 bar 陣列）
  let wK = null, wD = null;
  try {
    if(Array.isArray(rows) && rows.length >= 30){
      const weeklyBars = MTF.resample(rows, 5).slice(-30);
      if(weeklyBars.length >= 9){
        const wH = weeklyBars.map(b => b.high);
        const wL = weeklyBars.map(b => b.low);
        const wC = weeklyBars.map(b => b.close);
        const { K: WK, D: WD } = Ind.kd(wH, wL, wC);
        const wn = weeklyBars.length;
        wK = WK[wn-1]; wD = WD[wn-1];
      }
    }
  } catch(e){ /* 防禦性處理 */ }

  // 狀態判定
  const dailyBull  = cK != null && cD != null && cK > cD;
  const weeklyBull = wK != null && wD != null && wK > wD;
  const monthlyBull = mtfResult.monthly && mtfResult.monthly.ratio > 0;

  const resonanceCount = [dailyBull, weeklyBull, monthlyBull].filter(Boolean).length;
  const resColor = resonanceCount === 3 ? 'var(--green)'
                 : resonanceCount === 2 ? 'var(--yellow)'
                 : resonanceCount === 1 ? 'var(--red2)' : 'var(--red)';
  const resLabel = resonanceCount === 3
    ? '🚀 三線 KD 共振多頭 — 杜金龍最強進場訊號！'
    : resonanceCount === 2
    ? '✨ 兩線共振 — 進場機率提升，但需等第三線確認'
    : resonanceCount === 1
    ? '⏳ 共振尚未形成 — 觀望，勿搶進'
    : '⚠️ 三線 KD 全部偏空 — 嚴禁進場，先行觀望';

  const kdCard = (label, k, d, isBull) => {
    if(k == null) return `
    <div class="du-kd-card">
      <div class="du-kd-label">${label}</div>
      <div class="du-kd-cross" style="color:var(--t3)">資料不足</div>
      <div class="du-kd-vals">— / —</div>
    </div>`;
    const col  = isBull ? 'var(--green)' : 'var(--red)';
    const word = isBull ? '🟢 黃金交叉（偏多）' : '🔴 死亡交叉（偏空）';
    const zone = k < 20 ? '⭐ 超低檔（最佳買區）' : k < 50 ? '中段' : k < 80 ? '中高檔' : '🔥 超高檔（需小心）';
    return `
    <div class="du-kd-card">
      <div class="du-kd-label">${label}</div>
      <div class="du-kd-cross" style="color:${col}">${word}</div>
      <div class="du-kd-vals">K = ${k.toFixed(1)} ／ D = ${d.toFixed(1)} ｜ ${zone}</div>
    </div>`;
  };

  const monthlyCard = () => {
    const m = mtfResult.monthly;
    if(!m) return `<div class="du-kd-card">
      <div class="du-kd-label">🗓 月線趨勢方向</div>
      <div class="du-kd-cross" style="color:var(--t3)">資料不足</div>
    </div>`;
    const col  = monthlyBull ? 'var(--green)' : 'var(--red)';
    const word = m.direction === 'strong_bull' ? '🟢 強多頭格局'
               : m.direction === 'bull'        ? '🟢 偏多'
               : m.direction === 'mixed'       ? '🟡 多空分歧'
               : m.direction === 'bear'        ? '🔴 偏空'
               : '🔴 強空頭格局';
    return `<div class="du-kd-card">
      <div class="du-kd-label">🗓 月線趨勢方向</div>
      <div class="du-kd-cross" style="color:${col}">${word}</div>
      <div class="du-kd-vals">長期評分 ${m.score >= 0 ? '+' : ''}${m.score} / ±6（以 MA60/120/240 判斷）</div>
    </div>`;
  };

  return `
  <div class="sec">🎯 杜金龍 KD 多週期共振 <span class="sec-cnt">日 × 週 × 月三線 KD 同步出現黃金交叉，是杜老師最看重的最強多頭進場訊號</span></div>
  <div class="du-kd-grid">
    ${kdCard('📅 日線 KD（短期）', cK, cD, dailyBull)}
    ${kdCard('📆 週線 KD（中期）', wK, wD, weeklyBull)}
    ${monthlyCard()}
  </div>
  <div class="du-resonance-bar" style="border-left:4px solid ${resColor}">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="display:flex;gap:6px">
        ${[0,1,2].map(i =>
          `<div style="width:18px;height:18px;border-radius:50%;background:${i < resonanceCount ? resColor : 'var(--border)'};transition:background .3s"></div>`
        ).join('')}
      </div>
      <span style="color:${resColor};font-weight:800;font-size:.9rem">${resLabel}</span>
    </div>
    <div style="margin-top:8px;font-size:.73rem;color:var(--t3);line-height:1.6">
      <strong style="color:var(--t2)">杜金龍操作法：</strong>
      當日、週、月三個時間框架 KD 指標同時出現黃金交叉（K 由下向上穿越 D），
      且 K 值在低檔（建議 50 以下）形成，為最高可信度買進訊號。
      反之，若三線皆死亡交叉則應空手觀望。
    </div>
  </div>`;
}

/* ── 杜金龍功能 2：外資連續買賣超天數計數器 ── */
function renderDuForeignStreak(ctx){
  const { chipStats, foreign } = ctx;
  if(!chipStats) return `
  <div class="du-foreign-card">
    <div class="du-foreign-main">
      <div class="du-streak-label" style="color:var(--t3)">🏦 杜金龍外資法則</div>
      <div style="font-size:.75rem;color:var(--t3);margin-top:6px">累積資料不足，請重新整理後等待資料累積（需至少 2 個交易日）。</div>
    </div>
  </div>`;

  const fc = chipStats.foreignConsec; // 正=連買，負=連賣
  const abs = Math.abs(fc);
  const isBuy = fc > 0;
  const isNeutral = fc === 0;

  const streakColor = isNeutral ? 'var(--t2)' : isBuy ? 'var(--green)' : 'var(--red)';
  const streakIcon  = isNeutral ? '⚪' : isBuy ? '🟢' : '🔴';
  const streakWord  = isNeutral ? '方向未定'
                    : isBuy  ? `連續買超 ${abs} 天 ▲`
                    : `連續賣超 ${abs} 天 ▼`;

  // 最多顯示 10 個點
  const dotCount = Math.min(abs, 10);
  const dotColor = isBuy ? 'var(--green)' : isNeutral ? 'var(--t3)' : 'var(--red)';
  const dots = Array.from({length: dotCount}, (_, i) => {
    const opacity = 0.4 + (i / Math.max(dotCount - 1, 1)) * 0.6;
    return `<div class="du-streak-dot" style="background:${dotColor};opacity:${opacity.toFixed(2)}"></div>`;
  }).join('');

  // 強度詮釋（杜金龍法則）
  let duVerdict = '';
  if(fc >= 10)       duVerdict = '🚀 外資超強力買超（≥10天）— 主力建倉訊號，波段上漲機率極高';
  else if(fc >= 5)   duVerdict = '📈 外資持續買超（≥5天）— 多頭籌碼穩固，可積極進場';
  else if(fc >= 3)   duVerdict = '✅ 外資連買 3 天以上 — 杜老師認定為「有效買超」';
  else if(fc >= 1)   duVerdict = '👀 外資開始買超 — 持續觀察是否延續';
  else if(fc === 0)  duVerdict = '— 今日方向中立，明日再觀察';
  else if(fc >= -2)  duVerdict = '⚠️ 外資短暫賣超 — 量不大可觀察，勿恐慌';
  else if(fc >= -5)  duVerdict = '📉 外資連賣超 — 籌碼鬆動，減少持倉';
  else               duVerdict = '🚨 外資大量持續賣超 — 杜老師建議清倉觀望';

  const fk = n => n == null || isNaN(n) ? '--' : (n >= 0 ? '+' : '') + (n/1000).toFixed(0) + 'K張';
  const todayF = foreign ? fk(foreign.foreignNet) : '--';
  const cum5F  = fk(chipStats.foreignCum5);

  return `
  <div class="du-foreign-card">
    <div class="du-foreign-main">
      <div class="du-streak-label" style="color:${streakColor}">${streakIcon} ${streakWord}</div>
      <div class="du-streak-dots">${dots || '<span style="color:var(--t3);font-size:.72rem">（今日資料）</span>'}</div>
      <div style="font-size:.75rem;color:var(--t2);margin-bottom:4px">
        今日：<strong style="color:${fk(foreign?.foreignNet)?.startsWith('+') ? 'var(--green)' : 'var(--red)'}">${todayF}</strong>
        ｜近 5 日累積：<strong>${cum5F}</strong>
      </div>
      <div style="font-size:.75rem;color:${streakColor};font-weight:700">${duVerdict}</div>
    </div>
    <div class="du-foreign-rule">
      <strong>📌 杜金龍外資法則</strong>
      連續 3 天以上買超 → 有效多頭籌碼<br>
      連續 5 天以上 → 波段行情啟動<br>
      連續 10 天以上 → 主力建倉，可重倉<br>
      連續賣超 3 天 → 減碼或出場觀望<br>
      <span style="color:var(--t3)">外資占台積電日均成交 30~50%，<br>其方向是最重要的籌碼指標。</span>
    </div>
  </div>`;
}

function renderPosCalc(ctx){
  const { last, cATR } = ctx;
  const set = Journal.state.settings;
  // 預設用最後收盤價 + 當前 ATR 試算
  const result = Position.calc({
    entryPrice: last, atr: cATR,
    totalCapital: set.totalCapital, riskPct: set.riskPct,
    atrStopMult: set.atrStopMult, rrRatio: set.rrRatio
  });
  if(!result) return '';
  return `
  <div class="sec">💰 部位計算機 <span class="sec-cnt">輸入資金和進場價，自動算出應買幾張、停損設哪裡、目標獲利多少 — 嚴守停損是長期獲利的關鍵</span></div>
  <div class="poscalc">
    <div class="poscalc-grid">
      <div class="poscalc-form">
        <div class="pf-row">
          <label>總資金</label>
          <input type="number" id="pc-cap" value="${set.totalCapital}" step="100000">
          <span class="c-t2" style="font-size:0.6875rem">元</span>
        </div>
        <div class="pf-row">
          <label>單筆風險</label>
          <input type="number" id="pc-risk" value="${set.riskPct}" step="0.1" min="0.1" max="5">
          <span class="c-t2" style="font-size:0.6875rem">%</span>
        </div>
        <div class="pf-row">
          <label>進場價</label>
          <input type="number" id="pc-entry" value="${F.int(last)}" step="1">
          <span class="c-t2" style="font-size:0.6875rem">元</span>
        </div>
        <div class="pf-row">
          <label>停損 ATR×</label>
          <input type="number" id="pc-atrx" value="${set.atrStopMult}" step="0.5" min="1" max="5">
          <span class="c-t2" style="font-size:0.6875rem">當前 ATR=${F.num(cATR,2)}</span>
        </div>
        <div class="pf-row">
          <label>R:R 比</label>
          <input type="number" id="pc-rr" value="${set.rrRatio}" step="0.5" min="1" max="5">
          <span class="c-t2" style="font-size:0.6875rem">1 :</span>
        </div>
        <div class="pf-row">
          <button class="btn btn-sm" style="margin-left:auto" onclick="App.recalcPos()">↻ 重新計算 + 儲存</button>
        </div>
      </div>
      <div>
        <div class="poscalc-out" id="pc-out">
          <div class="po-card stop">
            <div class="po-label">🛑 停損價</div>
            <div class="po-val c-r">${F.int(result.stopLoss)}</div>
            <div class="po-sub">距進場 -${result.stopPct.toFixed(1)}%（${F.num(result.stopDist,1)} 元）</div>
          </div>
          <div class="po-card profit">
            <div class="po-label">🎯 停利價</div>
            <div class="po-val c-g">${F.int(result.takeProfit)}</div>
            <div class="po-sub">距進場 +${result.tpPct.toFixed(1)}%（R:R = 1:${set.rrRatio}）</div>
          </div>
          <div class="po-card size">
            <div class="po-label">📦 最大部位</div>
            <div class="po-val c-b">${result.maxShares.toLocaleString()} 股</div>
            <div class="po-sub">約 ${(result.maxShares/1000).toFixed(1)} 張 ｜ 占資金 ${result.positionPct.toFixed(1)}%</div>

        </div>

    </div>

    <!-- 統計 -->
    <div class="j-section" data-js="stats">
      ${stats ? `
        <div class="stats-grid">
          <div class="stats-card"><div class="sl">總交易次數</div><div class="sv">${stats.total}</div></div>
          <div class="stats-card"><div class="sl">勝率</div><div class="sv ${stats.winRate>=0.5?'c-g':'c-r'}">${(stats.winRate*100).toFixed(0)}%</div></div>
          <div class="stats-card"><div class="sl">平均獲利</div><div class="sv c-g">+${F.int(stats.avgWin)}</div></div>
          <div class="stats-card"><div class="sl">平均虧損</div><div class="sv c-r">-${F.int(stats.avgLoss)}</div></div>

              <div style="font-size:0.7rem;color:var(--t2)">${b.count} 筆 ／ 均損益 ${b.avgPnl>=0?'+':''}${F.int(b.avgPnl)}</div>
            </div>`).join('')}
        </div>
        ${stats.bestPattern ? `
        <div style="background:rgba(16,185,129,.1);border:1px solid var(--green);border-radius:8px;
          padding:10px 14px;font-size:0.8rem;line-height:1.7;margin-bottom:10px">
          🏆 <b>你的最強進場模式：</b>進場分數 ${stats.bestPattern.lo}–${stats.bestPattern.hi} 分時，
          你的勝率高達 <b style="color:var(--green)">${(stats.bestPattern.winRate*100).toFixed(0)}%</b>，
          平均獲利 <b>${stats.bestPattern.avgPnl>=0?'+':''}${F.int(stats.bestPattern.avgPnl)}</b> 元。
          <b>下次優先等這個分數區間再進場。</b>
        </div>` : ''}
        ` : ''}
        <div style="font-size:0.6875rem;color:var(--t2);line-height:1.8;background:var(--card2);padding:12px 16px;border-radius:10px;border-left:4px solid var(--purple)">
          💡 <b>解讀：</b>波段交易者目標獲利因子應 ≥ 2（每賠 1 元賺 2 元）。如果你的勝率 < 40% 但獲利因子 > 2，代表你抓大趨勢但容易停損；勝率 > 60% 但獲利因子 < 1.5，代表你賺小錢賠大錢——可能要拉長持有、放寬停利目標。
        </div>
        ${renderWinRateDetail()}
      ` : '<div class="trade-empty">尚未累積足夠交易資料。完成 5 筆以上交易後會自動分析你的勝率與盈虧比。</div>'}
    </div>
  </div>`;
}

const Theme = {
  STORAGE_KEY: 'tsmc_theme',
  isLight(){
    return document.body.classList.contains('light');
  },
  apply(light){
    document.body.classList.toggle('light', light);
    const btn = document.getElementById('theme-toggle');
    if(btn) btn.textContent = light ? '🌙' : '☀️';
    try{ localStorage.setItem(this.STORAGE_KEY, light ? 'light' : 'dark'); }catch{}
  },
  toggle(){
    this.apply(!this.isLight());
    // 深色/淺色切換後圖表顏色需重繪
    if(typeof App !== 'undefined' && App.drawChart) App.drawChart();
  },
  init(){
    let saved = null;
    try{ saved = localStorage.getItem(this.STORAGE_KEY); }catch{}
    // 若無儲存紀錄，依系統偏好決定
    const preferLight = saved ? saved === 'light'
                               : window.matchMedia('(prefers-color-scheme: light)').matches;
    this.apply(preferLight);
  }
};

let pchart = null;
let App = {
  rows: [],
  ind: {},
  currentTF: 60,
  fromCache: false,
  cacheAgeMs: 0,
  foreign: null,
  lastSnapshot: null,
  pendingPositionId: null,
  ruleCondCount: 1,

  async init(forceRefresh = false){
    Journal.load();
    const btn = document.querySelector('.btn');
    if(btn){ btn.disabled = true; btn.textContent = '載入中…'; }
    document.getElementById('app').innerHTML =
      `<div class="loader"><div class="spin"></div><span>${forceRefresh?'強制重新從 TWSE 抓取':'載入中（優先使用快取）'}…</span></div>`;
    try{
      const result = await Data.loadHistory(forceRefresh);
      if(!result.rows.length) throw new Error('未取得任何歷史數據，請稍後再試。');
      this.rows = result.rows;
      this.foreign = result.foreign;
      this.fromCache = result.fromCache;
      this.cacheAgeMs = result.cacheAgeMs;
      this.compute();
      this.render();
      // 非阻塞：背景抓取 0050 RS 資料
      this.fetchRS().then(() => { if(this._rs0050) this.render(); }).catch(()=>{});

          <button class="btn" onclick="App.reload(true)">↻ 重試</button></div>`;
    }
  },

  async reload(force = false){
    if(force) Cache.clear();
    return this.init(force);
  },

  compute(){
    const rows = this.rows;
    const closes = rows.map(r => r.close);
    const highs = rows.map(r => r.high);
    const lows = rows.map(r => r.low);
    const vols = rows.map(r => r.vol);
    const labels = rows.map(r => `${r.date.getMonth()+1}/${r.date.getDate()}`);
    const ma5 = Ind.ma(closes, 5), ma10 = Ind.ma(closes, 10);
    const ma20 = Ind.ma(closes, 20), ma60 = Ind.ma(closes, 60);
    const ma120 = Ind.ma(closes, 120), ma240 = Ind.ma(closes, 240);
    const { K, D } = Ind.kd(highs, lows, closes);
    const rsi = Ind.rsi(closes), psy = Ind.psy(closes);
    const { dif, dea, hist } = Ind.macd(closes);
    const boll = Ind.boll(closes), volMA = Ind.volMA(vols);
    const obv = Ind.obv(closes, vols);
    const obvMA = Ind.obvMA(obv, 20);
    const atr = Ind.atr(highs, lows, closes);
    const { adx, diPlus, diMinus } = Ind.adx(highs, lows, closes);
    const mfi = Ind.mfi(highs, lows, closes, vols);
    const vwap = Ind.vwap(highs, lows, closes, vols);
    // 52 週高低點（近 252 個交易日）
    const w52len = Math.min(252, closes.length);
    const high52 = Math.max(...highs.slice(-w52len));
    const low52  = Math.min(...lows.slice(-w52len));
    const opens  = rows.map(r => r.open);
    this.ind = {
      closes, highs, lows, opens, vols, labels,
      ma5, ma10, ma20, ma60, ma120, ma240,
      K, D, rsi, psy, dif, dea, hist, boll, volMA,
      obv, obvMA, atr, adx, diPlus, diMinus,
      mfi, vwap, high52, low52
    };
  },

  // 為某個歷史日 idx 計算方向訊號（用於回測）
  signalsAt(idx){
    const I = this.ind, r = this.rows;
    if(idx < 60) return null;
    const last = I.closes[idx], prev = I.closes[idx-1];
    const cMA5 = I.ma5[idx], cMA20 = I.ma20[idx], cMA60 = I.ma60[idx];
    const cK = I.K[idx], cD = I.D[idx], pK = I.K[idx-1], pD = I.D[idx-1];
    const cRSI = I.rsi[idx], cPSY = I.psy[idx];
    const cDIF = I.dif[idx], cDEA = I.dea[idx];
    const cHist = I.hist[idx], pHist = I.hist[idx-1];
    const cBoll = I.boll[idx], cVol = I.vols[idx], cVolMA = I.volMA[idx];
    const cOBV = I.obv[idx], cOBVMA = I.obvMA[idx];
    const chg = last - prev;
    if(!cMA5 || !cMA20 || !cMA60 || !cBoll || !cVolMA) return null;
    const S = {
      ma5: last>cMA5?1:-1, ma20: last>cMA20?1:-1, ma60: last>cMA60?1:-1,
      maAlign: (cMA5>cMA20&&cMA20>cMA60)?1:(cMA5<cMA20&&cMA20<cMA60)?-1:0,
      kdCross: (pK<=pD&&cK>cD)?1:(pK>=pD&&cK<cD)?-1:0,
      kdLevel: cK>80?-1:cK<20?1:0,
      rsi: cRSI>70?-1:cRSI<30?1:0,
      psy: cPSY>75?-1:cPSY<25?1:0,
      macdDir: cDIF>cDEA?1:-1,
      macdMom: cHist>pHist?1:-1,
      boll: ((last-cBoll.lower)/(cBoll.upper-cBoll.lower))>.85?-1:((last-cBoll.lower)/(cBoll.upper-cBoll.lower))<.15?1:0,
      vol: cVol>cVolMA?(chg>0?1:-1):0,
      obv: cOBVMA?(cOBV>cOBVMA?1:-1):0,
      divergence: 0  // 回測簡化：背離不參與歷史評分（避免 lookback 偏誤）
    };
    return Score.direction(S).ratio;
  },

  render(){
    const r = this.rows, I = this.ind;
    const n = r.length;
    const last = I.closes[n-1], prev = I.closes[n-2];
    const chg = last - prev, chgP = chg/prev*100;
    const lastDate = r[n-1].dateStr;
    const cMA5=I.ma5[n-1], cMA10=I.ma10[n-1], cMA20=I.ma20[n-1];
    const cMA60=I.ma60[n-1], cMA120=I.ma120[n-1], cMA240=I.ma240[n-1];
    const cK=I.K[n-1], cD=I.D[n-1], pK=I.K[n-2], pD=I.D[n-2];
    const cRSI=I.rsi[n-1], cPSY=I.psy[n-1];
    const cDIF=I.dif[n-1], cDEA=I.dea[n-1], cHist=I.hist[n-1], pHist=I.hist[n-2];
    const p2Hist = n > 2 ? I.hist[n-3] : null;
    const prevVol = n > 1 ? I.vols[n-2] : 0;
    const prevChg = n > 2 ? (I.closes[n-2] - I.closes[n-3]) : 0;
    const cBoll=I.boll[n-1], cVol=I.vols[n-1], cVolMA=I.volMA[n-1];
    const cOBV=I.obv[n-1], cOBVMA=I.obvMA[n-1];
    const cMFI=I.mfi[n-1];
    const cVWAP=I.vwap[n-1];
    const lastOpen = r[n-1].open, prevOpen = r[n-2]?.open;
    const cATR=I.atr[n-1];
    const atrSlice = I.atr.filter(v=>v!=null).slice(-30);
    const cATRMean = atrSlice.length ? atrSlice.reduce((a,b)=>a+b,0)/atrSlice.length : null;

    // ── ADX 市場情境 ──
    const cADX = I.adx[n-1], cDiP = I.diPlus[n-1], cDiM = I.diMinus[n-1];
    const adxRegime = cADX >= 25 ? 'trend' : cADX >= 18 ? 'weak' : 'range';
    const adxCtx = { cADX, cDiP, cDiM, adxRegime };

    // ── 偵測背離 ──
    const divRSI = Div.detect(I.closes, I.rsi, 30);
    const divMACD = Div.detect(I.closes, I.hist, 30);
    // ── 支撐壓力（傳入 vols 啟用 Volume Profile）──
    const sr = SR.find(I.highs, I.lows, I.closes, I.vols, 60);

    // ── 今日是否為特殊期間 ──

    // ── 籌碼面歷史 ──
    if(this.foreign) ForeignHistory.push(this.foreign);
    const chipStats = ForeignHistory.stats();

    // ── 方向訊號 ──
    const S = {
      ma5: last>cMA5?1:-1, ma20: last>cMA20?1:-1,
      ma60: cMA60?(last>cMA60?1:-1):0,
      maAlign: (cMA5&&cMA20&&cMA60)?(cMA5>cMA20&&cMA20>cMA60?1:cMA5<cMA20&&cMA20<cMA60?-1:0):0,
      kdCross: (pK<=pD&&cK>cD)?1:(pK>=pD&&cK<cD)?-1:0,
      kdLevel: cK>80?-1:cK<20?1:0,
      rsi: cRSI>70?-1:cRSI<30?1:0,
      psy: cPSY>75?-1:cPSY<25?1:0,
      macdDir: cDIF>cDEA?1:-1,
      macdMom: cHist>pHist?1:-1,
      boll: cBoll?((last-cBoll.lower)/(cBoll.upper-cBoll.lower)>.85?-1:(last-cBoll.lower)/(cBoll.upper-cBoll.lower)<.15?1:0):0,
      vol: cVol>cVolMA?(chg>0?1:-1):0,
      obv: cOBVMA?(cOBV>cOBVMA?1:-1):0,
      divergence: (divRSI?.type==='bull'||divMACD?.type==='bull')?1:(divRSI?.type==='bear'||divMACD?.type==='bear')?-1:0
    };
    const dirResult = Score.direction(S);
    const dirRatio = dirResult.ratio;
    const sm = sentMeta(dirResult.weighted, dirResult.max);

    // ── 進出場評分 ──
    const ES = Score.entry({
      closes: I.closes, ma20: I.ma20, K: I.K, pK, cRSI, cPSY,
      cHist, pHist, cBoll, cVol, cVolMA: cVolMA||1, chg, dirRatio
    });
    const AM = actionMeta(ES.total, dirRatio);

    // ── 歷史百分位（項目 14） ──
    // 計算過去 252 日（約一年）的方向比例和進出場分數歷史
    const lookback = Math.min(252, n - 60);
    const dirHistArr = [], esHistArr = [];
    for(let i = n - lookback; i < n; i++){
      const sig = this.signalsAt(i);
      if(sig != null) dirHistArr.push(sig);
    }
    const scorePct = Score.historicalPercentile(dirRatio, dirHistArr);
    // ES 的歷史百分位：簡化處理，用 dir ratio 推估 ES 並計算
    // 為簡化，先以 dirRatio 百分位代表
    const ES_pct = scorePct;

    // ── 預測 ──
    const knnNeighbors = Predict.knn(this.rows, this.ind, n - 1);
    const probRaw = Predict.probability(knnNeighbors);
    const cone = Predict.volatilityCone(last, cATR);
    // ── SOX 前夜訊號修正 ──
    const sox = External.get();
    const soxAdj = External.probAdjust(sox?.value);
    const prob = probRaw ? {
      ...probRaw,
      wUpProb: F.clamp(probRaw.wUpProb + soxAdj, 0.02, 0.98),
      wAvgChg: probRaw.wAvgChg + (soxAdj * 100 * 0.5),  // 修正幅度也相應調整
      _rawUpProb: probRaw.wUpProb,
      _soxAdj: soxAdj,
      _sox: sox?.value
    } : null;
    const conf = Predict.confidence(prob, dirRatio, cVol/(cVolMA||1));
    // ── 回測 ──
    const dirSignalsArr = new Array(n).fill(null);
    for(let i = 60; i < n; i++) dirSignalsArr[i] = this.signalsAt(i);
    const backtest = Predict.backtest(this.rows, this.ind, dirSignalsArr);

    // ── 多時間框架（MTF） ──

    // ── 共用 ctx ──
    const bollPct = cBoll ? ((last-cBoll.lower)/(cBoll.upper-cBoll.lower)*100).toFixed(0) : '--';
    const volK = (cVol/1000).toFixed(0), volMAK = (cVolMA/1000).toFixed(0);
    const dataAgeHours = this.cacheAgeMs / (1000 * 60 * 60);

    const ctx = {
      last, prev, chg, chgP, lastDate, dataAgeHours, fromCache: this.fromCache,
      lastHigh: r[n-1].high, lastLow: r[n-1].low,
      high52: I.high52, low52: I.low52,

      cMA5, cMA10, cMA20, cMA60, cMA120, cMA240,

      cDIF, cDEA, cHist, pHist, p2Hist,
      prevVol, prevChg,
      cBoll, cVol, cVolMA, bollPct, volK, volMAK,
      cOBV, cOBVMA, cMFI, cVWAP, cATR, cATRMean, atr: cATR,
      divRSI, divMACD, sr, foreign: this.foreign,
      S, dirResult, dirRatio, sm,
      total: dirResult.weighted, maxS: dirResult.max,
      scorePct, ES_pct,
      ES, AM,
      prob, cone, conf, backtest,
      mtfResult, mtfRes,
      adxCtx, todaySpecial, chipStats,
      rows: this.rows
    };

    // ── 建立 snapshot 並評估規則 ──
    this.lastSnapshot = RuleEngine.snapshot(ctx);
    const triggered = RuleEngine.evaluateAll(Journal.state.rules, this.lastSnapshot);

    // ── 記錄多空分數歷史 ──
    ScoreHistory.push(dirResult.weighted, lastDate);

    // ── Browser 通知檢查（背景靜默）──
    try{ Notifier.check(ctx); }catch(e){}

    document.getElementById('app').innerHTML =
      // ── Header ──

      renderEventsBanner() +

  // ─── 優化 4：抓取 0050 做相對強弱計算 ───
  _rs0050: null,
  async fetchRS(){
    try{
      const url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&stockNo=0050';
      const d = await CorsProxy.fetchJSON(url);
      if(!d || !d.data || !d.data.length) return;
      const rows = d.data
        .map(row => {
          if(!Array.isArray(row) || row.length < 9) return null;
          const c = parseFloat(row[6].replace(/,/g,''));
          return isNaN(c) ? null : c;
        })
        .filter(Boolean);
      if(rows.length < 2) return;
      const etf30 = (rows[rows.length-1] - rows[Math.max(0, rows.length-30)]) / rows[Math.max(0, rows.length-30)] * 100;
      // 台積電 30 日漲跌
      const I = this.ind;
      const n = I.closes.length;
      const tsmc30 = (I.closes[n-1] - I.closes[Math.max(0, n-30)]) / I.closes[Math.max(0, n-30)] * 100;
      this._rs0050 = {
        ratio: (1 + tsmc30/100) / (1 + etf30/100),
        tsmc30, etf30
      };
    }catch(e){ console.warn('fetchRS failed', e); }
  },

  // ─── 優化 7：匯出資料 ───
  exportCSV(){
    if(!this.rows?.length){ alert('尚無資料'); return; }
    const I = this.ind;
    const headers = ['日期','開盤','最高','最低','收盤','成交量','MA5','MA20','MA60','K','D','RSI','PSY','VWAP20'];
    const lines = this.rows.map((r,i) => [
      r.dateStr, r.open, r.high, r.low, r.close, r.vol,
      I.ma5[i]?.toFixed(2) ?? '',
      I.ma20[i]?.toFixed(2) ?? '',
      I.ma60[i]?.toFixed(2) ?? '',
      I.K[i]?.toFixed(2) ?? '',
      I.D[i]?.toFixed(2) ?? '',
      I.rsi[i]?.toFixed(2) ?? '',
      I.psy[i]?.toFixed(2) ?? '',
      I.vwap[i]?.toFixed(2) ?? ''
    ].join(','));
    const csv = [headers.join(','), ...lines].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });

  exportJSON(){
