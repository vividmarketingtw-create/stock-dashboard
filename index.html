  drawChart(){
    const ctx = document.getElementById('pc');
    if(!ctx) return;
    if(pchart) pchart.destroy();
    const N = Math.min(this.currentTF, this.rows.length);
    const I = this.ind;
    const totalLen = I.closes.length;
    const startIdx = totalLen - N;

    // ── Feature 2: 計算歷史買賣訊號散點 ──
    const buyPoints  = new Array(N).fill(null);
    const sellPoints = new Array(N).fill(null);
    for(let i = 0; i < N; i++){
      const absIdx = startIdx + i;
      if(absIdx < 60) continue;
      const ratio = this.signalsAt(absIdx);
      if(ratio === null) continue;
      if(ratio >= 0.55)       buyPoints[i]  = I.closes[absIdx];
      else if(ratio <= -0.55) sellPoints[i] = I.closes[absIdx];
    }

    // ── 整數關卡水平線（杜金龍功能 3）──
    const roundLevelPlugin = {
      id: 'roundLevels',
      afterDraw(chart){
        const c2  = chart.ctx;
        const yAx = chart.scales.y;
        const xAx = chart.scales.x;
        if(!yAx || !xAx) return;
        const pMin = yAx.min, pMax = yAx.max;
        const step = (pMax - pMin) > 1000 ? 500 : 100;
        const start = Math.ceil(pMin / step) * step;
        c2.save();
        c2.setLineDash([5, 7]);
        c2.lineWidth = 0.7;
        for(let p = start; p <= pMax; p += step){
          const y = yAx.getPixelForValue(p);
          // 線條
          c2.strokeStyle = 'rgba(148,163,184,0.18)';
          c2.beginPath();
          c2.moveTo(xAx.left, y);
          c2.lineTo(xAx.right, y);
          c2.stroke();
          // 標籤
          c2.fillStyle = 'rgba(148,163,184,0.55)';
          c2.font = '9px monospace';
          c2.fillText(p.toLocaleString(), xAx.left + 4, y - 3);
        }
        c2.restore();
      }
    };

    // ── 彩色量能柱（放量紅=漲、放量綠=跌、縮量灰）──
    const volMA20 = I.volMA.slice(-N);
    const volColors = I.vols.slice(-N).map((v, i) => {
      const isHighVol = v > (volMA20[i] || 0) * 1.0;
      const isUp = I.closes[startIdx + i] >= (I.opens[startIdx + i] || I.closes[startIdx + i]);
      if(!isHighVol) return 'rgba(100,116,139,0.35)';
      return isUp ? 'rgba(239,68,68,0.55)' : 'rgba(16,185,129,0.55)';
    });

    pchart = new Chart(ctx, {
      type: 'line',
      plugins: [roundLevelPlugin],
      data: {
        labels: I.labels.slice(-N),
        datasets: [
          // ── 主線：收盤價 ──
          { label: '收盤價', data: I.closes.slice(-N),
            borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,.08)',
            fill: true, borderWidth: 2, pointRadius: 0, tension: .3, yAxisID: 'y' },
          // ── 均線 ──
          { label: 'MA20', data: I.ma20.slice(-N),
            borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, tension: .3, yAxisID: 'y' },
          { label: 'MA60', data: I.ma60.slice(-N),
            borderColor: '#3b82f6', borderWidth: 1.5, pointRadius: 0, tension: .3, yAxisID: 'y' },
          // ── VWAP（量加權均價）──
          { label: 'VWAP(20)', data: I.vwap.slice(-N),
            borderColor: '#f472b6', borderWidth: 1.5, borderDash: [4,4],
            pointRadius: 0, tension: .3, yAxisID: 'y' },
          // ── 買入訊號 ▲ ──
          { label: '買入訊號', data: buyPoints,
            type: 'scatter', pointStyle: 'triangle', rotation: 0,
            backgroundColor: '#10b981', borderColor: '#10b981',
            pointRadius: 7, pointHoverRadius: 9, showLine: false, yAxisID: 'y' },
          // ── 賣出訊號 ▼ ──
          { label: '賣出訊號', data: sellPoints,
            type: 'scatter', pointStyle: 'triangle', rotation: 180,
            backgroundColor: '#ef4444', borderColor: '#ef4444',
            pointRadius: 7, pointHoverRadius: 9, showLine: false, yAxisID: 'y' },
          // ── 彩色成交量柱（右 y 軸）──
          { label: '成交量', data: I.vols.slice(-N),
            type: 'bar',
            backgroundColor: volColors,
            borderWidth: 0,
            yAxisID: 'y1',
            order: 10 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { size: 11 },
            filter: item => item.text !== '成交量' } },   // 量柱不顯示在圖例
          tooltip: {
            backgroundColor: '#1c2038', titleColor: '#f1f5f9', bodyColor: '#94a3b8',
            callbacks: {
              label(item){
                if(item.dataset.label === '買入訊號' && item.raw !== null)
                  return `🟢 買入訊號 $${item.raw}`;
                if(item.dataset.label === '賣出訊號' && item.raw !== null)
                  return `🔴 賣出訊號 $${item.raw}`;
                if(item.dataset.label === '成交量')
                  return `📊 成交量 ${(item.raw/1000).toFixed(0)}K張`;
                if(item.dataset.label === 'VWAP(20)' && item.raw !== null)
                  return `💹 VWAP ${item.raw.toFixed(1)}`;
                return `${item.dataset.label}: ${item.raw != null ? item.raw : ''}`;
              }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#94a3b8', font: { size: 10 }, maxTicksLimit: 10 },
               grid: { color: 'rgba(255,255,255,.04)' } },
          y: { ticks: { color: '#94a3b8', font: { size: 10 } },
               grid: { color: 'rgba(255,255,255,.04)' }, position: 'right' },
          y1: {
            position: 'left',
            ticks: { color: 'rgba(148,163,184,.4)', font: { size: 9 },
              callback: v => (v/1000).toFixed(0)+'K' },
            grid: { display: false },
            // 把量能柱壓縮在下方 25%（不遮擋 K 線）
            max: v => v.max * 5,
            beginAtZero: true
          }
        }
      }
    });
  }
};

/* ═══════════════════════════════════════════════════════════════
   UTILITY: CORS PROXY
   依序嘗試多個 CORS 代理，回傳第一個成功的 JSON 結果
   ═══════════════════════════════════════════════════════════════ */
const CorsProxy = {
  TIMEOUT_MS: 5000, // 每個代理最多等 5 秒

  /**
   * 並行嘗試多個 CORS 代理，回傳第一個成功的 JSON。
   * 使用 Promise.any() — 任一成功即回傳，全失敗才 reject。
   */
  async fetchJSON(url){
    const enc = encodeURIComponent(url);

    const attempts = [
      // 1. allorigins /raw
      () => this._get(`https://api.allorigins.win/raw?url=${enc}`),
      // 2. allorigins /get（回傳包裝 JSON，需手動解 contents）
      async () => {
        const d = await this._get(`https://api.allorigins.win/get?url=${enc}`);
        if(typeof d?.contents === 'string') return JSON.parse(d.contents);
        throw new Error('ao/get bad contents');
      },
      // 3. corsproxy.io
      () => this._get(`https://corsproxy.io/?${enc}`),
      // 4. thingproxy（hackathon 常用代理）
      () => this._get(`https://thingproxy.freeboard.io/fetch/${url}`),
      // 5. 直連（目標若有 CORS 標頭則直接成功）
      () => this._get(url),
    ];

    try {
      // Promise.any：第一個 resolve 的勝出；全 reject 才丟 AggregateError
      return await Promise.any(attempts.map(fn =>
        Promise.race([fn(), this._timeout()])
      ));
    } catch(e){
      console.warn('[CorsProxy] 所有代理失敗');
      return null;
    }
  },

  /** 取得純文字（用於 CSV 類資料源） */
  async fetchText(url){
    const enc = encodeURIComponent(url);
    const proxies = [
      `https://api.allorigins.win/raw?url=${enc}`,
      `https://corsproxy.io/?${enc}`,
      url,
    ];
    try {
      return await Promise.any(proxies.map(async p => {
        const r = await Promise.race([
          fetch(p, { cache:'no-store' }),
          this._timeout()
        ]);
        if(!r.ok) throw new Error('HTTP ' + r.status);
        const t = await r.text();
        // 若回傳 HTML（代理失敗）則丟棄
        if(!t || t.trimStart().startsWith('<')) throw new Error('got html');
        return t;
      }));
    } catch(e){ console.warn('[CorsProxy.fetchText] 失敗:', e.message); return null; }
  },

  async _get(url){
    const r = await fetch(url, { cache:'no-store' });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    // 如果回傳 HTML（如 Yahoo 的反爬頁）直接丟棄
    if(text.trimStart().startsWith('<')) throw new Error('got html, not json');
    const d = JSON.parse(text);
    if(!d) throw new Error('empty');
    return d;
  },

  _timeout(){ return new Promise((_,r) => setTimeout(() => r(new Error('timeout')), this.TIMEOUT_MS)); }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: LIVE PRICE (TWSE Real-time)
   每 30 秒抓一次台灣證交所即時報價，盤中更快、盤後顯示收盤狀態
   ═══════════════════════════════════════════════════════════════ */
const LivePrice = {
  STOCK: 'tse_2330.tw',
  INTERVAL_MS: 30000,   // 30 秒刷新
  _timer: null,
  _lastData: null,

  /** 判斷目前是否在交易時段 (台灣 09:00-13:30 週一至週五)
   *  使用 toLocaleString('zh-TW') 強制轉台灣時區，避免使用者在其他時區誤判 */
  isTrading(){
    const twStr  = new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' });
    const tw     = new Date(twStr);
    const day    = tw.getDay();
    if(day === 0 || day === 6) return false;
    const mins   = tw.getHours() * 60 + tw.getMinutes();
    return mins >= 9 * 60 && mins < 13 * 60 + 30;
  },

  /** 並行嘗試所有資料源，第一個成功的勝出 */
  async fetchData(){
    // 優先：直接從 App 已載入的資料取得（永遠可用，無 CORS 問題）
    const appData = this._fetchFromApp();
    if(appData) return appData;

    // 備援：嘗試外部 API（需要網路 + CORS 支援）
    const sources = [
      this._fetchYahoo(),
      this._fetchTWSE(),
      this._fetchTWSEOpenAPI(),
    ];
    try {
      return await Promise.any(sources.map(p =>
        p.then(s => { if(!s) throw new Error('null'); return s; })
      ));
    } catch(e){
      console.warn('[LivePrice] 所有外部資料源失敗，使用 App 備援');
      return appData; // 最後保底：再試一次 App 資料
    }
  },

  /** 從 App 已載入的歷史資料直接讀取（無需網路） */
  _fetchFromApp(){
    if(typeof App === 'undefined' || !App.rows?.length || !App.ind?.closes?.length) return null;
    const rows = App.rows;
    const ind  = App.ind;
    const n    = rows.length;
    const last = rows[n - 1];
    const prev = rows[n - 2];
    if(!last) return null;
    return {
      z:        last.close?.toFixed(2),
      y:        prev?.close?.toFixed(2) ?? last.close?.toFixed(2),
      h:        last.high?.toFixed(2),
      l:        last.low?.toFixed(2),
      v:        last.vol?.toString(),
      t:        last.dateStr + ' 收盤',
      _fromApp: true,   // 標記來源（用於顯示「收盤」標籤）
    };
  },

  /** Yahoo Finance → 轉成 TWSE-like 格式 */
  async _fetchYahoo(){
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/2330.TW?interval=2m&range=1d&_=${Date.now()}`;
    const d = await CorsProxy.fetchJSON(url);
    const meta = d?.chart?.result?.[0]?.meta;
    if(!meta || !meta.regularMarketPrice) throw new Error('Yahoo no data');
    // ── 資料新鮮度檢查：盤中時段若資料超過 15 分鐘視為過時快取，拒絕使用 ──
    if(meta.regularMarketTime && LivePrice.isTrading()){
      const ageMin = (Date.now() / 1000 - meta.regularMarketTime) / 60;
      if(ageMin > 15) throw new Error(`Yahoo stale data (${ageMin.toFixed(1)} min old)`);
    }
    const t = meta.regularMarketTime
      ? new Date(meta.regularMarketTime * 1000)
          .toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit' })
      : '-';
    return {
      z: meta.regularMarketPrice?.toFixed(2),
      y: (meta.chartPreviousClose ?? meta.previousClose)?.toFixed(2),
      h: meta.regularMarketDayHigh?.toFixed(2),
      l: meta.regularMarketDayLow?.toFixed(2),
      v: meta.regularMarketVolume?.toString(),
      t,
    };
  },

  /** TWSE 即時 API → 原生格式 */
  async _fetchTWSE(){
    const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${this.STOCK}&json=1&delay=0&_=${Date.now()}`;
    const d = await CorsProxy.fetchJSON(url);
    return d?.msgArray?.[0] ?? null;
  },

  /**
   * TWSE Open API（直連，CORS 友善，設計給開發者用）
   * 來源：openapi.twse.com.tw — 每日收盤後更新，盤中為前一日收盤價
   */
  async _fetchTWSEOpenAPI(){
    const url = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL';
    // 直連嘗試（Open API 有 CORS 標頭）
    const r = await Promise.race([
      fetch(url, { cache:'no-store' }),
      new Promise((_,rj) => setTimeout(() => rj(new Error('timeout')), 5000))
    ]);
    if(!r.ok) throw new Error('OpenAPI HTTP ' + r.status);
    const arr = await r.json();
    const row = arr?.find(x => x.Code === '2330');
    if(!row) throw new Error('2330 not found');
    // 轉成 TWSE-like 格式
    const close = parseFloat(row.ClosingPrice);
    const prevD = (typeof App !== 'undefined' && App.ind?.closes)
      ? App.ind.closes[App.ind.closes.length - 2] : null;
    return {
      z: close.toFixed(2),
      y: prevD ? prevD.toFixed(2) : close.toFixed(2),
      h: parseFloat(row.HighestPrice).toFixed(2),
      l: parseFloat(row.LowestPrice).toFixed(2),
      v: row.TradeVolume,
      t: row.Date ? `${row.Date.slice(4,6)}/${row.Date.slice(6,8)} 收盤` : '--',
    };
  },

  num(v){ return (v && v !== '-') ? parseFloat(v) : null; },

  /** 更新畫面上的 Widget */
  applyToDOM(s, isError){
    const widget  = document.getElementById('live-widget');
    const priceEl = document.getElementById('lw-price');
    const chgEl   = document.getElementById('lw-chg');
    const metaEl  = document.getElementById('lw-meta');
    const timeEl  = document.getElementById('lw-time');
    const dotEl   = document.getElementById('lw-dot');
    const statEl  = document.getElementById('lw-status');
    if(!widget) return;

    // ── 錯誤狀態 ──
    if(isError || !s){
      widget.className = 'live-widget lw-error';
      dotEl.className  = 'lw-dot d-err';
      if(statEl) statEl.textContent = '即時股價';
      priceEl.textContent = '---';
      priceEl.style.color = 'var(--red)';
      chgEl.textContent   = '資料暫時無法取得';
      chgEl.style.color   = 'var(--red)';
      metaEl.textContent  = '請稍後自動重試';
      timeEl.textContent  = '';
      return;
    }

    const curPrice  = this.num(s.z);   // 成交價（盤中）
    const prevClose = this.num(s.y);   // 昨收
    const isClosed  = !curPrice;       // 盤後或非交易時段
    const displayP  = curPrice ?? prevClose;
    if(!displayP) return;

    const chg  = displayP - prevClose;
    const chgP = prevClose ? chg / prevClose * 100 : 0;
    const clr  = chg >= 0 ? 'var(--green)' : 'var(--red)';
    const arr  = chg >= 0 ? '▲' : '▼';

    priceEl.textContent  = displayP.toFixed(2);
    priceEl.style.color  = clr;
    chgEl.innerHTML      = `${arr} ${Math.abs(chg).toFixed(2)} (${chg>=0?'+':''}${chgP.toFixed(2)}%)`;
    chgEl.style.color    = clr;

    // 高低量
    const h = this.num(s.h), l = this.num(s.l), v = this.num(s.v);
    const parts = [];
    if(h && l) parts.push(`高 ${h.toFixed(0)}　低 ${l.toFixed(0)}`);
    if(v)      parts.push(`量 ${(v/1000).toFixed(1)}K 張`);
    metaEl.textContent = parts.join('　');

    // 時間 & 狀態（_fromApp = 使用歷史收盤資料）
    if(s._fromApp){
      widget.className = 'live-widget lw-closed';
      dotEl.className  = 'lw-dot d-closed';
      if(statEl) statEl.textContent = '最近收盤';
      timeEl.textContent = s.t ?? '歷史資料';
    } else if(isClosed){
      widget.className = 'live-widget lw-closed';
      dotEl.className  = 'lw-dot d-closed';
      if(statEl) statEl.textContent = '即時股價';
      timeEl.textContent = s.t ? `收盤 ${s.t}` : '非交易時段';
    } else {
      widget.className = 'live-widget lw-open';
      dotEl.className  = 'lw-dot d-live';
      if(statEl) statEl.textContent = '即時股價';
      timeEl.textContent = s.t ? `更新 ${s.t}` : '';
    }

    // 順便觸發警報檢查
    if(curPrice) PriceAlert.check(curPrice);
    this._lastData = { price: displayP, chg, chgP, isClosed };
  },

  /** 取得資料並更新 DOM */
  async update(){
    const s = await this.fetchData();
    this.applyToDOM(s, s === null);
  },

  /** 啟動定時輪詢（每 30 秒） */
  start(){
    this.update();
    clearInterval(this._timer);
    this._timer = setInterval(() => this.update(), this.INTERVAL_MS);
  },

  stop(){ clearInterval(this._timer); }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: INTRADAY CHART (分時走勢)
   資料來源：Yahoo Finance 1 分鐘 K 線；每 60 秒更新一次
   ═══════════════════════════════════════════════════════════════ */
const IntradayChart = {
  _chart: null,
  _timer: null,
  INTERVAL_MS: 60000,

  async fetchData(){
    const ts = Date.now();
    // 並行嘗試所有來源，第一個成功的勝出
    try {
      return await Promise.any([
        // 來源 A：Stooq 分時 CSV（對 CORS 最友善）
        this._fetchStooq(),
        // 來源 B：Yahoo Finance query1 1m
        (async () => {
          const d = await CorsProxy.fetchJSON(`https://query1.finance.yahoo.com/v8/finance/chart/2330.TW?interval=1m&range=1d&includePrePost=false&_=${ts}`);
          const r = d?.chart?.result?.[0];
          if(!r?.timestamp?.length) throw new Error('no data');
          return r;
        })(),
        // 來源 C：Yahoo Finance query2 2m
        (async () => {
          const d = await CorsProxy.fetchJSON(`https://query2.finance.yahoo.com/v8/finance/chart/2330.TW?interval=2m&range=1d&includePrePost=false&_=${ts}`);
          const r = d?.chart?.result?.[0];
          if(!r?.timestamp?.length) throw new Error('no data');
          return r;
        })(),
      ]);
    } catch(e){
      console.warn('[IntradayChart] 所有分時資料源失敗');
      return null;
    }
  },

  /** Stooq 分時 CSV → Yahoo Finance-compatible 格式 */
  async _fetchStooq(){
    const now   = new Date();
    const y     = now.getFullYear();
    const m     = String(now.getMonth()+1).padStart(2,'0');
    const d     = String(now.getDate()).padStart(2,'0');
    const ds    = `${y}${m}${d}`;
    const url   = `https://stooq.com/q/d/l/?s=2330.tw&d1=${ds}&d2=${ds}&i=m`;
    const csv   = await CorsProxy.fetchText(url);
    if(!csv) throw new Error('Stooq no csv');
    return this._parseStooqCSV(csv);
  },

  /** 解析 Stooq CSV 成 Yahoo Finance-like result 物件 */
  _parseStooqCSV(csv){
    const lines = csv.trim().split('\n');
    if(lines.length < 2) throw new Error('Stooq csv too short');
    const timestamps = [], closes = [], highs = [], lows = [], opens = [], vols = [];
    for(let i = 1; i < lines.length; i++){
      const cols = lines[i].split(',');
      if(cols.length < 6) continue;
      const [date, time, open, high, low, close, vol] = cols;
      if(!date || !close || isNaN(parseFloat(close))) continue;
      // 建立 UTC+8 時間戳
      const [hh, mm] = (time||'').split(':');
      const dtStr = `${date}T${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:00+08:00`;
      const epoch = Math.floor(new Date(dtStr).getTime() / 1000);
      if(isNaN(epoch)) continue;
      timestamps.push(epoch);
      closes.push(parseFloat(close));
      highs.push(parseFloat(high));
      lows.push(parseFloat(low));
      opens.push(parseFloat(open));
      vols.push(parseInt(vol)||0);
    }
    if(timestamps.length < 2) throw new Error('Stooq parsed no rows');
    // 前一交易日收盤（給昨收參考線用）
    const prevClose = (typeof App!=='undefined' && App.ind?.closes?.length>=2)
      ? App.ind.closes[App.ind.closes.length-2]
      : closes[0];
    return {
      meta:{
        regularMarketPrice:  closes[closes.length-1],
        chartPreviousClose:  prevClose,
        regularMarketDayHigh: Math.max(...highs),
        regularMarketDayLow:  Math.min(...lows),
        regularMarketOpen:    opens[0],
        regularMarketVolume:  vols.reduce((a,b)=>a+b,0),
        regularMarketTime:    timestamps[timestamps.length-1],
      },
      timestamp: timestamps,
      indicators:{ quote:[{ close:closes, high:highs, low:lows, volume:vols }] }
    };
  },

  _fmtTime(ts){
    // Yahoo Finance timestamps are UTC; convert to Asia/Taipei (UTC+8)
    const d = new Date((ts + 8*3600) * 1000);
    return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
  },

  draw(result){
    const canvas = document.getElementById('intraday-canvas');
    if(!canvas) return;
    // Hide TradingView iframe; use canvas for real JSON API data
    const tvWrap = document.getElementById('tv-wrap');
    if(tvWrap) tvWrap.style.display = 'none';
    canvas.style.display = '';

    const meta      = result.meta;
    const stamps    = result.timestamp ?? [];
    const quotes    = result.indicators?.quote?.[0] ?? {};
    const closes    = quotes.close ?? [];
    const prevClose = meta.chartPreviousClose ?? meta.previousClose ?? 0;

    // 過濾有效資料點
    const valid = stamps
      .map((ts, i) => ({ ts, price: closes[i] }))
      .filter(p => p.price != null);
    if(!valid.length){
      this._showErr('尚無分時資料');
      return;
    }

    const labels = valid.map(p => this._fmtTime(p.ts));
    const prices = valid.map(p => parseFloat(p.price.toFixed(2)));
    const lastP  = prices[prices.length - 1];
    const isUp   = lastP >= prevClose;
    const clr    = isUp ? '#10b981' : '#ef4444';

    // 標記整點刻度
    const majorTicks = new Set(['09:00','10:00','11:00','12:00','13:00','13:30']);

    // 更新統計數字
    this._updateStats(meta, prevClose);

    // 銷毀舊圖
    if(this._chart){ try{ this._chart.destroy(); }catch{} this._chart = null; }

    const ctx = canvas.getContext('2d');
    const isLight = document.body.classList.contains('light');
    const gridCol = isLight ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.05)';
    const tickCol = isLight ? '#475569' : '#94a3b8';

    // 漸層填色
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.offsetHeight || 210);
    grad.addColorStop(0, isUp ? 'rgba(16,185,129,.22)' : 'rgba(239,68,68,.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    this._chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '分時',
            data: prices,
            borderColor: clr,
            backgroundColor: grad,
            borderWidth: 1.5,
            fill: true,
            pointRadius: 0,
            tension: 0,
          },
          {
            label: '昨收',
            data: Array(prices.length).fill(prevClose),
            borderColor: 'rgba(100,116,139,.55)',
            borderWidth: 1,
            borderDash: [4,3],
            pointRadius: 0,
            fill: false,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1c2038',
            titleColor: '#f1f5f9',
            bodyColor: '#94a3b8',
            callbacks: {
              title: items => labels[items[0].dataIndex] ?? '',
              label: item => item.datasetIndex === 0
                ? ` 成交 ${item.raw}`
                : ` 昨收 ${item.raw}`
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: tickCol,
              font: { size: 10 },
              maxRotation: 0,
              autoSkip: false,
              callback(val, i){ return majorTicks.has(labels[i]) ? labels[i] : ''; }
            },
            grid: { color: gridCol }
          },
          y: {
            ticks: { color: tickCol, font: { size: 10 } },
            grid: { color: gridCol },
            position: 'right'
          }
        }
      }
    });

    // 隱藏錯誤訊息
    const err = document.getElementById('intraday-err');
    if(err) err.style.display = 'none';
  },

  _showErr(msg){
    const err = document.getElementById('intraday-err');
    if(err){ err.style.display = 'flex'; err.textContent = '⚠ ' + msg; }
  },

  _updateStats(meta, prevClose){
    const cur  = meta.regularMarketPrice;
    const chg  = (cur && prevClose) ? cur - prevClose : 0;
    const chgP = prevClose ? chg / prevClose * 100 : 0;
    const clr  = chg >= 0 ? 'var(--green)' : 'var(--red)';
    const arr  = chg >= 0 ? '▲' : '▼';
    const g    = id => document.getElementById(id);
    if(g('id-cur')){ g('id-cur').textContent = cur?.toFixed(2) ?? '--'; g('id-cur').style.color = clr; }
    if(g('id-chg')){ g('id-chg').innerHTML = `${arr} ${Math.abs(chg).toFixed(2)} (${chg>=0?'+':''}${chgP.toFixed(2)}%)`; g('id-chg').style.color = clr; }
    if(g('id-open')) g('id-open').textContent = meta.regularMarketOpen?.toFixed(2) ?? '--';
    if(g('id-high')) g('id-high').textContent = meta.regularMarketDayHigh?.toFixed(2) ?? '--';
    if(g('id-low'))  g('id-low').textContent  = meta.regularMarketDayLow?.toFixed(2) ?? '--';
    if(g('id-vol'))  g('id-vol').textContent  = meta.regularMarketVolume
      ? (meta.regularMarketVolume / 1000).toFixed(0) + 'K 張'
      : '--';
    if(g('id-prev')) g('id-prev').textContent = prevClose?.toFixed(2) ?? '--';
    if(g('id-itime')) g('id-itime').textContent =
      new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' 更新';
  },

  async update(){
    const result = await this.fetchData();
    if(result){
      this.draw(result);
      if(typeof RealtimeEval !== 'undefined') RealtimeEval.update(result);
    } else {
      // 外部 API 全失敗 → fallback 到 App 歷史資料
      this.drawFromApp();
      if(typeof RealtimeEval !== 'undefined') RealtimeEval.updateFromApp();
    }
  },

  /** 使用 TradingView iframe 顯示真實分時圖（不受 CORS 限制） */
  drawFromApp(){
    if(typeof App === 'undefined' || !App.rows?.length) {
      this._showErr('資料尚未載入，請稍後重試');
      return;
    }
    const rows = App.rows;
    const n    = rows.length;
    const last = rows[n-1];
    const prevClose = n >= 2 ? rows[n-2].close : rows[n-1].close;
    const lastClose = last.close;

    // 更新 stat chips（用歷史最後一筆）
    const g     = id => document.getElementById(id);
    const chg   = lastClose - prevClose;
    const chgP  = prevClose ? chg / prevClose * 100 : 0;
    const color = chg >= 0 ? 'var(--green)' : 'var(--red)';
    if(g('id-cur')){ g('id-cur').textContent = lastClose.toFixed(2); g('id-cur').style.color = color; }
    if(g('id-chg')){ g('id-chg').innerHTML = `${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(2)} (${chg>=0?'+':''}${chgP.toFixed(2)}%)`; g('id-chg').style.color = color; }
    if(g('id-open'))  g('id-open').textContent  = last.open?.toFixed(2) ?? '--';
    if(g('id-high'))  g('id-high').textContent  = last.high?.toFixed(2) ?? '--';
    if(g('id-low'))   g('id-low').textContent   = last.low?.toFixed(2)  ?? '--';
    if(g('id-vol'))   g('id-vol').textContent   = last.vol ? (last.vol/1000).toFixed(0)+'K 張' : '--';
    if(g('id-prev'))  g('id-prev').textContent  = prevClose.toFixed(2);

    // 銷毀任何舊 Chart.js 實例
    if(this._chart){ try{ this._chart.destroy(); }catch{} this._chart = null; }

    const canvas  = document.getElementById('intraday-canvas');
    const tvWrap  = document.getElementById('tv-wrap');
    const errEl   = document.getElementById('intraday-err');
    const labelEl = document.querySelector('.intraday-label');
    if(errEl) errEl.style.display = 'none';

    // ── TradingView iframe（不受 CORS、適用 file:// 及任何 HTTPS domain）──
    if(tvWrap){
      const isLight = document.body.classList.contains('light');
      const theme   = isLight ? 'light' : 'dark';
      const bg      = isLight ? 'f0f4f8' : '141728';
      const params  = new URLSearchParams({
        frameElementId : 'tv_2330',
        symbol         : 'TWSE:2330',
        interval       : '5',
        hidesidetoolbar: '1',
        hidetoptoolbar : '0',
        symboledit     : '0',
        saveimage      : '0',
        toolbarbg      : bg,
        studies        : '[]',
        theme          : theme,
        style          : '1',
        timezone       : 'Asia/Taipei',
        withdateranges : '0',
        locale         : 'zh_TW',
      }).toString();
      const src = `https://s3.tradingview.com/widgetembed/?${params}`;

      // 若已有 iframe 且 src 未改變，略過重建（避免 5 分鐘刷新時閃爍）
      const existingIframe = tvWrap.querySelector('iframe');
      if(!existingIframe || existingIframe.src !== src){
        tvWrap.innerHTML = `<iframe src="${src}"
          style="width:100%;height:100%;border:none;border-radius:8px"
          allowtransparency="true" scrolling="no" frameborder="0"></iframe>`;
      }
      tvWrap.style.display  = 'block';
      if(canvas) canvas.style.display = 'none';
      if(labelEl) labelEl.textContent = '📈 分時走勢（TradingView · 5分）';
      if(g('id-itime')) g('id-itime').textContent =
        new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) + ' 更新';
    } else {
      // tv-wrap 不存在 → 退回歷史收盤圖
      this._drawHistorical();
    }
  },

  /** Fallback：用 Chart.js 畫近 20 個交易日收盤走勢 */
  _drawHistorical(){
    if(typeof App === 'undefined' || !App.rows?.length) return;
    const rows = App.rows;
    const n    = rows.length;
    const days = Math.min(20, n);
    const slice = rows.slice(-days);
    const labels = slice.map(r => {
      const m = r.date.getMonth() + 1, d = r.date.getDate();
      return `${m}/${d}`;
    });
    const closes    = slice.map(r => r.close);
    const prevClose = n >= 2 ? rows[n-2].close : rows[n-1].close;
    const lastClose = rows[n-1].close;
    const isUp = lastClose >= prevClose;
    const clr  = isUp ? '#10b981' : '#ef4444';

    if(this._chart){ try{ this._chart.destroy(); }catch{} this._chart = null; }
    const canvas = document.getElementById('intraday-canvas');
    if(!canvas) return;
    canvas.style.display = '';
    const ctx = canvas.getContext('2d');
    const isLight = document.body.classList.contains('light');
    const gridCol = isLight ? 'rgba(0,0,0,.06)' : 'rgba(255,255,255,.05)';
    const tickCol = isLight ? '#475569' : '#94a3b8';
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.offsetHeight || 210);
    grad.addColorStop(0, isUp ? 'rgba(16,185,129,.22)' : 'rgba(239,68,68,.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    this._chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: '收盤價', data: closes, borderColor: clr,
          backgroundColor: grad, borderWidth: 1.5, fill: true,
          pointRadius: 2, pointHoverRadius: 5, tension: 0.2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: '#1c2038', titleColor: '#f1f5f9', bodyColor: '#94a3b8',
            callbacks: { label: i => ` 收盤 ${i.raw?.toFixed(2)}` } } },
        scales: {
          x: { ticks: { color: tickCol, font:{ size:10 }, maxRotation:0 }, grid:{ color: gridCol } },
          y: { ticks: { color: tickCol, font:{ size:10 } }, grid:{ color: gridCol }, position:'right' }
        }
      }
    });

    const last = rows[n-1];
    const g = id => document.getElementById(id);
    if(g('id-itime')) g('id-itime').textContent = `${last.dateStr} 歷史收盤（近 ${days} 日）`;
    const labelEl = document.querySelector('.intraday-label');
    if(labelEl) labelEl.textContent = `📈 近期收盤走勢（近 ${days} 個交易日）`;
    const err = document.getElementById('intraday-err');
    if(err) err.style.display = 'none';
  },

  start(){
    this.update();
    clearInterval(this._timer);
    this._timer = setInterval(() => this.update(), this.INTERVAL_MS);
  },

  stop(){ clearInterval(this._timer); }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: REALTIME BUY/SELL EVAL（即時買賣評估）
   根據分時資料計算 6 項盤中訊號，綜合評分後給出操作建議
   ═══════════════════════════════════════════════════════════════ */
const RealtimeEval = {

  // ── 平滑機制：保留最近 5 次原始分數，用加權平均避免跳動 ──
  _scoreHistory: [],
  _smoothScore(rawScore){
    this._scoreHistory.push(rawScore);
    if(this._scoreHistory.length > 5) this._scoreHistory.shift();
    // 加權平均：越新的權重越高 (1,1,2,3,5)
    const weights = [1, 1, 2, 3, 5];
    const n = this._scoreHistory.length;
    const w = weights.slice(weights.length - n);
    const wSum = w.reduce((a, b) => a + b, 0);
    const weighted = this._scoreHistory.reduce((acc, s, i) => acc + s * w[i], 0) / wSum;
    return Math.round(weighted * 10) / 10; // 保留 1 位小數
  },

  /** 從 Yahoo Finance 分時結果 + App.ind 計算評分 */
  update(intradayResult){
    const g = id => document.getElementById(id);
    if(!g('re-verdict-label') || !g('re-score-num')) return;

    const meta   = intradayResult?.meta;
    const stamps = intradayResult?.timestamp ?? [];
    const quotes = intradayResult?.indicators?.quote?.[0] ?? {};
    const rawCloses = quotes.close ?? [];

    // 過濾有效 1-min close
    const closes = rawCloses.filter(c => c != null);

    if(!meta || closes.length < 5){
      this._showClosed('分時資料不足，評估暫停');
      return;
    }

    const cur       = meta.regularMarketPrice ?? closes[closes.length-1];
    const prevClose = meta.chartPreviousClose ?? meta.previousClose ?? cur;
    const todayH    = meta.regularMarketDayHigh ?? cur;
    const todayL    = meta.regularMarketDayLow  ?? cur;
    const todayVol  = meta.regularMarketVolume  ?? 0;

    // 歷史指標（來自 App.ind，上次 render() 後即可用）
    // 使用 optional chaining 防止 App.ind 尚未初始化時拋出異常
    const ind  = (typeof App !== 'undefined' && App.ind) ? App.ind : {};
    const n    = ind.closes?.length ?? 0;
    const ma5  = (n > 0 && Array.isArray(ind.ma5))  ? (ind.ma5[n-1]  ?? null) : null;
    const ma20 = (n > 0 && Array.isArray(ind.ma20)) ? (ind.ma20[n-1] ?? null) : null;
    const ma60 = (n > 0 && Array.isArray(ind.ma60)) ? (ind.ma60[n-1] ?? null) : null;
    const histVolMA = (Array.isArray(ind.vols) && n >= 20)
      ? ind.vols.slice(-20).reduce((a,b)=>a+b,0)/20 : null;

    // ── 1. 盤中動能：最近 15 根 1-min 的漲跌幅 ──
    const mom = this._momentum(closes, 15);
    // ── 2. 盤中 RSI(14)，1-min K ──
    const iRSI = this._rsi(closes, 14);
    // ── 3. 今日價格位置（在高低點中的百分比） ──
    const range = todayH - todayL;
    const posRaw = range > 0 ? (cur - todayL) / range : 0.5;
    // ── 4. vs 昨收 ──
    const vsClose = prevClose > 0 ? (cur - prevClose) / prevClose * 100 : 0;
    // ── 5. 量能節奏（推估全日量 vs 歷史均量） ──
    const volRatio = this._volPaceRatio(todayVol, histVolMA);
    // ── 6. 均線位置 ──
    const maScore = this._maScore(cur, ma5, ma20, ma60);

    // ═══ 計算加權總分（-10 ~ +10）═══
    let score = 0;
    const sigs = [];

    // 動能（±2）—— 加 2% 緩衝帶避免 0.1%/0.3% 邊界頻繁翻轉
    const momScore = mom > 0.35 ? 2 : mom > 0.15 ? 1 : mom < -0.35 ? -2 : mom < -0.15 ? -1 : 0;
    score += momScore;
    sigs.push({
      label: '盤中動能（15分）',
      val: `${mom >= 0 ? '+' : ''}${mom.toFixed(2)}%`,
      note: momScore >= 1 ? '上升趨勢' : momScore <= -1 ? '下跌趨勢' : '橫盤整理',
      clr: momScore > 0 ? 'g' : momScore < 0 ? 'r' : 'n'
    });

    // RSI（±2）—— 加 3 點緩衝帶：超賣 <27（非 <25）、偏低 <37（非 <35）
    if(iRSI !== null){
      const rs = iRSI < 27 ? 2 : iRSI < 37 ? 1 : iRSI > 73 ? -2 : iRSI > 63 ? -1 : 0;
      score += rs;
      sigs.push({
        label: '盤中 RSI（14 分鐘）',
        val: iRSI.toFixed(1),
        note: iRSI < 30 ? '⚡超賣區' : iRSI < 40 ? '偏低' : iRSI > 70 ? '⚠超買區' : iRSI > 60 ? '偏高' : '中性',
        clr: rs > 0 ? 'g' : rs < 0 ? 'r' : 'n'
      });
    }

    // 位置（±1.5）—— 擴大中性帶：0.10~0.90 都視為中性（原 0.12/0.88）
    const posScore = posRaw < 0.10 ? 1.5 : posRaw < 0.22 ? 0.7 : posRaw > 0.90 ? -1.5 : posRaw > 0.78 ? -0.7 : 0;
    score += posScore;
    sigs.push({
      label: '日內位置',
      val: `高低區間 ${(posRaw*100).toFixed(0)}%`,
      note: posRaw < 0.25 ? '靠近今日低點' : posRaw > 0.75 ? '靠近今日高點' : '中段整理',
      clr: posScore > 0 ? 'g' : posScore < 0 ? 'r' : 'n'
    });

    // vs 昨收（±1）
    const vcScore = vsClose > 0.5 ? 1 : vsClose > 0 ? 0.3 : vsClose < -0.5 ? -1 : -0.3;
    score += vcScore;
    sigs.push({
      label: 'vs 昨收',
      val: `${vsClose >= 0 ? '▲' : '▼'} ${Math.abs(vsClose).toFixed(2)}%`,
      note: vsClose >= 0 ? `高於昨收 ${prevClose?.toFixed(0)}` : `低於昨收 ${prevClose?.toFixed(0)}`,
      clr: vcScore > 0 ? 'g' : 'r'
    });

    // 量能（±1.5，方向加乘）
    if(volRatio !== null){
      const dir  = vsClose >= 0 ? 1 : -1;
      const vSc  = volRatio > 1.8 ? 1.5 * dir : volRatio > 1.2 ? 0.7 * dir : volRatio < 0.4 ? -0.3 : 0;
      score += vSc;
      sigs.push({
        label: '量能節奏',
        val: `${volRatio.toFixed(1)}× 均量`,
        note: volRatio > 1.5 ? (dir > 0 ? '量增價漲 ✅' : '量增價跌 ⚠') : volRatio < 0.5 ? '縮量觀望' : '量能正常',
        clr: vSc > 0 ? 'g' : vSc < 0 ? 'r' : 'n'
      });
    }

    // 均線（±2）
    score += maScore.score;
    sigs.push({
      label: '均線位置',
      val: maScore.label,
      note: maScore.note,
      clr: maScore.score > 0 ? 'g' : maScore.score < 0 ? 'r' : 'n'
    });

    // 夾緊到 -10 ~ +10，並套用平滑（避免每次重整跳動）
    const rawScore = Math.max(-10, Math.min(10, +score.toFixed(1)));
    score = this._smoothScore(rawScore);

    // ═══ 對應建議 ═══
    let emoji, rec, recClr;
    if     (score >= 4)  { emoji='🟢'; rec='強勢加碼';  recClr='var(--green)'; }
    else if(score >= 1.5){ emoji='🟡'; rec='偏多布局';  recClr='var(--green2)'; }
    else if(score >= -1.5){ emoji='⚪'; rec='中性觀望'; recClr='var(--t2)'; }
    else if(score >= -4) { emoji='🟡'; rec='偏空觀望';  recClr='var(--yellow)'; }
    else                 { emoji='🔴'; rec='考慮減碼';  recClr='var(--red)'; }

    // ═══ 更新 DOM ═══
    const scoreStr = (score >= 0 ? '+' : '') + score;
    const subText  = score >= 4  ? '多項技術指標同步偏多，動能強勁'
                   : score >= 1.5 ? '多方訊號略多，可分批留意布局時機'
                   : score >= -1.5 ? '多空訊號拉鋸，建議靜待更明確方向'
                   : score >= -4 ? '空方訊號偏強，建議保守觀望或輕持'
                   : '多項指標轉弱，控制部位、嚴守停損';
    const verdictBg = score >= 2  ? 'rgba(16,185,129,.1)'
                    : score >= 0  ? 'rgba(16,185,129,.05)'
                    : score >= -2 ? 'rgba(245,158,11,.07)'
                    : 'rgba(239,68,68,.1)';
    if(g('re-emoji'))         g('re-emoji').textContent = emoji;
    if(g('re-score-num'))   { g('re-score-num').textContent = scoreStr; g('re-score-num').style.color = recClr; }
    if(g('re-verdict-score')){ g('re-verdict-score').textContent = scoreStr; g('re-verdict-score').style.color = recClr; }
    if(g('re-verdict-label')){ g('re-verdict-label').textContent = rec; g('re-verdict-label').style.color = recClr; }
    if(g('re-verdict-sub'))   g('re-verdict-sub').textContent = subText;
    if(g('re-verdict'))       g('re-verdict').style.background = verdictBg;

    // 進度條：-10→0→+10，左半紅，右半綠
    const bar = g('re-bar');
    if(bar){
      if(score >= 0){
        const pct = (score / 10 * 50);
        bar.style.left  = '50%';
        bar.style.width = pct + '%';
        bar.style.background = 'var(--green)';
      } else {
        const pct = (Math.abs(score) / 10 * 50);
        bar.style.left  = (50 - pct) + '%';
        bar.style.width = pct + '%';
        bar.style.background = 'var(--red)';
      }
    }

    // 訊號卡片
    const sigEl = g('re-signals');
    if(sigEl){
      const clrMap = { g:'var(--green)', r:'var(--red)', n:'var(--t2)', y:'var(--yellow)', c:'var(--cyan)' };
      sigEl.innerHTML = sigs.map(s => `
        <div class="re-sig">
          <div class="re-sig-label">${s.label}</div>
          <div class="re-sig-val" style="color:${clrMap[s.clr]??clrMap.n}">${s.val}</div>
          <div class="re-sig-note">${s.note}</div>
        </div>`).join('');
    }

    if(g('re-time')) g('re-time').textContent =
      new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  },

  _showClosed(msg){
    const g = id => document.getElementById(id);
    if(g('re-signals')) g('re-signals').innerHTML =
      `<div class="re-sig" style="grid-column:1/-1;text-align:center;color:var(--t2);padding:16px">${msg}</div>`;
  },

  /**
   * 直接用 App.ind 歷史技術指標計算評估（不依賴分時資料）
   * 這樣在盤後或 API 失敗時，仍能顯示有意義的分析
   */
  updateFromApp(){
    const g = id => document.getElementById(id);
    if(!g('re-verdict-label') || !g('re-score-num')) return;
    if(typeof App === 'undefined' || !App.ind?.closes?.length){
      this._showClosed('App 資料尚未載入');
      return;
    }
    const ind  = App.ind;
    const rows = App.rows;
    const n    = ind.closes.length;
    const cur  = ind.closes[n-1];
    const prev = ind.closes[n-2] ?? cur;

    // 直接用歷史指標計算（與 renderBuySellPanel 同邏輯）
    const cK   = ind.K?.[n-1], cD = ind.D?.[n-1];
    const cRSI = ind.rsi?.[n-1];
    const cBoll= ind.boll?.[n-1];
    const cHist= ind.hist?.[n-1], pHist = ind.hist?.[n-2];
    const cVol = ind.vols?.[n-1], cVolMA = ind.volMA?.[n-1];
    const ma5  = ind.ma5?.[n-1], ma20 = ind.ma20?.[n-1], ma60 = ind.ma60?.[n-1];
    const bollPos = cBoll ? (cur - cBoll.lower) / (cBoll.upper - cBoll.lower) : 0.5;

    let score = 0;
    const sigs = [];

    // RSI —— 加 3 點緩衝帶（<27 才算超賣，>73 才算超買）
    if(cRSI != null){
      const rs = cRSI < 27 ? 2 : cRSI < 37 ? 1 : cRSI > 73 ? -2 : cRSI > 63 ? -1 : 0;
      score += rs;
      sigs.push({ label:'RSI(14)', val: cRSI.toFixed(1),
        note: cRSI<30?'超賣':cRSI<40?'偏低':cRSI>70?'超買':cRSI>60?'偏高':'中性',
        clr: rs>0?'g':rs<0?'r':'n' });
    }

    // KD —— 加 2 點緩衝帶（<28 才算低檔金叉，>72 才算高檔死叉）
    if(cK!=null && cD!=null){
      const kdB = cK<28 && cK>cD, kdS = cK>72 && cK<cD;
      const ks = kdB ? 1.5 : kdS ? -1.5 : 0;
      score += ks;
      sigs.push({ label:'KD', val:`K ${cK.toFixed(1)} / D ${cD.toFixed(1)}`,
        note: kdB?'黃金交叉 低檔':kdS?'死亡交叉 高檔':'無明顯訊號', clr: ks>0?'g':ks<0?'r':'n' });
    }

    // MACD
    if(cHist!=null && pHist!=null){
      const macdFlip = pHist<0 && cHist>0;
      const macdDecay = cHist>0 && pHist!=null && cHist<pHist;
      const ms = macdFlip ? 2 : macdDecay ? -1 : cHist>0 ? 0.5 : cHist<0 ? -0.5 : 0;
      score += ms;
      sigs.push({ label:'MACD 柱狀', val: cHist.toFixed(2),
        note: macdFlip?'由負翻正 強買':macdDecay?'多頭縮減':cHist>0?'正值偏多':'負值偏空',
        clr: ms>0?'g':ms<0?'r':'n' });
    }

    // 布林位置
    if(cBoll){
      const bps = bollPos<0.15?1.5:bollPos<0.25?0.5:bollPos>0.85?-1.5:bollPos>0.75?-0.5:0;
      score += bps;
      sigs.push({ label:'布林位置', val:`${(bollPos*100).toFixed(0)}%`,
        note: bollPos<0.2?'接近下軌（支撐）':bollPos>0.8?'接近上軌（壓力）':'通道中段',
        clr: bps>0?'g':bps<0?'r':'n' });
    }

    // 均線
    const maS = this._maScore(cur, ma5, ma20, ma60);
    score += maS.score;
    sigs.push({ label:'均線位置', val: maS.label, note: maS.note, clr: maS.score>0?'g':maS.score<0?'r':'n' });

    // 量能
    if(cVol && cVolMA){
      const vr = cVol/cVolMA;
      const dir = cur>prev ? 1 : -1;
      const vs = vr>1.5 ? 1*dir : vr<0.5 ? -0.3 : 0;
      score += vs;
      sigs.push({ label:'量能', val:`${vr.toFixed(1)}× 均量`,
        note: vr>1.5?(dir>0?'量增價漲':'量增價跌'):vr<0.5?'縮量':'量能正常',
        clr: vs>0?'g':vs<0?'r':'n' });
    }

    // 套用平滑（與 update() 共用同一段歷史，避免盤後值跳動）
    const rawScore2 = Math.max(-10, Math.min(10, +score.toFixed(1)));
    score = this._smoothScore(rawScore2);

    let emoji, rec, recClr;
    if(score>=4)        { emoji='🟢'; rec='建議偏多';   recClr='var(--green)'; }
    else if(score>=1.5) { emoji='🟡'; rec='略偏多觀望'; recClr='var(--green2)'; }
    else if(score>=-1.5){ emoji='⚪'; rec='中性觀望';   recClr='var(--t2)'; }
    else if(score>=-4)  { emoji='🟡'; rec='略偏空觀望'; recClr='var(--yellow)'; }
    else                { emoji='🔴'; rec='建議偏空';   recClr='var(--red)'; }

    const scoreStr2 = (score>=0?'+':'')+score;
    const subText2  = score >= 4  ? '多項歷史技術指標同步偏多，趨勢強勁'
                    : score >= 1.5 ? '歷史指標偏多，可留意布局時機'
                    : score >= -1.5 ? '多空訊號拉鋸，建議靜待更明確方向'
                    : score >= -4 ? '指標偏弱，建議保守觀望或縮小部位'
                    : '多項指標轉弱，嚴守停損、控制部位';
    const verdictBg2 = score >= 2  ? 'rgba(16,185,129,.1)'
                     : score >= 0  ? 'rgba(16,185,129,.05)'
                     : score >= -2 ? 'rgba(245,158,11,.07)'
                     : 'rgba(239,68,68,.1)';
    if(g('re-emoji'))         { g('re-emoji').textContent = emoji; g('re-emoji').setAttribute('title','基於歷史收盤技術指標，非盤中即時評估'); }
    if(g('re-score-num'))    { g('re-score-num').textContent=scoreStr2; g('re-score-num').style.color=recClr; }
    if(g('re-verdict-score')){ g('re-verdict-score').textContent=scoreStr2; g('re-verdict-score').style.color=recClr; }
    if(g('re-verdict-label')){ g('re-verdict-label').textContent=rec; g('re-verdict-label').style.color=recClr; }
    if(g('re-verdict-sub'))   g('re-verdict-sub').textContent = subText2;
    if(g('re-verdict'))       g('re-verdict').style.background = verdictBg2;
    const bar = g('re-bar');
    if(bar){
      if(score>=0){ bar.style.left='50%'; bar.style.width=(score/10*50)+'%'; bar.style.background='var(--green)'; }
      else { const p=Math.abs(score)/10*50; bar.style.left=(50-p)+'%'; bar.style.width=p+'%'; bar.style.background='var(--red)'; }
    }
    const clrMap={g:'var(--green)',r:'var(--red)',n:'var(--t2)',y:'var(--yellow)'};
    if(g('re-signals')) g('re-signals').innerHTML = sigs.map(s=>`
      <div class="re-sig">
        <div class="re-sig-label">${s.label}</div>
        <div class="re-sig-val" style="color:${clrMap[s.clr]??clrMap.n}">${s.val}</div>
        <div class="re-sig-note">${s.note}</div>
      </div>`).join('');
    const last = rows?.[n-1];
    if(g('re-time')) g('re-time').textContent = (last?.dateStr ?? '') + ' 收盤資料';
  },

  /** 最近 n 根 1-min 的漲跌幅（%） */
  _momentum(closes, n){
    if(closes.length < n + 1) n = closes.length - 1;
    if(n < 1) return 0;
    const prev = closes[closes.length - 1 - n];
    const cur  = closes[closes.length - 1];
    return prev > 0 ? (cur - prev) / prev * 100 : 0;
  },

  /** 簡易 RSI(period) */
  _rsi(closes, period){
    if(closes.length < period + 1) return null;
    const slice = closes.slice(-(period + 1));
    let g = 0, l = 0;
    for(let i = 1; i < slice.length; i++){
      const d = slice[i] - slice[i-1];
      if(d > 0) g += d; else l += Math.abs(d);
    }
    const ag = g / period, al = l / period;
    return al === 0 ? 100 : +(100 - 100 / (1 + ag / al)).toFixed(2);
  },

  /** 推估全日量 vs 歷史均量的比率 */
  _volPaceRatio(todayVol, histAvgVol){
    if(!todayVol || !histAvgVol) return null;
    const now      = new Date();
    const open     = new Date(now); open.setHours(9, 0, 0, 0);
    const totalMs  = 4.5 * 3600 * 1000;
    const elapsed  = Math.min(Math.max(now - open, 1), totalMs);
    const pacedVol = todayVol / (elapsed / totalMs);
    return +(pacedVol / histAvgVol).toFixed(2);
  },

  /** 均線位置評分（加 0.3% 緩衝帶，避免價格貼著均線時分數來回跳動） */
  _maScore(cur, ma5, ma20, ma60){
    let score = 0, parts = [], note = '';
    const buf = 0.003; // 0.3% 緩衝帶
    if(ma5)  { if(cur > ma5*(1+buf))  { score += 0.5; parts.push('MA5 ✅'); } else if(cur < ma5*(1-buf)) { score -= 0.5; parts.push('MA5 ✗'); } else parts.push('MA5 ～'); }
    if(ma20) { if(cur > ma20*(1+buf)) { score += 0.8; parts.push('MA20 ✅'); } else if(cur < ma20*(1-buf)) { score -= 0.8; parts.push('MA20 ✗'); } else parts.push('MA20 ～'); }
    if(ma60) { if(cur > ma60*(1+buf)) { score += 0.7; parts.push('MA60 ✅'); } else if(cur < ma60*(1-buf)) { score -= 0.7; parts.push('MA60 ✗'); } else parts.push('MA60 ～'); }
    const label = parts.length ? parts.join(' ') : '均線資料不足';
    if(score >= 1.5)       note = '站上多條均線，結構偏多';
    else if(score >= 0.5)  note = '部分均線支撐';
    else if(score <= -1.5) note = '跌破多條均線，結構偏空';
    else if(score <= -0.5) note = '部分均線壓制';
    else                   note = '均線多空交雜';
    return { score: +score.toFixed(2), label, note };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: AUTO-REFRESH TIMER
   ═══════════════════════════════════════════════════════════════ */
const AutoRefresh = {
  INTERVAL_S: 300,
  _remaining: 300,
  _paused: false,
  _timer: null,
  start(){
    this._remaining = this.INTERVAL_S;
    clearInterval(this._timer);
    this._timer = setInterval(() => this._tick(), 1000);
  },
  _tick(){
    if(this._paused) return;
    this._remaining--;
    this._updateDisplay();
    if(this._remaining <= 0){
      this._remaining = this.INTERVAL_S;
      App.reload(false);
    }
  },
  _updateDisplay(){
    const el = document.getElementById('ar-countdown');
    if(!el) return;
    const m = Math.floor(this._remaining / 60);
    const s = this._remaining % 60;
    el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  },
  toggle(){
    this._paused = !this._paused;
    const btn = document.getElementById('ar-pause-btn');
    if(btn) btn.textContent = this._paused ? '▶' : '⏸';
    if(btn) btn.title = this._paused ? '繼續自動刷新' : '暫停自動刷新';
  },
  reset(){
    this._remaining = this.INTERVAL_S;
    this._updateDisplay();
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: PRICE ALERT
   ═══════════════════════════════════════════════════════════════ */
const PriceAlert = {
  KEY: 'tsmc_price_alerts_v1',
  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY)) || []; }catch{ return []; } },
  save(a){ try{ localStorage.setItem(this.KEY, JSON.stringify(a)); }catch{} },
  add(price, type){
    const a = this.load();
    a.push({ price: parseFloat(price), type, id: Date.now(), triggered: false });
    this.save(a);
  },
  remove(id){
    this.save(this.load().filter(x => x.id !== id));
    this.renderList();
    // update button badge
    const btn = document.getElementById('alert-btn');
    if(btn){ const cnt = this.load().filter(x=>!x.triggered).length; btn.className = 'alert-btn' + (cnt?' has-alerts':''); btn.textContent = cnt ? `🔔 警報 (${cnt})` : '🔔 警報'; }
  },
  check(currentPrice){
    if(!currentPrice || isNaN(currentPrice)) return;
    const a = this.load();
    let changed = false;
    a.forEach(al => {
      if(al.triggered) return;
      const hit = al.type === 'above' ? currentPrice >= al.price : currentPrice <= al.price;
      if(hit){ al.triggered = true; changed = true; this._notify(al, currentPrice); }
    });
    if(changed) this.save(a);
  },
  _notify(al, price){
    const dir = al.type === 'above' ? '突破' : '跌破';
    const msg = `台積電 ${dir} ${al.price} 元！目前收盤 ${price} 元`;
    if(Notification.permission === 'granted'){
      try{ new Notification('台積電價格警報 🔔', { body: msg }); }catch{}
    }
    App.showPriceAlertToast(msg);
  },
  togglePanel(){
    const panel = document.getElementById('alert-panel');
    if(panel) panel.classList.toggle('open');
  },
  renderList(){
    const el = document.getElementById('alert-list');
    if(!el) return;
    const a = this.load();
    if(!a.length){
      el.innerHTML = '<div style="font-size:0.75rem;color:var(--t2);padding:4px 0">尚無設定警報</div>';
      return;
    }
    el.innerHTML = a.map(x => `
      <div class="alert-item">
        <span class="ai-type ${x.type==='above'?'up':'dn'}">${x.type==='above'?'突破':'跌破'}</span>
        <span class="ai-price">${x.price}</span>
        <span class="ai-done">${x.triggered ? '✓已觸發' : ''}</span>
        <button class="ai-del" onclick="PriceAlert.remove(${x.id})" title="刪除">×</button>
      </div>`).join('');
  },
  addFromUI(){
    const priceEl = document.getElementById('alert-price');
    const typeEl  = document.getElementById('alert-type');
    const price = parseFloat(priceEl.value);
    if(isNaN(price) || price <= 0){ alert('請輸入有效的目標價格'); return; }
    this.requestPermission();
    this.add(price, typeEl.value);
    this.renderList();
    priceEl.value = '';
    // update badge
    const btn = document.getElementById('alert-btn');
    if(btn){ const cnt = this.load().filter(x=>!x.triggered).length; btn.className = 'alert-btn has-alerts'; btn.textContent = `🔔 警報 (${cnt})`; }
  },
  requestPermission(){
    if(typeof Notification !== 'undefined' && Notification.permission === 'default'){
      Notification.requestPermission();
    }
  }
};

const ScoreHistory = {
  KEY: 'tsmc_score_history_v1',

/* ═══════════════════════════════════════════════════════════════
   FEATURE: COLLAPSIBLE SECTIONS
   ═══════════════════════════════════════════════════════════════ */
function initCollapsible(){
  const STORAGE_KEY = 'tsmc_collapsed_v1';
  let collapsed = {};
  try{ collapsed = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch{}

  const app = document.getElementById('app');
  if(!app) return;

  const secs = Array.from(app.querySelectorAll('.sec'));
  secs.forEach(sec => {
    // collect siblings until next .sec or end
    const siblings = [];
    let el = sec.nextElementSibling;
    while(el && !el.classList.contains('sec')){
      siblings.push(el);
      el = el.nextElementSibling;
    }
    if(!siblings.length) return;

    // unique key from section text (first 30 chars, strip emoji)
    const key = sec.textContent.trim().replace(/[^\w\u4e00-\u9fff]/g,'').slice(0,20);

    // wrap siblings in a sec-body div
    const wrap = document.createElement('div');
    wrap.className = 'sec-body';
    wrap.dataset.secKey = key;
    sec.parentNode.insertBefore(wrap, siblings[0]);
    siblings.forEach(s => wrap.appendChild(s));

    // toggle button
    const btn = document.createElement('button');
    btn.className = 'sec-toggle' + (collapsed[key] ? ' collapsed' : '');
    btn.title = '收折 / 展開';
    btn.innerHTML = '▾';
    btn.addEventListener('click', () => {
      const isNowCollapsed = wrap.classList.toggle('collapsed');
      btn.classList.toggle('collapsed', isNowCollapsed);
      collapsed[key] = isNowCollapsed;
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(collapsed)); }catch{}
    });
    sec.appendChild(btn);

    // restore saved state
    if(collapsed[key]) wrap.classList.add('collapsed');
  });
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE: KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════════════════ */
function initKeyboardShortcuts(){
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if(e.ctrlKey || e.metaKey || e.altKey) return;
    switch(e.key.toLowerCase()){
      case 'r':
        App.reload(true);
        break;
      case 't':
        Theme.toggle();
        break;
      case 'a': {
        PriceAlert.togglePanel();
        PriceAlert.renderList();
        break;
      }
      case '?':
      case '/': {
        const ov = document.getElementById('kbd-overlay');
        if(ov) ov.classList.toggle('open');
        break;
      }
      case 'escape': {
        document.getElementById('kbd-overlay')?.classList.remove('open');
        document.getElementById('alert-panel')?.classList.remove('open');
        const mo = document.getElementById('modal-overlay');
        if(mo) mo.classList.remove('open');
        break;
      }
    }
  });
  // close alert panel on outside click
  document.addEventListener('click', e => {
    const panel = document.getElementById('alert-panel');
    const btn   = document.getElementById('alert-btn');
    if(panel && panel.classList.contains('open')){
      if(!panel.contains(e.target) && e.target !== btn && !btn?.contains(e.target)){
        panel.classList.remove('open');
      }
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE 5: K線型態偵測 (CandlePattern)
   偵測: Hammer / Shooting Star / Doji / Bullish Engulfing /
         Bearish Engulfing / Morning Star / Evening Star
   ═══════════════════════════════════════════════════════════════ */
const CandlePattern = {
  detect(rows){
    const patterns = [];
    const n = rows.length;
    if(n < 3) return patterns;

    const r0 = rows[n-1]; // 今日
    const r1 = rows[n-2]; // 昨日
    const r2 = rows[n-3]; // 前日

    const body0  = Math.abs(r0.close - r0.open);
    const range0 = r0.high - r0.low;
    const body1  = Math.abs(r1.close - r1.open);
    const range1 = r1.high - r1.low || 0.01;
    const body2  = Math.abs(r2.close - r2.open);

    const isBull0 = r0.close >= r0.open;
    const isBull1 = r1.close >= r1.open;
    const isBear1 = !isBull1;

    const upperShadow0 = r0.high - Math.max(r0.open, r0.close);
    const lowerShadow0 = Math.min(r0.open, r0.close) - r0.low;
    const upperShadow1 = r1.high - Math.max(r1.open, r1.close);
    const lowerShadow1 = Math.min(r1.open, r1.close) - r1.low;

    // 1. Doji (十字星)
    if(body0 / (range0 || 1) < 0.08 && range0 > 0){
      patterns.push({ name: '十字星', type: 'Doji', dir: 'neut', icon: '✤', desc: '多空均衡，注意轉折' });
    }

    // 2. Hammer (槌子) — 下跌後出現
    if(lowerShadow0 >= body0 * 2.5 && upperShadow0 <= body0 * 0.5 && range0 > 0 && body0 / range0 > 0.05){
      patterns.push({ name: '槌子', type: 'Hammer', dir: 'bull', icon: '🔨', desc: '潛在底部反轉訊號' });
    }

    // 3. Shooting Star (射擊之星) — 上漲後出現
    if(upperShadow0 >= body0 * 2.5 && lowerShadow0 <= body0 * 0.5 && range0 > 0 && body0 / range0 > 0.05){
      patterns.push({ name: '射擊之星', type: 'ShootingStar', dir: 'bear', icon: '🌠', desc: '潛在頂部反轉訊號' });
    }

    // 4. Bullish Engulfing (多頭吞噬)
    if(isBear1 && isBull0 && r0.open <= r1.close && r0.close >= r1.open && body0 > body1){
      patterns.push({ name: '多頭吞噬', type: 'BullEngulf', dir: 'bull', icon: '🟢', desc: '強力反彈訊號' });
    }

    // 5. Bearish Engulfing (空頭吞噬)
    if(isBull1 && !isBull0 && r0.open >= r1.close && r0.close <= r1.open && body0 > body1){
      patterns.push({ name: '空頭吞噬', type: 'BearEngulf', dir: 'bear', icon: '🔴', desc: '強力下跌訊號' });
    }

    // 6. Morning Star (晨星) — 三日型態
    if(isBear1 && body1 < range1 * 0.3 && isBull0 && r0.close > (r2.open + r2.close) / 2 && !isBull1){
      // 需要 r2 是大陰線
      if(rows[n-3].close < rows[n-3].open && body2 > 0){
        patterns.push({ name: '晨星', type: 'MorningStar', dir: 'bull', icon: '🌅', desc: '底部三日反轉型態' });
      }
    }

    // 7. Evening Star (暮星) — 三日型態
    if(isBull1 && body1 < range1 * 0.3 && !isBull0 && r0.close < (r2.open + r2.close) / 2){
      if(rows[n-3].close > rows[n-3].open && body2 > 0){
        patterns.push({ name: '暮星', type: 'EveningStar', dir: 'bear', icon: '🌆', desc: '頂部三日反轉型態' });
      }
    }

    return patterns;
  }
};

/* ═══════════════════════════════════════════════════════════════
   FEATURE 3: 指標推播通知 (IndicatorAlerts)
   ═══════════════════════════════════════════════════════════════ */
const IndicatorAlerts = {
  _alerts: [],
  _lastCheck: null,

  evaluate(ctx){
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const newAlerts = [];

    // KD 黃金交叉
    if(ctx.pK <= ctx.pD && ctx.cK > ctx.cD && ctx.cK < 50){
      newAlerts.push({ level:'success', icon:'🟢', title:'KD 黃金交叉（低檔）', desc:`K=${ctx.cK.toFixed(1)} 上穿 D=${ctx.cD.toFixed(1)}，低檔買入訊號`, time: timeStr });
    }
    // KD 死亡交叉
    if(ctx.pK >= ctx.pD && ctx.cK < ctx.cD && ctx.cK > 50){
      newAlerts.push({ level:'danger', icon:'🔴', title:'KD 死亡交叉（高檔）', desc:`K=${ctx.cK.toFixed(1)} 下穿 D=${ctx.cD.toFixed(1)}，高檔賣出訊號`, time: timeStr });
    }
    // RSI 超賣
    if(ctx.cRSI < 30){
      newAlerts.push({ level:'success', icon:'📉', title:'RSI 超賣區間', desc:`RSI=${ctx.cRSI.toFixed(1)} 低於30，可注意底部買機`, time: timeStr });
    }
    // RSI 超買
    if(ctx.cRSI > 70){
      newAlerts.push({ level:'warn', icon:'📈', title:'RSI 超買區間', desc:`RSI=${ctx.cRSI.toFixed(1)} 高於70，注意獲利了結`, time: timeStr });
    }
    // MACD 柱狀由負轉正
    if(ctx.pHist < 0 && ctx.cHist > 0){
      newAlerts.push({ level:'success', icon:'⚡', title:'MACD 柱狀轉正', desc:'動能由空轉多，趨勢轉折訊號', time: timeStr });
    }
    // MACD 柱狀由正轉負
    if(ctx.pHist > 0 && ctx.cHist < 0){
      newAlerts.push({ level:'danger', icon:'⚠️', title:'MACD 柱狀轉負', desc:'動能由多轉空，趨勢反轉訊號', time: timeStr });
    }
    // 多空分數高閾值
    if(ctx.total !== undefined){
      if(ctx.total >= 0.7){
        newAlerts.push({ level:'success', icon:'🚀', title:`強力多頭訊號 (${(ctx.total*100).toFixed(0)}分)`, desc:'多空加權分數超過 70%，買入信心高', time: timeStr });
      } else if(ctx.total <= -0.7){
        newAlerts.push({ level:'danger', icon:'🔻', title:`強力空頭訊號 (${(ctx.total*100).toFixed(0)}分)`, desc:'多空加權分數低於 -70%，賣出信心高', time: timeStr });
      }
    }
    // PSY 極端
    if(ctx.cPSY < 20){
      newAlerts.push({ level:'success', icon:'😰', title:`PSY 極度恐慌 (${ctx.cPSY.toFixed(0)}%)`, desc:'市場情緒極度悲觀，可能是逢低布局機會', time: timeStr });
    } else if(ctx.cPSY > 80){
      newAlerts.push({ level:'warn', icon:'🤩', title:`PSY 過度樂觀 (${ctx.cPSY.toFixed(0)}%)`, desc:'市場情緒過熱，注意高點賣出', time: timeStr });
    }

    // 將本次新警報插入最前面（保留最多20筆）
    if(newAlerts.length > 0){
      this._alerts = [...newAlerts, ...this._alerts].slice(0, 20);
    }
    this._lastCheck = timeStr;
    return this._alerts;
  },

  get alerts(){ return this._alerts; }
};

/* ═══════════════════════════════════════════════════════════════

          total, S, cBoll, last, cMA20, cMA60, cVol, cVolMA } = ctx;

    { label: '布林低檔',   hit: cBoll && last < cBoll.lower * 1.02 },

    { label: '量增價跌',   hit: cVol > cVolMA && last < (ctx.prev || last) },

  const buyHit  = buyConds.filter(c => c.hit).length;

/* ═══════════════════════════════════════════════════════════════
   FEATURE 4: 盤前今日重點提示 (renderDailyBrief)
   ═══════════════════════════════════════════════════════════════ */
function renderDailyBrief(ctx){
  const { last, prev, chgP, cK, cD, cRSI, cPSY, cMA20, cMA60,
          cDIF, cDEA, cHist, total, sr, cATR, lastHigh, lastLow } = ctx;

  const chgStr = chgP >= 0 ? `+${chgP.toFixed(2)}%` : `${chgP.toFixed(2)}%`;
  const chgCls = chgP >= 0 ? 'up' : 'down';

  // 分析支撐 / 壓力
  let supStr = '—', resStr = '—';
  if(sr && sr.supports && sr.supports.length) supStr = `$${sr.supports[0].level.toFixed(1)}`;
  if(sr && sr.resistances && sr.resistances.length) resStr = `$${sr.resistances[0].level.toFixed(1)}`;

  // 趨勢判斷
  const trend = last > cMA20 && last > cMA60 ? '多頭走勢' : last < cMA20 && last < cMA60 ? '空頭走勢' : '震盪整理';
  const trendCls = trend === '多頭走勢' ? 'up' : trend === '空頭走勢' ? 'down' : '';

  // ATR 風險範圍
  const atrUp   = (last + (cATR || 0)).toFixed(1);
  const atrDown = (last - (cATR || 0)).toFixed(1);

  // 策略建議
  let strategy = '';
  const bullets = [];
  if(total >= 0.5){
    strategy = '多頭偏強，可考慮逢拉回買進';
    bullets.push(`支撐區 ${supStr} 附近佈多`);
    bullets.push(`目標價：${resStr}，停損：${atrDown}`);
    bullets.push('量能放大才進場，縮量觀望');
  } else if(total <= -0.5){
    strategy = '空頭偏弱，宜觀望或逢反彈減碼';
    bullets.push(`壓力區 ${resStr} 附近考慮出場`);
    bullets.push(`止損設在 ${atrUp}`);
    bullets.push('不宜追高，等待反轉訊號');
  } else {
    strategy = '中性震盪，降低倉位、等待方向';
    bullets.push(`操作區間：${atrDown} ～ ${atrUp}`);
    bullets.push(`突破 ${resStr} 轉多；跌破 ${supStr} 轉空`);
    bullets.push('以小倉位試探，嚴設停損');
  }

  const items = [
    { label: '昨收 / 漲跌', value: `$${last.toFixed(1)}`, extra: `<span class="${chgCls}">${chgStr}</span>` },
    { label: 'KD 值',        value: `K ${cK.toFixed(1)} / D ${cD.toFixed(1)}`, extra: '' },
    { label: 'RSI',          value: cRSI.toFixed(1), extra: '' },
    { label: 'PSY',          value: `${cPSY.toFixed(1)}%`, extra: '' },
    { label: '主要支撐',     value: supStr, extra: '' },
    { label: '主要壓力',     value: resStr, extra: '' },
    { label: '今日趨勢',     value: `<span class="${trendCls}">${trend}</span>`, extra: '' },
    { label: 'ATR 波動帶',   value: `${atrDown} ～ ${atrUp}`, extra: '' },
  ];

  return `
  <div class="daily-brief ic">
    <div class="db-header">
      <div class="db-icon">📋</div>
      <div>
        <div class="db-title">盤前今日重點提示</div>
        <div class="db-subtitle">每日策略速覽 · 僅供參考，投資有風險</div>
      </div>
    </div>
    <div class="db-grid">
      ${items.map(it => `
        <div class="db-item">
          <div class="db-item-label">${it.label}</div>
          <div class="db-item-value">${it.value}${it.extra ? ' ' + it.extra : ''}</div>
        </div>`).join('')}
    </div>
    <div class="db-strategy">
      <div class="db-strategy-label">📌 今日策略建議</div>
      <div class="db-strategy-text">${strategy}</div>
      <ul class="db-bullets">
        ${bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE 6: SOX相關性分析面板 (renderSOXCorr)
   ═══════════════════════════════════════════════════════════════ */
function renderSOXCorr(ctx){
  // 用歷史收盤計算 TSMC 自相關（30日日報酬）與布林寬度相關
  const I = App.ind;
  if(!I || !I.closes || I.closes.length < 60) return '';

  const closes = I.closes;
  const n = closes.length;
  const period = 30;

  // 計算日報酬
  const rets = [];
  for(let i = 1; i < n; i++) rets.push((closes[i] - closes[i-1]) / closes[i-1]);

  // 計算最近 period 個交易日的波動率（年化）
  const recentRets = rets.slice(-period);
  const mean = recentRets.reduce((s,v)=>s+v,0) / period;
  const variance = recentRets.reduce((s,v)=>s+(v-mean)**2,0) / period;
  const dailyVol = Math.sqrt(variance);
  const annualVol = (dailyVol * Math.sqrt(252) * 100).toFixed(1);

  // 正報酬天數
  const posRets = recentRets.filter(r => r > 0).length;
  const posRate = (posRets / period * 100).toFixed(0);

  // 最大單日漲幅 / 跌幅
  const maxUp   = (Math.max(...recentRets) * 100).toFixed(2);
  const maxDown = (Math.min(...recentRets) * 100).toFixed(2);

  // 平均日報酬
  const avgRet = (mean * 100).toFixed(3);
  const avgRetCls = mean >= 0 ? 'pos' : 'neg';

  // 夏普比（無風險利率假設 2%）
  const rf = 0.02 / 252;
  const sharpe = dailyVol > 0 ? ((mean - rf) / dailyVol * Math.sqrt(252)).toFixed(2) : '—';
  const sharpeCls = parseFloat(sharpe) >= 1 ? 'pos' : parseFloat(sharpe) < 0 ? 'neg' : '';

  // 自相關 lag-1
  let autoCorr = 0;
  if(recentRets.length >= 2){
    const x = recentRets.slice(0,-1), y = recentRets.slice(1);
    const mx = x.reduce((s,v)=>s+v,0)/x.length, my = y.reduce((s,v)=>s+v,0)/y.length;
    const num = x.reduce((s,v,i)=>s+(v-mx)*(y[i]-my),0);
    const dx  = Math.sqrt(x.reduce((s,v)=>s+(v-mx)**2,0));
    const dy  = Math.sqrt(y.reduce((s,v)=>s+(v-my)**2,0));
    autoCorr  = (dx*dy > 0) ? (num/(dx*dy)).toFixed(3) : 0;
  }
  const acCls = autoCorr > 0.1 ? 'pos' : autoCorr < -0.1 ? 'neg' : '';

  return `
  <div class="sox-corr ic">
    <div class="sc-header">
      <span class="sc-title">📊 近30日統計分析（台積電自身）</span>
    </div>
    <div class="sc-grid">
      <div class="sc-stat">
        <div class="sc-stat-val ${avgRetCls}">${avgRet}%</div>
        <div class="sc-stat-label">日均報酬</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val">${annualVol}%</div>
        <div class="sc-stat-label">年化波動率</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val ${sharpeCls}">${sharpe}</div>
        <div class="sc-stat-label">夏普比率</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val">${posRate}%</div>
        <div class="sc-stat-label">正報酬天數</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val pos">+${maxUp}%</div>
        <div class="sc-stat-label">最大單日漲幅</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val neg">${maxDown}%</div>
        <div class="sc-stat-label">最大單日跌幅</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-val ${acCls}">${autoCorr}</div>
        <div class="sc-stat-label">自相關(lag-1)</div>
      </div>
    </div>
    <div class="sc-note">
      ※ 夏普比率 &gt;1 為良好；自相關 &gt;0.1 表示短期動能效應存在，&lt;-0.1 表示均值回歸傾向。<br>
      ※ 資料來源：TWSE 歷史收盤，僅供參考，不構成投資建議。
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE 9: 假訊號過濾器 (renderFalseSignals)
   ═══════════════════════════════════════════════════════════════ */
function renderFalseSignals(){
  const trades = Journal.state.trades || [];
  if(trades.length === 0) return `
  <div class="false-signal-card ic">
    <div class="fs-header"><span class="fs-title">🚫 假訊號分析</span></div>
    <div style="color:var(--t3);font-size:.8rem;padding:12px 0;text-align:center">尚無交易紀錄，請先在交易日誌新增記錄</div>
  </div>`;

  // 分析哪些交易在指標明確給出訊號後卻虧損（假訊號）
  const analyzed = trades.map(t => {
    const entryNote = (t.note || '').toLowerCase();
    // 若備注含買進訊號關鍵字但結果虧損 → 可能假訊號
    const hasBuySignal = /kd|rsi|psy|macd|金叉|買進|底部/.test(t.note || '');
    const hasSellSignal = /死叉|賣出|高點|壓力|出場/.test(t.note || '');
    const pnl = parseFloat(t.profit || t.pnl || 0);
    let tag = 'unknown';
    if((hasBuySignal && pnl > 0) || (hasSellSignal && pnl > 0)) tag = 'true-sig';
    else if((hasBuySignal && pnl < 0) || (hasSellSignal && pnl < 0)) tag = 'false-sig';
    const tagLabel = { 'true-sig':'真訊號', 'false-sig':'假訊號', 'unknown':'未標記' };
    return { ...t, tag, pnl, tagLabel: tagLabel[tag] };
  });

  const falseCnt = analyzed.filter(t => t.tag === 'false-sig').length;
  const trueCnt  = analyzed.filter(t => t.tag === 'true-sig').length;
  const total    = analyzed.length;
  const falseRate= total > 0 ? (falseCnt/total*100).toFixed(0) : 0;

  const rows = analyzed.slice(-10).reverse().map(t => `
    <tr>
      <td>${t.date || '—'}</td>
      <td>$${t.entry || '—'}</td>
      <td style="color:${t.pnl>=0?'var(--green)':'var(--red)'}">${t.pnl>=0?'+':''}${t.pnl.toFixed(0)}</td>
      <td><span class="fs-tag ${t.tag}">${t.tagLabel}</span></td>
      <td style="color:var(--t2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(t.note||'—').slice(0,30)}</td>
    </tr>`).join('');

  return `
  <div class="false-signal-card ic">
    <div class="fs-header">
      <span class="fs-title">🚫 假訊號分析</span>
      <span style="font-size:.78rem;color:var(--t2)">假訊號率：<b style="color:${falseRate>40?'var(--red)':'var(--green)'}">${falseRate}%</b>（${falseCnt}/${total}）</span>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div class="sc-stat" style="flex:1;min-width:90px"><div class="sc-stat-val">${total}</div><div class="sc-stat-label">總交易筆數</div></div>
      <div class="sc-stat" style="flex:1;min-width:90px"><div class="sc-stat-val pos">${trueCnt}</div><div class="sc-stat-label">真訊號（獲利）</div></div>
      <div class="sc-stat" style="flex:1;min-width:90px"><div class="sc-stat-val neg">${falseCnt}</div><div class="sc-stat-label">假訊號（虧損）</div></div>
    </div>
    <div style="overflow-x:auto">
      <table class="fs-table">
        <thead><tr><th>日期</th><th>進場</th><th>損益</th><th>訊號</th><th>備注</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="color:var(--t3);text-align:center">暫無資料</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE 7: 分批進場視覺化 (renderPyramidVis)
   ═══════════════════════════════════════════════════════════════ */
function renderPyramidVis(ctx){
  const { last, cATR, sr } = ctx;
  if(!last || !cATR) return '';

  // 計算三批進場價格
  const atr = cATR || last * 0.015;
  const entry1 = last;
  const entry2 = last - atr * 0.5;
  const entry3 = last - atr * 1.2;
  const stop   = last - atr * 2;
  const tp1    = last + atr * 1.5;
  const tp2    = last + atr * 3;

  // 假設當前進場狀態（可擴展為從 Journal 讀取）
  const steps = [
    { label: '第一批 30%', price: entry1, ratio: 30, active: true,  filled: false, desc: `入場價 $${entry1.toFixed(1)}，試水溫` },
    { label: '第二批 40%', price: entry2, ratio: 40, active: false, filled: false, desc: `回落至 $${entry2.toFixed(1)} 加碼` },
    { label: '第三批 30%', price: entry3, ratio: 30, active: false, filled: false, desc: `強力支撐 $${entry3.toFixed(1)} 重押` },
  ];

  const stepsHtml = steps.map(s => `
    <div class="pv-step ${s.active?'active':''} ${s.filled?'filled':''}">
      <div class="pv-step-label">${s.label}</div>
      <div class="pv-step-detail">${s.desc}</div>
      <div class="pv-step-bar"><div class="pv-step-bar-fill" style="width:${s.ratio}%"></div></div>
    </div>`).join('');

  return `
  <div class="pyramid-vis">
    <div class="pv-title">📐 分批進場規劃</div>
    <div class="pv-timeline">${stepsHtml}</div>
    <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
      <span class="pv-stop">🛑 停損 $${stop.toFixed(1)}</span>
      <span class="pv-tp">🎯 TP1 $${tp1.toFixed(1)}</span>
      <span class="pv-tp">🎯 TP2 $${tp2.toFixed(1)}</span>
    </div>
    <div class="pv-summary">
      <div class="pv-sum-item"><strong>$${entry1.toFixed(1)}</strong>均成本(第1批)</div>
      <div class="pv-sum-item"><strong>${((tp1-entry1)/entry1*100).toFixed(1)}%</strong>TP1 報酬</div>
      <div class="pv-sum-item"><strong>${((entry1-stop)/entry1*100).toFixed(1)}%</strong>最大虧損</div>
      <div class="pv-sum-item"><strong>${((tp1-entry1)/(entry1-stop)).toFixed(2)}</strong>風報比</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   FEATURE 8: 個人勝率儀表板擴充 (renderWinRateDetail)
   ═══════════════════════════════════════════════════════════════ */
function renderWinRateDetail(){
  const trades = Journal.state.trades || [];
  if(trades.length < 3) return '';

  // 按 RSI 區間分組
  const groups = { '超賣(<30)':[],  '中性(30-70)':[], '超買(>70)':[] };
  trades.forEach(t => {
    const rsi = parseFloat(t.rsi || t.entryRsi || 0);
    const pnl = parseFloat(t.profit || t.pnl || 0);
    if(rsi < 30)       groups['超賣(<30)'].push(pnl);
    else if(rsi <= 70) groups['中性(30-70)'].push(pnl);
    else               groups['超買(>70)'].push(pnl);
  });

  const cellHtml = Object.entries(groups).map(([label, pnls]) => {
    if(pnls.length === 0) return '';
    const wins = pnls.filter(p=>p>0).length;
    const wr = (wins/pnls.length*100).toFixed(0);
    const cls = wr >= 60 ? 'good' : wr >= 40 ? 'ok' : 'bad';
    return `<div class="wr-cell">
      <div class="wr-cell-label">${label}</div>
      <div class="wr-cell-val ${cls}">${wr}%</div>
      <div class="wr-bar-wrap"><div class="wr-bar-fill" style="width:${wr}%;background:${wr>=60?'var(--green)':wr>=40?'var(--yellow)':'var(--red)'}"></div></div>
      <div style="font-size:.7rem;color:var(--t3)">${wins}勝/${pnls.length-wins}負，共${pnls.length}筆</div>
    </div>`;
  }).join('');

  if(!cellHtml.trim()) return '';

  // 持有天數分析
  const byDays = { '≤3天':[], '4-10天':[], '>10天':[] };
  trades.forEach(t => {
    const d = parseInt(t.holdDays || t.days || 0);
    const pnl = parseFloat(t.profit || t.pnl || 0);
    if(d <= 3)      byDays['≤3天'].push(pnl);
    else if(d <= 10) byDays['4-10天'].push(pnl);
    else             byDays['>10天'].push(pnl);
  });

  const dayHtml = Object.entries(byDays).map(([label, pnls]) => {
    if(pnls.length === 0) return '';
    const wins = pnls.filter(p=>p>0).length;
    const wr = (wins/pnls.length*100).toFixed(0);
    const cls = wr >= 60 ? 'good' : wr >= 40 ? 'ok' : 'bad';
    return `<div class="wr-cell">
      <div class="wr-cell-label">${label}</div>
      <div class="wr-cell-val ${cls}">${wr}%</div>
      <div class="wr-bar-wrap"><div class="wr-bar-fill" style="width:${wr}%;background:${wr>=60?'var(--green)':wr>=40?'var(--yellow)':'var(--red)'}"></div></div>
      <div style="font-size:.7rem;color:var(--t3)">${pnls.length}筆</div>
    </div>`;
  }).join('');

  return `
    <div class="wr-section-title">📊 按入場時 RSI 分析勝率</div>
    <div class="wr-grid">${cellHtml}</div>
    ${dayHtml ? `<div class="wr-section-title">⏱ 按持有天數分析勝率</div><div class="wr-grid">${dayHtml}</div>` : ''}
  `;
}

/* ═══════════════════════════════════════════════════════════════
   UI HELPER: 區塊分組標頭
   ═══════════════════════════════════════════════════════════════ */
function renderGroupHeader(zone, emoji, title, desc, badgeText='', badgeClass=''){
  const badgeHtml = badgeText
    ? `<span class="zh-badge ${badgeClass}">${badgeText}</span>`
    : '';
  return `
  <div class="zone-header zone-${zone.toLowerCase()}">
    <div class="zh-letter">${zone}</div>
    <div class="zh-emoji">${emoji}</div>
    <div class="zh-body">
      <div class="zh-title">${title}</div>
      <div class="zh-desc">${desc}</div>
    </div>
    ${badgeHtml}
  </div>`;
}

Theme.init();
App.init().finally(() => {
  AutoRefresh.start();
  LivePrice.start();
  IntradayChart.start();
  initKeyboardShortcuts();
});
</script>
</body>
</html>
