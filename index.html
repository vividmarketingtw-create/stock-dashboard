<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台積電 (2330) 多空追蹤 + 明日機率預估儀表板 v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"
        integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi"
        crossorigin="anonymous"></script>
<style>
/* ─── 深色模式（預設） ─── */
:root{
  --bg:#0d0f1a;--card:#141728;--card2:#1a1f38;
  --blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;--yellow:#f59e0b;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--border:#1e2d4a;
}
/* ─── 淺色模式 ─── */
body.light{
  --bg:#f0f4f8;--card:#ffffff;--card2:#e8edf5;
  --blue:#2563eb;--purple:#7c3aed;--cyan:#0891b2;
  --green:#059669;--green2:#10b981;
  --red:#dc2626;--red2:#ef4444;--yellow:#d97706;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;--border:#cbd5e1;
}
/* ─── 淺色模式下部分背景透明色修正 ─── */
body.light .bg-g{background:rgba(5,150,105,.12);color:var(--green)}
body.light .bg-r{background:rgba(220,38,38,.12);color:var(--red)}
body.light .bg-y{background:rgba(217,119,6,.12);color:var(--yellow)}
body.light .bg-b{background:rgba(37,99,235,.12);color:var(--blue)}
body.light .bg-p{background:rgba(124,58,237,.12);color:var(--purple)}
body.light .ic{box-shadow:0 1px 4px rgba(0,0,0,.07)}
body.light .hd,body.light .chart-card,body.light .gauge-wrap,
body.light .entry-panel,body.light .predict-panel,body.light .analysis-card,
body.light .poscalc,body.light .journal-card,body.light .fc,
body.light .legend,body.light .morning-card,body.light .mtf-card{
  box-shadow:0 2px 8px rgba(0,0,0,.08)
}
/* ─── 切換按鈕 ─── */
.theme-btn{
  position:fixed;bottom:24px;right:24px;z-index:999;
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  background:var(--card);border:2px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  transition:background .25s,border-color .25s,transform .15s;
}
.theme-btn:hover{transform:scale(1.12)}

*{box-sizing:border-box;margin:0;padding:0}
/* ─── 全局字體基準（調這一行即可放大/縮小全站字體） ─── */
html{ font-size: 16px; }   /* 預設 16px；原始設計約 14px，此處放大約 14% */

body{background:var(--bg);color:var(--t1);
     font-family:'Segoe UI','Microsoft JhengHei','PingFang TC',sans-serif;
     padding:18px;min-height:100vh;transition:background .3s,color .3s;
     font-size:1rem}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ─── color helpers ─── */
.c-g{color:var(--green)}.c-g2{color:var(--green2)}
.c-r{color:var(--red)}.c-r2{color:var(--red2)}
.c-y{color:var(--yellow)}.c-b{color:var(--blue)}
.c-p{color:var(--purple)}.c-t1{color:var(--t1)}.c-t2{color:var(--t2)}
.bg-g{background:rgba(16,185,129,.15);color:var(--green)}
.bg-r{background:rgba(239,68,68,.15);color:var(--red)}
.bg-y{background:rgba(245,158,11,.15);color:var(--yellow)}
.bg-b{background:rgba(59,130,246,.15);color:var(--blue)}
.bg-p{background:rgba(139,92,246,.15);color:var(--purple)}

/* ─── header ─── */
.hd{display:flex;justify-content:space-between;align-items:center;
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:20px 28px;margin-bottom:14px;flex-wrap:wrap;gap:14px}
.hd-left .name{font-size:1.7rem;font-weight:800;letter-spacing:1px}
.hd-left .sub{font-size:0.8rem;color:var(--t2);margin-top:3px}
.hd-right{display:flex;align-items:center;gap:18px}
.price .now{font-size:2.5rem;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
.price .chg{font-size:1rem;margin-top:2px;text-align:right}
.price .ts{font-size:0.75rem;color:var(--t2);margin-top:4px;text-align:right}
.price .ts .stale{color:var(--yellow);font-weight:700}
/* ─── 即時股價小工具 ─── */
.live-widget{
  display:flex;flex-direction:column;align-items:center;
  background:var(--card2);border:2px solid var(--border);
  border-radius:14px;padding:10px 18px;min-width:150px;
  transition:border-color .3s;
}
.live-widget.lw-open{border-color:var(--green)}
.live-widget.lw-closed{border-color:var(--yellow)}
.live-widget.lw-error{border-color:var(--red)}
.lw-label{font-size:.68rem;color:var(--t2);margin-bottom:5px;
  display:flex;align-items:center;gap:5px;font-weight:600;letter-spacing:.5px}
.lw-dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0}
.lw-dot.d-live{background:var(--green);animation:lw-pulse 1.4s ease-in-out infinite}
.lw-dot.d-closed{background:var(--yellow);animation:none}
.lw-dot.d-err{background:var(--red);animation:none}
@keyframes lw-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.lw-price{font-size:2rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
.lw-chg{font-size:.82rem;margin-top:3px;font-variant-numeric:tabular-nums}
.lw-meta{font-size:.65rem;color:var(--t2);margin-top:4px;text-align:center}
.lw-time{font-size:.62rem;color:var(--t3);margin-top:2px}
/* ─── 即時買賣評估面板 ─── */
.re-panel{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:14px;
}
.re-main{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.re-rec{display:flex;align-items:center;gap:14px;flex:1;min-width:200px}
.re-emoji{font-size:2.2rem;line-height:1}
.re-rec-text{font-size:1.5rem;font-weight:800;letter-spacing:.5px}
.re-rec-sub{font-size:.75rem;color:var(--t2);margin-top:3px}
.re-score-num{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.re-bar-wrap{flex:1;min-width:180px}
.re-bar-track{height:10px;background:var(--card2);border-radius:6px;position:relative;overflow:hidden;margin-bottom:5px}
.re-bar-center{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--border);z-index:1}
.re-bar-fill{position:absolute;top:0;bottom:0;border-radius:6px;transition:width .5s,left .5s,background .4s}
.re-bar-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--t3)}
.re-signals{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.re-sig{background:var(--card2);border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;display:flex;flex-direction:column;gap:3px}
.re-sig-label{font-size:.68rem;color:var(--t2);font-weight:600;letter-spacing:.3px}
.re-sig-val{font-size:.88rem;font-weight:700;font-variant-numeric:tabular-nums}
.re-sig-note{font-size:.65rem;color:var(--t3)}
.re-footer{font-size:.65rem;color:var(--t3);border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.re-closed-msg{text-align:center;padding:20px;color:var(--t2);font-size:.85rem}
/* ─── 市場時段狀態列 ─── */
.session-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:7px 14px;margin-bottom:14px;flex-wrap:wrap;
}
.session-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.session-dot.live{background:var(--green);animation:lw-pulse 1.4s ease-in-out infinite}
.session-dot.after{background:var(--yellow)}
.session-dot.closed{background:var(--t3)}
.session-label{font-size:.78rem;font-weight:700;letter-spacing:.3px}
.session-desc{font-size:.68rem;color:var(--t2);margin-left:auto}
/* ─── 買賣評估強化版 ─── */
.re-verdict{
  display:flex;align-items:center;gap:18px;
  padding:16px 20px;border-radius:12px;margin-bottom:16px;
  border:1.5px solid var(--border);transition:background .4s,border-color .4s;
}
.re-verdict-score{
  font-size:3rem;font-weight:900;font-variant-numeric:tabular-nums;
  line-height:1;flex-shrink:0;min-width:64px;text-align:center;
}
.re-verdict-right{flex:1}
.re-verdict-label{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.re-verdict-sub{font-size:.75rem;color:var(--t2);line-height:1.6}
/* ─── 技術摘要列 ─── */
.ind-summary{
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:12px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.ind-sum-verdict{font-size:.9rem;font-weight:700;flex-shrink:0}
.ind-sum-bar-wrap{flex:1;min-width:160px}
.ind-sum-bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative;margin-bottom:4px}
.ind-sum-bar-bull{position:absolute;left:0;top:0;bottom:0;background:var(--green);border-radius:4px 0 0 4px;transition:width .5s}
.ind-sum-bar-bear{position:absolute;right:0;top:0;bottom:0;background:var(--red);border-radius:0 4px 4px 0;transition:width .5s}
.ind-sum-counts{display:flex;justify-content:space-between;font-size:.65rem;color:var(--t2)}
.ind-sum-tags{display:flex;gap:6px;flex-wrap:wrap}
.ind-sum-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid}
/* ─── 可折疊區塊 ─── */
.collapsible-hd{
  display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
}
.collapsible-hd .col-toggle{
  margin-left:auto;font-size:.72rem;color:var(--t2);
  background:var(--card2);border:1px solid var(--border);border-radius:6px;
  padding:3px 10px;cursor:pointer;transition:background .2s;
}
.collapsible-hd .col-toggle:hover{background:var(--border)}
.collapsible-body{transition:max-height .35s ease,opacity .3s;overflow:hidden}
.collapsible-body.col-closed{max-height:0!important;opacity:0;pointer-events:none}
/* ─── 明日操作計畫 ─── */
.trade-plan{
  background:var(--card2);border-radius:12px;padding:16px 20px;margin-top:14px;
  border-left:4px solid var(--blue);
}
.trade-plan-title{font-size:.8rem;font-weight:700;color:var(--blue);margin-bottom:12px;letter-spacing:.3px}
.trade-plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.tp-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px}
.tp-item .tpi-label{font-size:.65rem;color:var(--t2);font-weight:700;margin-bottom:5px;letter-spacing:.3px}
.tp-item .tpi-val{font-size:1.05rem;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:3px}
.tp-item .tpi-note{font-size:.68rem;color:var(--t3);line-height:1.5}
/* ─── 分時走勢卡片 ─── */
.intraday-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:18px 20px;margin-bottom:14px;
}
.intraday-hd{display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:10px;margin-bottom:14px}
.intraday-label{font-size:.72rem;color:var(--t2);font-weight:700;letter-spacing:.5px;margin-bottom:6px;
  display:flex;align-items:center;gap:6px}
.intraday-price-row{display:flex;align-items:baseline;gap:10px}
.id-cur{font-size:2.1rem;font-weight:800;font-variant-numeric:tabular-nums}
.id-chg{font-size:.9rem;font-variant-numeric:tabular-nums}
.intraday-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;align-self:flex-end}
.id-chip{background:var(--card2);border:1px solid var(--border);border-radius:7px;
    padding:5px 10px;font-size:.75rem;display:flex;gap:5px;align-items:center}
.id-chip .ck{color:var(--t2)}
.id-chip b{font-variant-numeric:tabular-nums;color:var(--t1)}
.intraday-chart-wrap{height:210px;position:relative}
.intraday-chart-wrap canvas{position:absolute;inset:0}
.intraday-err{display:none;align-items:center;justify-content:center;
  position:absolute;inset:0;color:var(--red);font-size:.8rem;background:var(--card);
  border-radius:8px;text-align:center}
.btn{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
     background:linear-gradient(135deg,var(--blue),var(--purple));
     color:#fff;border:none;padding:10px 20px;border-radius:10px;
     cursor:pointer;font-size:0.875rem;font-weight:700;transition:opacity .2s}
.btn:hover{opacity:.82}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.btn-sm{padding:6px 12px;font-size:0.75rem;border-radius:7px}
.btn.btn-ghost{background:var(--card2);color:var(--t1);border:1px solid var(--border)}
.btn.btn-ghost.active{background:linear-gradient(135deg,var(--blue),var(--purple));border-color:transparent}

/* ─── 2-col main ─── */
.grid2{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:14px}

/* ─── gauge ─── */
.gauge-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;
            padding:22px 18px;display:flex;flex-direction:column;align-items:center}
.gauge-title{font-size:0.875rem;color:var(--t2);margin-bottom:10px}
/* 加高 SVG + 加底部間距，讓弧形標籤不貼邊、與下方文字不打架 */
.gauge-svg{width:210px;height:148px;margin-bottom:6px}
.sent-label{font-size:1.35rem;font-weight:800;margin-top:0}
.sent-score{font-size:0.8rem;color:var(--t2);margin-top:3px;text-align:center;line-height:1.6}
.sig-row{display:flex;gap:18px;margin-top:14px}
.sig-item{text-align:center}
.sig-item .n{font-size:1.35rem;font-weight:700}
.sig-item .l{font-size:0.7rem;color:var(--t2)}

/* ─── chart ─── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.chart-head h3{font-size:0.8rem;color:var(--t2)}
.tf-group{display:flex;gap:5px}

/* ─── 預測面板（新） ─── */
.predict-panel{
  background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.05)),var(--card);
  border:1px solid var(--border);border-radius:16px;
  padding:24px 28px;margin-bottom:14px;
}
.predict-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.predict-head .ph-title{font-size:1.1rem;font-weight:800}
.predict-head .ph-badge{
  background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;
  font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px
}
.predict-head .ph-meta{font-size:0.75rem;color:var(--t2);margin-left:auto}
.predict-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.pred-card{background:var(--card2);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.pred-card .pc-label{font-size:0.75rem;color:var(--t2);margin-bottom:10px;letter-spacing:.5px}
.pred-card .pc-big{font-size:2.1rem;font-weight:800;line-height:1;margin-bottom:8px;font-variant-numeric:tabular-nums}
.pred-card .pc-sub{font-size:0.8rem;color:var(--t2);line-height:1.6}
.pred-card .pc-meter{margin-top:10px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pred-card .pc-meter-fill{height:100%;border-radius:3px;transition:width .5s}
.pred-scenarios{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px}
.scen{background:var(--card2);border-radius:10px;padding:14px;border-left:4px solid}
.scen.bull{border-color:var(--green)}
.scen.base{border-color:var(--yellow)}
.scen.bear{border-color:var(--red)}
.scen .s-label{font-size:0.75rem;color:var(--t2);margin-bottom:5px}
.scen .s-price{font-size:1.15rem;font-weight:700;margin-bottom:3px}
.scen .s-pct{font-size:0.8rem;font-weight:700}
.predict-disclaimer{
  margin-top:14px;font-size:0.75rem;color:var(--t2);line-height:1.7;
  background:rgba(245,158,11,.08);border-left:3px solid var(--yellow);padding:10px 14px;border-radius:6px
}
.predict-bt{margin-top:12px;background:var(--card2);border-radius:10px;padding:12px 16px}
.predict-bt-title{font-size:0.75rem;color:var(--t2);margin-bottom:8px;font-weight:700}
.predict-bt-row{display:flex;flex-wrap:wrap;gap:14px;font-size:0.8rem;line-height:1.7}
.predict-bt-row .bt-item{display:flex;align-items:center;gap:6px}

/* ─── 進出點評分面板 ─── */
.entry-panel{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px 26px;margin-bottom:14px
}
.entry-top{display:flex;align-items:center;gap:28px;margin-bottom:22px;flex-wrap:wrap}
.entry-score-ring{position:relative;width:110px;height:110px;flex-shrink:0}
.entry-score-ring svg{width:110px;height:110px}
.entry-score-ring .score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.entry-score-ring .score-num .big{font-size:1.65rem;font-weight:800;line-height:1}
.entry-score-ring .score-num .sm{font-size:0.7rem;color:var(--t2);margin-top:2px}
.entry-action{flex:1;min-width:240px}
.entry-action .action-label{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.entry-action .action-sub{font-size:0.875rem;color:var(--t2);line-height:1.6}
.entry-action .action-tag{
  display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:700
}
.entry-pct{font-size:0.75rem;color:var(--t2);margin-top:6px}
.pillars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pillar{background:var(--card2);border-radius:10px;padding:14px}
.pillar .p-label{font-size:0.75rem;color:var(--t2);margin-bottom:8px}
.pillar .p-val{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.pillar .p-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pillar .p-fill{height:100%;border-radius:3px;transition:width .5s}
.pillar .p-detail{font-size:0.7rem;color:var(--t2);margin-top:6px;line-height:1.5}

/* ─── section ─── */
.sec{font-size:1rem;font-weight:700;margin:18px 0 10px;padding-left:10px;border-left:4px solid var(--purple);display:flex;align-items:center;gap:10px}
.sec-cnt{font-size:0.75rem;color:var(--t2);font-weight:400}

/* ─── indicator cards ─── */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;margin-bottom:14px}
.ic{background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:15px;position:relative;overflow:hidden;transition:background .18s}
.ic:hover{background:var(--card2)}
.ic::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ic.bull::before{background:var(--green)}
.ic.bear::before{background:var(--red)}
.ic.neut::before{background:var(--yellow)}
.ic .nm{font-size:0.75rem;color:var(--t2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ic .vl{font-size:1.35rem;font-weight:700;margin-bottom:5px}
.ic .vl.val-bull{color:var(--green)}
.ic .vl.val-bear{color:var(--red)}
.ic .vl.val-neut{color:var(--yellow)}
.ic .sg{display:inline-flex;align-items:center;gap:3px;font-size:0.75rem;
        padding:3px 9px;border-radius:20px;font-weight:700}
.ic .sg.bull{background:rgba(16,185,129,.15);color:var(--green)}
.ic .sg.bear{background:rgba(239,68,68,.15);color:var(--red)}
.ic .sg.neut{background:rgba(245,158,11,.15);color:var(--yellow)}
.ic .dt{font-size:0.7rem;color:var(--t2);margin-top:7px;line-height:1.6}

/* ─── tooltip（新） ─── */
.tip{position:relative;display:inline-flex;align-items:center;justify-content:center;
     width:14px;height:14px;border-radius:50%;background:var(--border);color:var(--t2);
     font-size:0.6rem;font-weight:700;cursor:help;line-height:1}
.tip:hover{background:var(--purple);color:#fff}
.tip::before,.tip::after{position:absolute;left:50%;transform:translateX(-50%);
  opacity:0;pointer-events:none;transition:opacity .15s}
.tip::before{
  content:attr(data-tip);bottom:calc(100% + 8px);width:240px;
  background:#0a0d18;border:1px solid var(--purple);border-radius:8px;
  padding:10px 12px;font-size:0.75rem;color:var(--t1);font-weight:400;
  line-height:1.7;text-align:left;z-index:100;white-space:normal}
.tip::after{
  content:'';bottom:calc(100% + 2px);border:6px solid transparent;
  border-top-color:var(--purple)}
.tip:hover::before,.tip:hover::after{opacity:1}

/* ─── MA ─── */
.ma2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mat{width:100%;border-collapse:collapse}
.mat td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:0.8rem}
.mat td:last-child{text-align:right;font-weight:700}

/* ─── fund ─── */
.fund-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px;margin-bottom:18px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px}
.fc .ft{font-size:0.8rem;color:var(--t2);margin-bottom:7px}
.fc .fv{font-size:0.9rem;font-weight:700;margin-bottom:3px}
.fc .fn{font-size:0.7rem;color:var(--t2);margin-top:5px;line-height:1.6}

/* ─── legend ─── */
.legend{background:var(--card);border:1px solid var(--border);border-radius:12px;
        padding:16px;font-size:0.8rem;color:var(--t2);line-height:2;margin-bottom:18px}

/* ─── 白話文解析 ─── */
.analysis-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:24px 28px;margin-bottom:14px
}
.analysis-card .ac-title{
  font-size:1rem;font-weight:800;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.analysis-card .ac-title .badge{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;font-size:0.7rem;font-weight:700;
  padding:3px 10px;border-radius:20px;letter-spacing:.5px
}
.ac-section{
  border-left:3px solid var(--border);
  padding:12px 0 12px 18px;margin-bottom:4px;
  transition:border-color .2s
}
.ac-section:hover{border-left-color:var(--purple)}
.ac-section .ac-head{
  font-size:0.875rem;font-weight:700;margin-bottom:7px;
  display:flex;align-items:center;gap:8px
}
.ac-section .ac-icon{font-size:1rem;line-height:1}
.ac-section .ac-body{font-size:0.875rem;color:var(--t2);line-height:1.9}
.hl{font-weight:700}
.hl-g{color:var(--green);font-weight:700}
.hl-r{color:var(--red);font-weight:700}
.hl-y{color:var(--yellow);font-weight:700}
.hl-b{color:var(--blue);font-weight:700}
.ac-divider{border:none;border-top:1px solid var(--border);margin:4px 0 8px}
.ac-summary{
  background:var(--card2);border-radius:12px;padding:16px 18px;margin-top:12px;
  font-size:0.875rem;line-height:1.9;color:var(--t1);
  border-left:4px solid var(--purple)
}

/* ─── loading / error ─── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:65vh;color:var(--t2);gap:14px;font-size:0.9rem}
.spin{width:40px;height:40px;border:3px solid var(--border);
      border-top:3px solid var(--purple);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
     border-radius:12px;padding:28px;text-align:center;color:var(--red);
     max-width:480px;margin:60px auto}
.err p{font-size:0.8rem;color:var(--t2);margin-top:8px}
.foot{text-align:center;font-size:0.75rem;color:var(--t2);
      margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}

/* ─── mobile RWD（項目 12） ─── */
@media (max-width: 900px){
  body{padding:12px}
  .grid2{grid-template-columns:1fr}
  .pillars{grid-template-columns:1fr}
  .predict-grid{grid-template-columns:1fr}
  .pred-scenarios{grid-template-columns:1fr}
  .ma2{grid-template-columns:1fr}
  .ind-grid{grid-template-columns:1fr 1fr}
  .hd{padding:16px 18px}
  .hd-left .name{font-size:1.35rem}
  .price .now{font-size:1.9rem}
  .entry-panel,.predict-panel,.analysis-card{padding:18px 16px}
  .entry-top{gap:16px}
  .tip::before{width:200px;left:auto;right:0;transform:none}
  .tip::after{left:auto;right:5px;transform:none}
}
@media (max-width: 480px){
  .ind-grid{grid-template-columns:1fr}
  .fund-grid{grid-template-columns:1fr}
}

/* ─── 多時間框架（MTF） ─── */
.mtf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.mtf-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.mtf-card .mtf-tf{font-size:0.75rem;color:var(--t2);letter-spacing:.5px;margin-bottom:10px;font-weight:700}
.mtf-card .mtf-dir{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.mtf-card .mtf-score{font-size:0.75rem;color:var(--t2)}
.mtf-card .mtf-bar{height:8px;background:var(--border);border-radius:4px;margin-top:10px;overflow:hidden;position:relative}
.mtf-card .mtf-bar-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--t3);z-index:1}
.mtf-card .mtf-bar-fill{height:100%;border-radius:4px;transition:width .5s,margin-left .5s}
.mtf-resonance{background:var(--card2);border-radius:10px;padding:14px 18px;margin-bottom:14px;font-size:0.875rem;line-height:1.8}
.mtf-resonance .mr-title{font-size:0.8rem;color:var(--t2);margin-bottom:6px;font-weight:700}

/* ─── 早盤 SOX 輸入 ─── */
.morning-card{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(245,158,11,.05)),var(--card);
  border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:14px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.morning-card .mc-icon{font-size:30px}
.morning-card .mc-body{flex:1;min-width:200px}
.morning-card .mc-title{font-size:0.9rem;font-weight:700;margin-bottom:4px}
.morning-card .mc-sub{font-size:0.75rem;color:var(--t2);line-height:1.6}
.morning-card .mc-input{display:flex;align-items:center;gap:8px}
.morning-card input.sox-input{
  width:80px;padding:8px 12px;border-radius:8px;background:var(--card2);
  color:var(--t1);border:1px solid var(--border);font-size:0.9rem;font-weight:700;text-align:center;
  font-variant-numeric:tabular-nums
}
.morning-card input.sox-input:focus{outline:none;border-color:var(--purple)}
.morning-card .mc-effect{font-size:0.75rem;color:var(--t2);margin-top:4px}

/* ─── 部位計算機 ─── */
.poscalc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:14px}
.poscalc-grid{display:grid;grid-template-columns:280px 1fr;gap:22px}
.poscalc-form .pf-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.poscalc-form .pf-row label{font-size:0.8rem;color:var(--t2);min-width:90px}
.poscalc-form .pf-row input,.poscalc-form .pf-row select{
  flex:1;padding:7px 10px;border-radius:7px;background:var(--card2);
  color:var(--t1);border:1px solid var(--border);font-size:0.875rem;font-variant-numeric:tabular-nums
}
.poscalc-form .pf-row input:focus,.poscalc-form .pf-row select:focus{outline:none;border-color:var(--purple)}
.poscalc-out{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.po-card{background:var(--card2);border-radius:10px;padding:14px;border-left:4px solid}
.po-card.stop{border-color:var(--red)}
.po-card.profit{border-color:var(--green)}
.po-card.size{border-color:var(--blue)}
.po-card.risk{border-color:var(--yellow)}
.po-card .po-label{font-size:0.75rem;color:var(--t2);margin-bottom:6px}
.po-card .po-val{font-size:1.25rem;font-weight:800;line-height:1.2;font-variant-numeric:tabular-nums}
.po-card .po-sub{font-size:0.75rem;color:var(--t2);margin-top:4px;line-height:1.5}
.pyramid-table{width:100%;margin-top:14px;border-collapse:collapse}
.pyramid-table th,.pyramid-table td{padding:8px 10px;font-size:0.8rem;border-bottom:1px solid var(--border);text-align:left}
.pyramid-table th{color:var(--t2);font-weight:700;font-size:0.75rem}
.pyramid-table td.right{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}

/* ─── 交易日誌 ─── */
.journal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:14px}
.journal-tabs{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.journal-tab{
  padding:7px 14px;border-radius:7px;font-size:0.8rem;font-weight:700;cursor:pointer;
  background:var(--card2);color:var(--t2);border:1px solid var(--border);transition:all .15s
}
.journal-tab.active{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border-color:transparent}
.journal-tab:hover:not(.active){color:var(--t1)}
.j-section{display:none}
.j-section.active{display:block}
.position-card{
  background:var(--card2);border-radius:10px;padding:14px 18px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:center
}
.position-card .pc-cell .pl{font-size:0.7rem;color:var(--t2)}
.position-card .pc-cell .pv{font-size:0.9rem;font-weight:700;font-variant-numeric:tabular-nums}
.position-card .pnl-pos{color:var(--green)}
.position-card .pnl-neg{color:var(--red)}
.btn-icon{padding:6px 10px;font-size:0.75rem;background:var(--card);border:1px solid var(--border);
  color:var(--t1);border-radius:6px;cursor:pointer}
.btn-icon:hover{background:var(--card2);border-color:var(--purple)}
.btn-buy{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none}
.btn-sell{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none}
.j-buttons{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.j-buttons .btn{padding:10px 18px}
.trade-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.trade-table th,.trade-table td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:left}
.trade-table th{color:var(--t2);font-weight:700;font-size:0.75rem;background:var(--card2)}
.trade-table tr.closed{opacity:.7}
.trade-table .right{text-align:right;font-variant-numeric:tabular-nums}
.trade-empty{text-align:center;color:var(--t2);padding:30px;font-size:0.875rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stats-card{background:var(--card2);border-radius:10px;padding:12px}
.stats-card .sl{font-size:0.7rem;color:var(--t2);margin-bottom:5px}
.stats-card .sv{font-size:1.15rem;font-weight:800;font-variant-numeric:tabular-nums}

/* 規則編輯 */
.rule-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.rule-item{
  background:var(--card2);border-radius:8px;padding:12px 14px;display:grid;
  grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center
}
.rule-item.triggered{border-left:4px solid var(--yellow);background:rgba(245,158,11,.1)}
.rule-item .rt{font-size:0.875rem;font-weight:700}
.rule-item .rd{font-size:0.75rem;color:var(--t2);margin-top:3px}
.rule-item .rs{font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:6px}
.rule-item .rs.on{background:rgba(16,185,129,.15);color:var(--green)}
.rule-item .rs.off{background:rgba(148,163,184,.15);color:var(--t2)}
.rule-add-form{background:var(--card2);border-radius:10px;padding:14px;margin-bottom:14px;display:none}
.rule-add-form.open{display:block}
.rule-add-form .raf-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.rule-add-form input,.rule-add-form select{
  padding:6px 10px;border-radius:6px;background:var(--card);color:var(--t1);
  border:1px solid var(--border);font-size:0.8rem
}
.rule-cond-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.rule-cond-row select{min-width:90px}
.rule-cond-row input{width:70px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:24px 28px;max-width:480px;width:100%;max-height:90vh;overflow:auto}
.modal h3{font-size:1.15rem;margin-bottom:16px}
.modal .m-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.modal .m-row label{font-size:0.8rem;color:var(--t2);min-width:80px}
.modal .m-row input,.modal .m-row textarea{
  flex:1;padding:8px 10px;border-radius:7px;background:var(--card2);
  color:var(--t1);border:1px solid var(--border);font-size:0.875rem
}
.modal .m-row textarea{resize:vertical;min-height:60px}
.modal .m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.modal .m-actions .btn{padding:9px 18px;font-size:0.875rem}
.modal .m-actions .btn-cancel{background:var(--card2);color:var(--t1);border:1px solid var(--border)}
.modal .m-snapshot{background:var(--card2);border-radius:8px;padding:10px 12px;
  font-size:0.75rem;color:var(--t2);line-height:1.7;margin:8px 0}
.modal .m-snapshot strong{color:var(--t1)}

/* Toast 警示 */
.toast-area{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px;max-width:340px}
.toast{
  background:var(--card);border:2px solid var(--yellow);border-radius:10px;padding:14px 18px;
  font-size:0.875rem;line-height:1.6;animation:slideIn .3s ease;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,.4)
}
.toast.bull{border-color:var(--green)}
.toast.bear{border-color:var(--red)}
.toast .t-title{font-weight:700;margin-bottom:4px}
.toast .t-close{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--t2);font-size:1rem;background:none;border:none}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

@media (max-width:900px){
  .mtf-grid{grid-template-columns:1fr}
  .poscalc-grid{grid-template-columns:1fr}
  .poscalc-out{grid-template-columns:1fr 1fr}
  .position-card{grid-template-columns:1fr 1fr;gap:8px}
}
@media (max-width:600px){
  /* 逢低買進 / 逢高賣出 面板：窄螢幕改為單欄 */
  .bs-grid{grid-template-columns:1fr !important}
}

/* ─── Sticky header ─── */
.hd{
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
body:not(.light) .hd{ background:rgba(20,23,40,0.95); }
body.light .hd{ background:rgba(255,255,255,0.95); }

/* ─── Auto-refresh timer ─── */
.auto-refresh{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--t2);margin-top:6px}
.auto-refresh .ar-count{font-variant-numeric:tabular-nums;color:var(--cyan);font-weight:700;min-width:32px}
.auto-refresh .ar-btn{background:none;border:1px solid var(--border);color:var(--t2);
  padding:2px 7px;border-radius:5px;cursor:pointer;font-size:0.7rem;line-height:1.4}
.auto-refresh .ar-btn:hover{color:var(--t1);border-color:var(--t2)}

/* ─── Price alert button & panel ─── */
.alert-wrap{position:relative}
.alert-btn{background:none;border:1px solid var(--border);color:var(--t2);
  padding:7px 12px;border-radius:8px;cursor:pointer;
  font-size:0.75rem;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.alert-btn:hover{color:var(--t1);border-color:var(--t2)}
.alert-btn.has-alerts{border-color:var(--yellow);color:var(--yellow)}
.alert-panel{position:absolute;top:calc(100% + 8px);right:0;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;width:270px;z-index:400;box-shadow:0 8px 32px rgba(0,0,0,.45);
  display:none}
.alert-panel.open{display:block}
.alert-panel .ap-title{font-size:0.8rem;font-weight:700;margin-bottom:10px}
.alert-panel .ap-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.alert-panel .ap-row label{font-size:0.75rem;color:var(--t2);min-width:54px}
.alert-panel .ap-row input,
.alert-panel .ap-row select{flex:1;padding:6px 10px;border-radius:6px;
  background:var(--card2);color:var(--t1);border:1px solid var(--border);font-size:0.875rem}
.alert-panel .ap-row input:focus,
.alert-panel .ap-row select:focus{outline:none;border-color:var(--yellow)}
.alert-list{max-height:130px;overflow-y:auto;margin-top:4px}
.alert-item{display:flex;align-items:center;gap:6px;
  padding:5px 0;border-bottom:1px solid var(--border);font-size:0.75rem}
.alert-item .ai-type{padding:2px 6px;border-radius:4px;font-weight:700;font-size:0.65rem;flex-shrink:0}
.alert-item .ai-type.up{background:rgba(16,185,129,.2);color:var(--green)}
.alert-item .ai-type.dn{background:rgba(239,68,68,.2);color:var(--red)}
.alert-item .ai-price{flex:1;font-variant-numeric:tabular-nums;font-weight:700}
.alert-item .ai-done{font-size:0.65rem;color:var(--t3)}
.alert-item .ai-del{cursor:pointer;color:var(--t3);font-size:1rem;
  background:none;border:none;margin-left:auto;padding:0 2px;line-height:1}
.alert-item .ai-del:hover{color:var(--red)}

/* ─── Score history chart ─── */
.score-hist{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-bottom:14px}
.score-hist h3{font-size:0.8rem;color:var(--t2);margin-bottom:10px}

/* ─── Collapsible sections ─── */
.sec-toggle{background:none;border:none;cursor:pointer;color:var(--t3);
  font-size:0.8rem;padding:2px 6px;border-radius:4px;
  margin-left:auto;transition:transform .25s;flex-shrink:0;line-height:1}
.sec-toggle:hover{color:var(--t1)}
.sec-toggle.collapsed{transform:rotate(-90deg)}
.sec-body{overflow:hidden;transition:max-height .3s ease,opacity .2s ease;
  max-height:9999px;opacity:1}
.sec-body.collapsed{max-height:0 !important;opacity:0;pointer-events:none}

/* ─── Keyboard shortcuts overlay ─── */
.kbd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:3000;padding:20px}
.kbd-overlay.open{display:flex}
.kbd-box{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:24px 32px;min-width:300px}
.kbd-box h3{font-size:1rem;margin-bottom:16px;font-weight:800}
.kbd-row{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:0.875rem;color:var(--t2)}
.kbd-row:last-child{border-bottom:none}
.kbd-key{display:inline-flex;align-items:center;justify-content:center;
  min-width:28px;padding:3px 8px;border-radius:5px;
  background:var(--card2);border:1px solid var(--border);
  font-family:monospace;font-size:0.8rem;font-weight:700;color:var(--t1)}

/* ═══════ 9-Feature Enhancement CSS ═══════ */

/* ── 1. 今日操作燈號卡片 ── */
.signal-light-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.sl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sl-title{font-size:.85rem;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.sl-emoji{font-size:2.4rem;line-height:1;margin-right:8px}
.sl-main{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.sl-signal{font-size:1.6rem;font-weight:800;letter-spacing:.01em}
.sl-signal.strong-buy{color:var(--green)}
.sl-signal.buy{color:var(--green2)}
.sl-signal.neutral{color:var(--yellow)}
.sl-signal.sell{color:var(--red2)}
.sl-signal.strong-sell{color:var(--red)}
.sl-bars{flex:1;display:flex;flex-direction:column;gap:6px}
.sl-bar-row{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--t2)}
.sl-bar-label{width:36px;text-align:right;font-weight:600}
.sl-bar-track{flex:1;height:8px;border-radius:4px;background:var(--card2);overflow:hidden}
.sl-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.sl-bar-fill.buy-bar{background:linear-gradient(90deg,var(--green2),var(--green))}
.sl-bar-fill.sell-bar{background:linear-gradient(90deg,var(--red2),var(--red))}
.sl-bar-count{width:28px;text-align:left;color:var(--t1);font-weight:700}
.sl-conds{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-top:8px}
.sl-cond{font-size:.73rem;display:flex;align-items:center;gap:5px;color:var(--t2)}
.sl-cond .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sl-cond .dot.hit{background:var(--green)}
.sl-cond .dot.miss{background:var(--t3)}
.sl-cond .dot.sell-hit{background:var(--red)}
.sl-score-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;border:1px solid currentColor}
.sl-score-badge.strong-buy{color:var(--green);background:rgba(16,185,129,.12)}
.sl-score-badge.buy{color:var(--green2);background:rgba(52,211,153,.10)}
.sl-score-badge.neutral{color:var(--yellow);background:rgba(245,158,11,.10)}
.sl-score-badge.sell{color:var(--red2);background:rgba(248,113,113,.10)}
.sl-score-badge.strong-sell{color:var(--red);background:rgba(239,68,68,.12)}

/* ── 2. 歷史K線標記圖例 ── */
.chart-legend-ext{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;font-size:.73rem;color:var(--t2)}
.cle-item{display:flex;align-items:center;gap:4px}
.cle-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cle-dot.buy{background:var(--green)}
.cle-dot.sell{background:var(--red)}

/* ── 3. 指標推播通知面板 ── */
.ind-alert-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.ial-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ial-title{font-size:.85rem;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.ial-list{display:flex;flex-direction:column;gap:6px}
.ial-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;background:var(--card2);border-left:3px solid transparent;animation:ialIn .3s ease}
.ial-item.info{border-left-color:var(--blue)}
.ial-item.warn{border-left-color:var(--yellow)}
.ial-item.danger{border-left-color:var(--red)}
.ial-item.success{border-left-color:var(--green)}
.ial-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.ial-body{flex:1}
.ial-body strong{font-size:.8rem;color:var(--t1);display:block}
.ial-body span{font-size:.74rem;color:var(--t2)}
.ial-time{font-size:.7rem;color:var(--t3);white-space:nowrap;margin-top:1px}
.ial-empty{text-align:center;color:var(--t3);font-size:.8rem;padding:12px 0}
@keyframes ialIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── 4. 盤前今日重點提示卡片 ── */
.daily-brief{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.db-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.db-icon{font-size:1.5rem}
.db-title{font-size:.9rem;font-weight:700;color:var(--t1)}
.db-subtitle{font-size:.75rem;color:var(--t2);margin-top:1px}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:10px}
.db-item{background:var(--card2);border-radius:10px;padding:10px 12px}
.db-item-label{font-size:.72rem;color:var(--t2);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.db-item-value{font-size:.95rem;font-weight:700;color:var(--t1)}
.db-item-value.up{color:var(--green)}
.db-item-value.down{color:var(--red)}
.db-strategy{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(139,92,246,.08));border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:12px 14px}
.db-strategy-label{font-size:.72rem;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.db-strategy-text{font-size:.82rem;color:var(--t1);line-height:1.6}
.db-bullets{margin:6px 0 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:4px}
.db-bullets li{font-size:.78rem;color:var(--t2);padding-left:14px;position:relative}
.db-bullets li::before{content:'▸';position:absolute;left:0;color:var(--blue)}

/* ── 5. K線型態徽章 ── */
.candle-patterns-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:14px}
.cp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cp-title{font-size:.85rem;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.cp-badges{display:flex;flex-wrap:wrap;gap:7px}
.pattern-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:.78rem;font-weight:700;border:1px solid transparent;cursor:default;transition:transform .15s}
.pattern-badge:hover{transform:scale(1.06)}
.pattern-badge.bull{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:var(--green)}
.pattern-badge.bear{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:var(--red)}
.pattern-badge.neut{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:var(--yellow)}
.pattern-badge .pb-icon{font-size:1rem}
.cp-none{color:var(--t3);font-size:.8rem;padding:4px 0}

/* ── 6. SOX相關性分析面板 ── */
.sox-corr{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc-title{font-size:.85rem;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:10px}
.sc-stat{background:var(--card2);border-radius:10px;padding:10px 12px;text-align:center}
.sc-stat-val{font-size:1.2rem;font-weight:800;color:var(--t1)}
.sc-stat-val.pos{color:var(--green)}
.sc-stat-val.neg{color:var(--red)}
.sc-stat-label{font-size:.7rem;color:var(--t2);margin-top:3px}
.sc-note{font-size:.74rem;color:var(--t3);line-height:1.5;margin-top:6px}
.sc-chart-wrap{height:80px;margin-top:8px;position:relative}

/* ── 7. 分批進場視覺化 (金字塔) ── */
.pyramid-vis{margin-top:14px;padding:14px 16px;background:var(--card2);border-radius:10px;border:1px solid var(--border)}
.pv-title{font-size:.78rem;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.pv-timeline{position:relative;padding-left:20px}
.pv-timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}
.pv-step{position:relative;margin-bottom:12px;padding-left:16px}
.pv-step::before{content:'';position:absolute;left:-13px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.pv-step.active::before{border-color:var(--blue);background:var(--blue)}
.pv-step.filled::before{border-color:var(--green);background:var(--green)}
.pv-step-label{font-size:.76rem;font-weight:700;color:var(--t1);margin-bottom:2px}
.pv-step-detail{font-size:.72rem;color:var(--t2)}
.pv-step-bar{height:6px;border-radius:3px;margin-top:4px;background:var(--card);overflow:hidden;max-width:160px}
.pv-step-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s}
.pv-stop{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red);font-size:.74rem;font-weight:700;margin-top:4px;margin-right:6px}
.pv-tp{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);font-size:.74rem;font-weight:700;margin-top:4px}
.pv-summary{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pv-sum-item{font-size:.74rem;color:var(--t2);display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:70px;background:var(--card);padding:7px;border-radius:8px}
.pv-sum-item strong{font-size:.92rem;color:var(--t1);font-weight:700}

/* ── 8. 個人勝率儀表板 (擴充) ── */
.wr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px}
.wr-cell{background:var(--card2);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.wr-cell-label{font-size:.72rem;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.wr-cell-val{font-size:1.1rem;font-weight:800;color:var(--t1)}
.wr-cell-val.good{color:var(--green)}
.wr-cell-val.bad{color:var(--red)}
.wr-cell-val.ok{color:var(--yellow)}
.wr-bar-wrap{height:5px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:2px}
.wr-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.wr-section-title{font-size:.78rem;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 6px 0;border-top:1px solid var(--border);padding-top:10px}

/* ── 9. 假訊號過濾器 ── */
.false-signal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:14px}
.fs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fs-title{font-size:.85rem;color:var(--t2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.fs-table{width:100%;border-collapse:collapse;font-size:.76rem}
.fs-table th{color:var(--t3);font-weight:600;text-align:left;padding:5px 8px;border-bottom:1px solid var(--border)}
.fs-table td{color:var(--t1);padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
.fs-table tr:last-child td{border-bottom:none}
.fs-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700}
.fs-tag.true-sig{background:rgba(16,185,129,.15);color:var(--green)}
.fs-tag.false-sig{background:rgba(239,68,68,.15);color:var(--red)}
.fs-tag.unknown{background:rgba(100,116,139,.15);color:var(--t2)}

/* light-mode overrides for new cards */
body.light .signal-light-card,body.light .ind-alert-panel,body.light .daily-brief,
body.light .candle-patterns-card,body.light .sox-corr,body.light .false-signal-card{
  box-shadow:0 2px 8px rgba(0,0,0,.08)
}

/* ═══ 區塊分組標頭 (Zone Headers) ═══ */
.zone-header{
  display:flex;align-items:flex-start;gap:14px;
  margin:28px 0 16px;padding:14px 18px;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(139,92,246,.05));
  border-left:4px solid var(--blue);
  position:relative;overflow:hidden;
}
.zone-header::after{
  content:'';position:absolute;right:-20px;top:-20px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(139,92,246,.06);
}
.zh-letter{
  width:34px;height:34px;border-radius:8px;flex-shrink:0;
  background:var(--blue);display:flex;align-items:center;justify-content:center;
  font-size:.9rem;font-weight:800;color:#fff;letter-spacing:-.01em;margin-top:1px;
}
.zh-emoji{font-size:1.5rem;flex-shrink:0;margin-top:2px}
.zh-body{flex:1;min-width:0}
.zh-title{font-size:1rem;font-weight:800;color:var(--t1);letter-spacing:.01em}
.zh-desc{font-size:.76rem;color:var(--t2);margin-top:3px;line-height:1.5}
.zh-badge{
  align-self:flex-start;padding:3px 10px;border-radius:10px;
  font-size:.7rem;font-weight:700;white-space:nowrap;margin-top:4px;
}
.zh-badge.live{background:rgba(16,185,129,.15);color:var(--green)}
.zh-badge.analysis{background:rgba(59,130,246,.15);color:var(--blue)}
.zh-badge.strategy{background:rgba(245,158,11,.15);color:var(--yellow)}
.zh-badge.advanced{background:rgba(100,116,139,.15);color:var(--t2)}
.zh-badge.personal{background:rgba(139,92,246,.15);color:var(--purple)}

/* Zone 顏色變體 */
.zone-header.zone-a{border-left-color:var(--green);background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(52,211,153,.04))}
.zone-header.zone-a .zh-letter{background:var(--green)}
.zone-header.zone-b{border-left-color:var(--cyan);background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(6,182,212,.03))}
.zone-header.zone-b .zh-letter{background:var(--cyan)}
.zone-header.zone-c{border-left-color:var(--purple);background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(139,92,246,.03))}
.zone-header.zone-c .zh-letter{background:var(--purple)}
.zone-header.zone-d{border-left-color:var(--yellow);background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.03))}
.zone-header.zone-d .zh-letter{background:var(--yellow);color:#1a1a1a}
.zone-header.zone-e{border-left-color:var(--blue);background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(59,130,246,.03))}
.zone-header.zone-f{border-left-color:var(--red);background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.03))}
.zone-header.zone-f .zh-letter{background:var(--red)}
.zone-header.zone-g{border-left-color:var(--t3);background:linear-gradient(135deg,rgba(100,116,139,.06),rgba(100,116,139,.02))}
.zone-header.zone-g .zh-letter{background:var(--t3)}

/* 新手說明 tooltip */
.hint-tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:8px;font-size:.68rem;font-weight:600;
  background:rgba(59,130,246,.12);color:var(--blue);cursor:help;
  border:1px solid rgba(59,130,246,.2);margin-left:6px;vertical-align:middle;
}
.hint-tag:hover{background:rgba(59,130,246,.2)}

/* ── 日誌快照 V2 ── */
.pc-snapshot{font-size:.68rem;color:var(--t3);margin:-4px 0 8px;padding:5px 8px;
  background:rgba(59,130,246,.06);border-radius:6px;line-height:1.6}

/* ── 杜金龍功能：KD 共振卡片 ── */
.du-kd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:12px}
.du-kd-card{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.du-kd-label{font-size:.72rem;color:var(--t3);margin-bottom:6px;font-weight:600;letter-spacing:.02em}
.du-kd-cross{font-size:.9rem;font-weight:800;margin-bottom:4px}
.du-kd-vals{font-size:.7rem;color:var(--t2)}
.du-resonance-bar{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--border)}
/* ── 杜金龍功能：外資連續天數 ── */
.du-foreign-card{background:var(--card);border-radius:12px;padding:16px 20px;margin-bottom:14px;border:1px solid var(--border);display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.du-foreign-main{flex:1;min-width:180px}
.du-streak-num{font-size:2rem;font-weight:900;line-height:1;margin-bottom:4px}
.du-streak-label{font-size:.78rem;font-weight:700;margin-bottom:6px}
.du-streak-dots{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0 6px}
.du-streak-dot{width:14px;height:14px;border-radius:50%}
.du-streak-sub{font-size:.7rem;color:var(--t3);line-height:1.4}
.du-foreign-rule{flex:1;min-width:200px;border-left:1px solid var(--border);padding-left:16px;font-size:.72rem;color:var(--t2);line-height:1.7}
.du-foreign-rule strong{color:var(--t1);display:block;font-size:.75rem;margin-bottom:6px}

body.light .du-kd-card,body.light .du-resonance-bar,body.light .du-foreign-card{background:#fff;border-color:#e2e8f0}

body.light .zone-header{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(139,92,246,.03))}

/* ═══ 優化 6：手機版 RWD ═══ */
@media (max-width: 768px){
  body{ font-size: 14px; }
  .header{ padding: 12px 14px; gap: 10px; flex-direction: column; align-items: flex-start; }
  .hd-left{ min-width: unset; width: 100%; }
  .hd-right{ width: 100%; justify-content: flex-start; flex-wrap: wrap; }
  .price-big{ font-size: 2rem; }

  .zone-header{ padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
  .zh-letter{ width: 28px; height: 28px; font-size: .8rem; }
  .zh-title{ font-size: .85rem; }
  .zh-desc{ font-size: .68rem; }

  /* 卡片網格：手機上強制單欄 */
  .grid-2,.grid-3,.grid-4,
  [style*="grid-template-columns"]{
    grid-template-columns: 1fr !important;
  }
  .ic-grid, .wr-grid, .du-kd-grid, .mtf-grid{
    grid-template-columns: 1fr 1fr !important;
  }

  /* 訊號燈卡片 */
  .signal-light-card{ flex-direction: column; }
  .sl-bars{ flex-direction: column; gap: 6px; }

  /* 走勢圖容器 */
  #pc{ height: 220px !important; }
  .chart-wrap{ height: 240px !important; }

  /* 部位計算機 */
  .poscalc-grid{ grid-template-columns: 1fr !important; }

  /* 日誌表格：手機上縮小欄位 */
  .trade-table th, .trade-table td{ padding: 5px 4px; font-size: .68rem; }
  .trade-table th:nth-child(n+6), .trade-table td:nth-child(n+6){ display: none; }

  /* MTF 卡片 */
  .mtf-grid{ grid-template-columns: 1fr !important; }

  /* 外資連續天數卡片 */
  .du-foreign-card{ flex-direction: column; }
  .du-foreign-rule{ border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 10px; margin-top: 6px; }

  /* 籌碼卡片橫向排列改縱排 */
  .pyramid-table{ font-size: .72rem; }
  .pf-row label{ min-width: 60px; font-size: .75rem; }

  /* 按鈕區 */
  .j-buttons{ flex-wrap: wrap; gap: 6px; }
  .btn{ padding: 7px 12px; font-size: .78rem; }

  /* 底部工具列 */
  .foot{ font-size: .68rem; }
  .legend{ font-size: .72rem; line-height: 1.7; }
}
</style>

<div id="app"><div class="loader"><div class="spin"></div><span>正在從台灣證交所載入數據…</span></div></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   MODULE: CONFIG & CONSTANTS
   ═══════════════════════════════════════════════════════════════ */
const CFG = {
  STOCK_NO: '2330',
  HISTORY_MONTHS: 15,
  CACHE_KEY: 'tsmc_dashboard_v2_cache',
  CACHE_TTL_MS: 30 * 60 * 1000,        // 30 分鐘
  STALE_HOURS: 24,                      // 超過 24 小時提示資料過舊
  KNN_K: 25,                            // K-NN 取最相似 25 日
  KNN_MIN_HISTORY: 60,                  // 至少累積 60 日歷史才能比對
  KNN_EXCLUDE_RECENT: 5,                // 跳過最近 N 日避免資料外洩
  ATR_PERIOD: 14,
  TF_OPTIONS: [30, 60, 120, 240]        // 圖表時間軸選項
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: FORMAT HELPERS
   ═══════════════════════════════════════════════════════════════ */
const F = {
  num(n, d = 2){ return n == null || isNaN(n) ? '--' : n.toFixed(d); },
  pct(n){ return n == null || isNaN(n) ? '--' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; },
  int(n){ return n == null || isNaN(n) ? '--' : Math.round(n).toLocaleString('en-US'); },
  k(n){ return n == null || isNaN(n) ? '--' : (n / 1000).toFixed(0); },
  clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); },
  parseNum(s){
    if(!s || s === '' || s === '--' || s === '-') return NaN;
    return parseFloat(String(s).replace(/,/g, ''));
  },
  rocToDate(roc){
    if(!roc || typeof roc !== 'string') return new Date(NaN);
    const p = roc.split('/');
    if(p.length < 3) return new Date(NaN); // 格式不符時回傳 Invalid Date，由上層 isNaN() 過濾
    return new Date(+p[0] + 1911, +p[1] - 1, +p[2]);
  },
  rocToYmd(roc){
    if(!roc || typeof roc !== 'string') return '';
    const p = roc.split('/');
    if(p.length < 3) return '';
    return `${+p[0] + 1911}${String(+p[1]).padStart(2,'0')}${String(+p[2]).padStart(2,'0')}`;
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: CACHE LAYER (項目 5)
   ═══════════════════════════════════════════════════════════════ */
const Cache = {
  load(){
    try{
      const raw = localStorage.getItem(CFG.CACHE_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch{ return null; }
  },
  save(payload){
    try{
      localStorage.setItem(CFG.CACHE_KEY, JSON.stringify({ ...payload, ts: Date.now() }));
    }catch(e){ console.warn('cache save failed', e); }
  },
  clear(){ try{ localStorage.removeItem(CFG.CACHE_KEY); }catch{} },
  isFresh(c){ return c && (Date.now() - c.ts < CFG.CACHE_TTL_MS); }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: DATA LAYER (TWSE API + 外資 T86)（項目 5、6、7）
   ═══════════════════════════════════════════════════════════════ */
const Data = {
  async fetchMonth(year, month){
    const ds = `${year}${String(month).padStart(2, '0')}01`;
    const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${ds}&stockNo=${CFG.STOCK_NO}`;
    try{
      const r = await fetch(url);
      if(!r.ok) return [];
      const j = await r.json();
      if(j.stat !== 'OK') return [];
      return (j.data || []).map(row => {
        if(!Array.isArray(row) || row.length < 9) return null; // 欄位不足直接跳過
        const c = F.parseNum(row[6]);
        if(isNaN(c) || c <= 0) return null;
        return {
          date: F.rocToDate(row[0]), dateStr: row[0], ymd: F.rocToYmd(row[0]),
          open: F.parseNum(row[3]), high: F.parseNum(row[4]),
          low: F.parseNum(row[5]), close: c, vol: F.parseNum(row[1])
        };
      }).filter(Boolean);
    }catch(e){ return []; }
  },

  async loadHistory(forceRefresh = false){
    // ─── 嘗試使用快取（項目 5） ───
    if(!forceRefresh){
      const cached = Cache.load();
      if(Cache.isFresh(cached) && cached.rows && cached.rows.length){
        return {
          rows: cached.rows.map(r => ({ ...r, date: new Date(r.date) })),
          foreign: cached.foreign,
          cacheAgeMs: Date.now() - cached.ts,
          fromCache: true
        };
      }
    }

    const now = new Date();
    const months = [];
    for(let i = CFG.HISTORY_MONTHS - 1; i >= 0; i--){
      let m = now.getMonth() + 1 - i, y = now.getFullYear();
      while(m <= 0){ m += 12; y--; }
      months.push({ y, m });
    }
    const results = await Promise.allSettled(months.map(({ y, m }) => this.fetchMonth(y, m)));
    const all = [];
    for(const r of results) if(r.status === 'fulfilled') all.push(...r.value);
    all.sort((a, b) => a.date - b.date);

    // ─── 抓取外資資料（項目 7） ───
    let foreign = null;
    if(all.length){
      const lastYmd = all[all.length - 1].ymd;
      foreign = await this.fetchForeign(lastYmd);
    }

    // ─── 寫入快取 ───
    Cache.save({ rows: all, foreign });
    return { rows: all, foreign, cacheAgeMs: 0, fromCache: false };
  },

  async fetchForeign(ymd){
    // T86: 三大法人買賣超日報
    const url = `https://www.twse.com.tw/fund/T86?response=json&date=${ymd}&selectType=ALLBUT0999`;
    try{
      const r = await fetch(url);
      if(!r.ok) return null;
      const j = await r.json();
      if(j.stat !== 'OK' || !Array.isArray(j.data)) return null;
      const row = j.data.find(rr => rr[0] && rr[0].trim() === CFG.STOCK_NO);
      if(!row) return null;
      // 欄位（依 TWSE 規範可能略有差異）：
      // [0]證券代號 [1]證券名稱 [2]外陸資買 [3]外陸資賣 [4]外陸資買賣超
      // 後續欄位可能有自營商、投信。我們只取外資買賣超。
      const findNet = (start) => {
        for(let i = start; i < row.length; i++){
          const v = F.parseNum(row[i]);
          if(!isNaN(v) && Math.abs(v) > 1000) return v; // 經驗法則：股數量級
        }
        return F.parseNum(row[4]);
      };
      const foreignNet = findNet(4);
      // 投信淨買通常在第 7 或 9 欄
      let trustNet = NaN;
      // 嚴謹找：往後逐欄解析，第二個有意義的買賣超即為投信
      let foundCount = 0;
      for(let i = 5; i < row.length; i++){
        const v = F.parseNum(row[i]);
        if(!isNaN(v) && Math.abs(v) > 100){
          foundCount++;
          if(foundCount === 2){ trustNet = v; break; }
        }
      }
      return {
        foreignNet,
        trustNet,
        date: ymd
      };
    }catch(e){ return null; }
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: INDICATORS（項目 1：修 KD bug、項目 3：新增指標）
   ═══════════════════════════════════════════════════════════════ */
const Ind = {
  ma(arr, p){
    return arr.map((_, i) => i < p - 1 ? null
      : arr.slice(i - p + 1, i + 1).reduce((a, b) => a + b, 0) / p);
  },
  ema(arr, p){
    const k = 2 / (p + 1);
    // 準確性修正：使用前 p 日 SMA 作為 EMA 起始值，消除冷啟動偏誤
    // 原本用 arr[0] 當種子，若第1個值偏離均值會拉偏整條 EMA
    // Bug4 修正：迴圈從 seedLen 開始，避免 arr[1..seedLen-1] 被重複計算
    const seedLen = Math.min(p, arr.length);
    const seed = arr.slice(0, seedLen).reduce((a, b) => a + b, 0) / seedLen;
    const e = new Array(seedLen).fill(seed);
    for(let i = seedLen; i < arr.length; i++) e.push(arr[i] * k + e[i - 1] * (1 - k));
    return e;
  },
  macd(c){
    const e12 = this.ema(c, 12), e26 = this.ema(c, 26);
    const dif = e12.map((v, i) => v - e26[i]);
    const dea = this.ema(dif, 9);
    return { dif, dea, hist: dif.map((v, i) => (v - dea[i]) * 2) };
  },
  rsi(c, p = 14){
    const out = new Array(p).fill(null);
    let ag = 0, al = 0;
    for(let i = 1; i <= p; i++){
      const d = c[i] - c[i - 1];
      d > 0 ? (ag += d) : (al -= d);
    }
    ag /= p; al /= p;
    out.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
    for(let i = p + 1; i < c.length; i++){
      const d = c[i] - c[i - 1];
      ag = (ag * (p - 1) + Math.max(d, 0)) / p;
      al = (al * (p - 1) + Math.max(-d, 0)) / p;
      out.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
    }
    return out;
  },
  // ── 修復 KD bug（項目 1）：第一個有效 RSV 才開始累積，而非寫死 50 ──
  kd(h, l, c, p = 9){
    const K = [], D = [];
    let pk = null, pd = null;
    for(let i = 0; i < c.length; i++){
      if(i < p - 1){
        K.push(null); D.push(null);
        continue;
      }
      const hh = Math.max(...h.slice(i - p + 1, i + 1));
      const ll = Math.min(...l.slice(i - p + 1, i + 1));
      const rsv = hh === ll ? 50 : (c[i] - ll) / (hh - ll) * 100;
      if(pk === null){
        // 修正：第一個有效值用 RSV 當作起始 K、D（國際標準作法）
        pk = rsv; pd = rsv;
        K.push(pk); D.push(pd);
        continue;
      }
      const kv = pk * 2 / 3 + rsv / 3;
      const dv = pd * 2 / 3 + kv / 3;
      K.push(kv); D.push(dv);
      pk = kv; pd = dv;
    }
    return { K, D };
  },
  psy(c, p = 12){
    return c.map((_, i) => {
      if(i < p) return null;
      let up = 0;
      for(let j = i - p + 1; j <= i; j++) if(c[j] > c[j - 1]) up++;
      return up / p * 100;
    });
  },
  boll(c, p = 20, mult = 2){
    return c.map((_, i) => {
      if(i < p - 1) return null;
      const sl = c.slice(i - p + 1, i + 1);
      const mean = sl.reduce((a, b) => a + b, 0) / p;
      const std = Math.sqrt(sl.reduce((a, b) => a + (b - mean) ** 2, 0) / p);
      return { upper: mean + mult * std, mid: mean, lower: mean - mult * std };
    });
  },
  volMA(v, p = 20){
    return v.map((_, i) => i < p - 1 ? null
      : v.slice(i - p + 1, i + 1).reduce((a, b) => a + b, 0) / p);
  },
  // ── OBV 能量潮（項目 3） ──
  obv(c, v){
    const out = [v[0] || 0];
    for(let i = 1; i < c.length; i++){
      const prev = out[i - 1];
      if(c[i] > c[i - 1]) out.push(prev + v[i]);
      else if(c[i] < c[i - 1]) out.push(prev - v[i]);
      else out.push(prev);
    }
    return out;
  },
  obvMA(obv, p = 20){
    return this.ma(obv, p);
  },
  // ── ADX 趨勢強度（14 日 Wilder 平滑） ──
  adx(h, l, c, p = 14){
    const n = c.length;
    const tr = [], dmp = [], dmm = [];
    for(let i = 0; i < n; i++){
      if(i === 0){ tr.push(h[i]-l[i]); dmp.push(0); dmm.push(0); continue; }
      tr.push(Math.max(h[i]-l[i], Math.abs(h[i]-c[i-1]), Math.abs(l[i]-c[i-1])));
      const up = h[i]-h[i-1], dn = l[i-1]-l[i];
      dmp.push(up>dn&&up>0?up:0);
      dmm.push(dn>up&&dn>0?dn:0);
    }
    // Wilder smoothing: sum first p, then rolling
    const wilder = (arr) => {
      const out = new Array(p-1).fill(null);
      let s = arr.slice(0,p).reduce((a,b)=>a+b,0);
      out.push(s);
      for(let i=p;i<arr.length;i++){ s = s - s/p + arr[i]; out.push(s); }
      return out;
    };
    const trS=wilder(tr), dpS=wilder(dmp), dmS=wilder(dmm);
    const diP = trS.map((v,i)=>v&&v>0?dpS[i]/v*100:null);
    const diM = trS.map((v,i)=>v&&v>0?dmS[i]/v*100:null);
    const dx = diP.map((dp,i)=>{
      const dm=diM[i]; if(dp==null||dm==null) return null;
      const s=dp+dm; return s===0?0:Math.abs(dp-dm)/s*100;
    });
    // ADX = Wilder smooth of DX starting from index p
    // Bug5 修正：第一個有效 ADX 應在 index 2p-2，用 p*2-2 個 null 對齊正確位置
    const adxOut = new Array(p*2-2).fill(null);
    let adxV=null;
    for(let i=p-1;i<dx.length;i++){
      if(dx[i]==null) continue;
      if(adxV==null){ adxV=dx[i]; adxOut.push(adxV); continue; }
      adxV = (adxV*(p-1)+dx[i])/p;
      adxOut.push(adxV);
    }
    // pad to same length
    while(adxOut.length<n) adxOut.push(adxOut[adxOut.length-1]);
    return { adx: adxOut.slice(0,n), diPlus: diP, diMinus: diM };
  },

  // ── MFI 資金流量指標（Money Flow Index）──
  // 結合「價格位置 + 成交量」的 RSI，更能反映機構資金進出
  // MFI < 20 = 資金大量流出（超賣）；MFI > 80 = 資金大量流入（超買）
  mfi(h, l, c, v, p = 14){
    const n = c.length;
    const tp = c.map((ci, i) => (h[i] + l[i] + ci) / 3);  // Typical Price
    const mf = tp.map((t, i) => t * (v[i] || 0));           // Raw Money Flow
    const out = new Array(p).fill(null);
    for(let i = p; i < n; i++){
      let pos = 0, neg = 0;
      for(let j = i - p + 1; j <= i; j++){
        if(j === 0) continue;
        if(tp[j] > tp[j - 1]) pos += mf[j];
        else if(tp[j] < tp[j - 1]) neg += mf[j];
        // equal: neutral, neither added
      }
      out.push(neg === 0 ? 100 : 100 - 100 / (1 + pos / neg));
    }
    return out;
  },

  // ── ATR 真實波幅（項目 3） ──
  atr(h, l, c, p = CFG.ATR_PERIOD){
    const tr = [];
    for(let i = 0; i < c.length; i++){
      if(i === 0) tr.push(h[i] - l[i]);
      else tr.push(Math.max(
        h[i] - l[i],
        Math.abs(h[i] - c[i - 1]),
        Math.abs(l[i] - c[i - 1])
      ));
    }
    const out = new Array(p - 1).fill(null);
    let prev = tr.slice(0, p).reduce((a, b) => a + b, 0) / p;
    out.push(prev);
    for(let i = p; i < tr.length; i++){
      prev = (prev * (p - 1) + tr[i]) / p;
      out.push(prev);
    }
    return out;
  },

  // ── VWAP（20日量加權平均價）──
  // 反映過去 20 個交易日法人的平均持倉成本
  // 價格在 VWAP 上方 = 多方佔優；下方 = 空方佔優
  vwap(h, l, c, v, period = 20){
    const tp = c.map((ci, i) => (h[i] + l[i] + ci) / 3); // Typical Price
    return tp.map((_, i) => {
      if(i < period - 1) return null;
      const tpSl = tp.slice(i - period + 1, i + 1);
      const vSl  = v.slice(i - period + 1, i + 1);
      const num  = tpSl.reduce((s, t, j) => s + t * (vSl[j] || 0), 0);
      const den  = vSl.reduce((s, vi) => s + (vi || 0), 0);
      return den > 0 ? num / den : null;
    });
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: DIVERGENCE DETECTOR（項目 3：背離偵測）
   ═══════════════════════════════════════════════════════════════ */
const Div = {
  findPivots(arr, lookback, type){
    // type: 'min' or 'max'
    const pivots = [];
    for(let i = 2; i < arr.length - 2; i++){
      if(arr[i] == null) continue;
      const v = arr[i];
      const cmp = (a, b) => type === 'min' ? a < b : a > b;
      if(cmp(v, arr[i - 1]) && cmp(v, arr[i - 2]) &&
         cmp(v, arr[i + 1]) && cmp(v, arr[i + 2])){
        pivots.push({ idx: i, val: v });
      }
    }
    return pivots;
  },
  // 偵測最近 lookback 日內的價格 vs 指標背離
  detect(prices, indicator, lookback = 30){
    const n = prices.length;
    if(n < lookback) return null;
    const start = Math.max(0, n - lookback);
    const pSlice = prices.slice(start);
    const iSlice = indicator.slice(start);

    const priceLows = this.findPivots(pSlice, lookback, 'min');
    const priceHighs = this.findPivots(pSlice, lookback, 'max');

    // 多頭背離：價格低點下探，但指標低點上抬 → 跌勢有衰竭跡象
    if(priceLows.length >= 2){
      const [a, b] = priceLows.slice(-2);
      const pA = pSlice[a.idx], pB = pSlice[b.idx];
      const iA = iSlice[a.idx], iB = iSlice[b.idx];
      if(pA != null && pB != null && iA != null && iB != null
         && pB < pA && iB > iA){
        return { type: 'bull', priceA: pA, priceB: pB, indA: iA, indB: iB };
      }
    }
    // 空頭背離：價格高點上攻，但指標高點下移 → 漲勢有衰竭跡象
    if(priceHighs.length >= 2){
      const [a, b] = priceHighs.slice(-2);
      const pA = pSlice[a.idx], pB = pSlice[b.idx];
      const iA = iSlice[a.idx], iB = iSlice[b.idx];
      if(pA != null && pB != null && iA != null && iB != null
         && pB > pA && iB < iA){
        return { type: 'bear', priceA: pA, priceB: pB, indA: iA, indB: iB };
      }
    }
    return null;
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: SPECIAL DATES（K-NN 特殊事件過濾）
   ═══════════════════════════════════════════════════════════════ */
const SpecialDates = {
  // 台積電法說會週：每季 1/15-22、4/15-22、7/15-22、10/15-22
  isEarningsWeek(d){
    const m = d.getMonth()+1, day = d.getDate();
    return [1,4,7,10].includes(m) && day >= 13 && day <= 23;
  },
  // 除息期間（台積電通常 7 月上中旬）
  isExDivPeriod(d){
    const m = d.getMonth()+1, day = d.getDate();
    return m === 7 && day >= 1 && day <= 20;
  },
  // Fed FOMC 週（每年約 1/3/5/6/7/9/11/12 月中旬前後）
  isFedWeek(d){
    const m = d.getMonth()+1, day = d.getDate();
    if(![1,3,5,6,7,9,11,12].includes(m)) return false;
    const week = Math.ceil(day/7);
    return week >= 2 && week <= 3;
  },
  isSpecial(d){ return this.isEarningsWeek(d)||this.isExDivPeriod(d)||this.isFedWeek(d); },
  type(d){
    if(this.isEarningsWeek(d)) return '財報週';
    if(this.isExDivPeriod(d))  return '除息期';
    if(this.isFedWeek(d))      return 'Fed 週';
    return null;
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: FOREIGN HISTORY（籌碼連續買賣超歷史）
   ═══════════════════════════════════════════════════════════════ */
const ForeignHistory = {
  KEY: 'tsmc_chip_hist_v1',
  MAX: 30,
  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY))||[]; }catch{ return []; } },
  save(a){ try{ localStorage.setItem(this.KEY,JSON.stringify(a.slice(-this.MAX))); }catch{} },
  push(foreign){
    if(!foreign||isNaN(foreign.foreignNet)) return this.load();
    const a = this.load();
    if(a.length && a[a.length-1].date===foreign.date)
      a[a.length-1] = foreign;
    else
      a.push(foreign);
    this.save(a);
    return a;
  },
  stats(){
    const a = this.load();
    if(!a.length) return null;
    const latest = a[a.length-1];
    // 外資連續方向
    const fDir = latest.foreignNet > 0 ? 1 : latest.foreignNet < 0 ? -1 : 0;
    let fConsec = 0;
    for(let i=a.length-1;i>=0;i--){
      const d = a[i].foreignNet>0?1:a[i].foreignNet<0?-1:0;
      if(d===fDir) fConsec++; else break;
    }
    // 投信連續方向
    const tDir = !isNaN(latest.trustNet)?(latest.trustNet>0?1:latest.trustNet<0?-1:0):0;
    let tConsec = 0;
    if(tDir!==0){
      for(let i=a.length-1;i>=0;i--){
        const d = !isNaN(a[i].trustNet)?(a[i].trustNet>0?1:a[i].trustNet<0?-1:0):0;
        if(d===tDir) tConsec++; else break;
      }
    }
    // 近 5 日累積
    const last5 = a.slice(-5);
    const fCum5 = last5.reduce((s,x)=>s+(x.foreignNet||0),0);
    const tCum5 = last5.reduce((s,x)=>s+(!isNaN(x.trustNet)?x.trustNet:0),0);
    return {
      foreignConsec: fConsec * fDir,   // 正=連買，負=連賣
      trustConsec:   tConsec * tDir,
      foreignCum5:   fCum5,
      trustCum5:     tCum5,
      latest,
      history: a
    };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: NOTIFIER（Browser Push 通知）
   ═══════════════════════════════════════════════════════════════ */
const Notifier = {
  _last: {},  // { tag: timestamp } 避免同條件短時間重複推送

  isSupported(){ return 'Notification' in window; },
  isGranted(){ return this.isSupported() && Notification.permission === 'granted'; },

  async requestPermission(){
    if(!this.isSupported()) return false;
    const p = await Notification.requestPermission();
    return p === 'granted';
  },

  send(title, body, tag){
    if(!this.isGranted()) return;
    const now = Date.now();
    // 同一個 tag 30 分鐘內只推一次
    if(this._last[tag] && now - this._last[tag] < 30 * 60 * 1000) return;
    this._last[tag] = now;
    try{
      new Notification(title, {
        body, tag,
        icon: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/TSMC_logo.svg/64px-TSMC_logo.svg.png'
      });
    }catch(e){ console.warn('Notifier error', e); }
  },

  // 檢查是否有任何條件觸發，並發送通知
  check(ctx){
    if(!this.isGranted()) return;
    const { cK, cD, pK, pD, cRSI, chipStats, cPSY } = ctx;

    // KD 黃金交叉
    if(pK != null && pD != null && cK != null && cD != null && pK <= pD && cK > cD)
      this.send('🟢 台積電 KD 黃金交叉', `K=${cK.toFixed(1)} 穿越 D=${cD.toFixed(1)}，技術面買點出現`, 'kd-golden');

    // KD 死亡交叉
    if(pK != null && pD != null && cK != null && cD != null && pK >= pD && cK < cD)
      this.send('🔴 台積電 KD 死亡交叉', `K=${cK.toFixed(1)} 下穿 D=${cD.toFixed(1)}，注意出場訊號`, 'kd-dead');

    // RSI 超賣（< 30）
    if(cRSI != null && cRSI < 30)
      this.send('⭐ RSI 超賣警報', `RSI=${cRSI.toFixed(1)}，歷史低檔區，留意反彈買點`, 'rsi-oversold');

    // RSI 超買（> 70）
    if(cRSI != null && cRSI > 70)
      this.send('⚠️ RSI 超買警報', `RSI=${cRSI.toFixed(1)}，高檔區注意過熱風險`, 'rsi-overbought');

    // 外資連買 3 天
    if(chipStats?.foreignConsec >= 3)
      this.send('📈 外資連續買超 ' + chipStats.foreignConsec + ' 天', '法人籌碼持續流入，多頭格局明確', 'foreign-buy');

    // 外資連賣 3 天
    if(chipStats?.foreignConsec <= -3)
      this.send('📉 外資連續賣超 ' + Math.abs(chipStats.foreignConsec) + ' 天', '法人籌碼外流，注意下行風險', 'foreign-sell');

    // PSY 超賣
    if(cPSY != null && cPSY < 25)
      this.send('🔵 PSY 心理指標超賣', `PSY=${cPSY.toFixed(0)}%，市場極度悲觀，歷史上是好的買點`, 'psy-low');
  },

  renderBtn(){
    const granted = this.isGranted();
    const sup = this.isSupported();
    if(!sup) return '';
    return granted
      ? `<button class="btn btn-sm" style="background:rgba(16,185,129,.15);color:var(--green);border:1px solid var(--green)"
           onclick="App.showToast('🔔 通知已啟用，條件觸發時自動推送')">🔔 通知已啟用</button>`
      : `<button class="btn btn-sm" onclick="Notifier.requestPermission().then(ok=>{ if(ok) App.render(); App.showToast(ok?'✅ 通知已啟用':'❌ 瀏覽器拒絕通知授權'); })">
           🔕 啟用桌面通知</button>`;
  }
};
