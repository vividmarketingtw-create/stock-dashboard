/* ═══════════════════════════════════════════════════════════════
   MODULE: SUPPORT/RESISTANCE（項目 4）
   ═══════════════════════════════════════════════════════════════ */
const SR = {
  find(highs, lows, closes, vols, lookback = 60){
    // vols 參數是新增的，舊呼叫若只傳 4 個數字參數時 vols 為 lookback 數字，需向下相容
    if(typeof vols === 'number'){ lookback = vols; vols = null; }
    const n = closes.length;
    const start = Math.max(0, n - lookback);
    const recH = highs.slice(start);
    const recL = lows.slice(start);
    const recC = closes.slice(start);
    const recV = vols ? vols.slice(start) : null;
    const last = closes[n - 1];
    const periodHigh = Math.max(...recH);
    const periodLow = Math.min(...recL);

    // ── 局部高低點 pivot ──
    const highPivots = [], lowPivots = [];
    for(let i = 2; i < recH.length - 2; i++){
      if(recH[i] >= recH[i-1] && recH[i] >= recH[i-2]
         && recH[i] >= recH[i+1] && recH[i] >= recH[i+2])
        highPivots.push(recH[i]);
      if(recL[i] <= recL[i-1] && recL[i] <= recL[i-2]
         && recL[i] <= recL[i+1] && recL[i] <= recL[i+2])
        lowPivots.push(recL[i]);
    }
    const resistance = highPivots.filter(v => v > last).sort((a,b) => a-b)[0] || periodHigh;
    const support    = lowPivots.filter(v => v < last).sort((a,b) => b-a)[0] || periodLow;

    // ── 整數心理關卡（50 倍數） ──
    const step = last < 200 ? 10 : last < 500 ? 25 : last < 1000 ? 50 : 100;
    const intResistance = Math.ceil((last + step * 0.5) / step) * step;
    const intSupport    = Math.floor((last - step * 0.5) / step) * step;

    // ── 成交量密集帶（Volume Profile，30 桶） ──
    let volClusterSup = null, volClusterRes = null;
    if(recV && recV.length){
      const pMin = Math.min(...recL), pMax = Math.max(...recH);
      const bCount = 30, bSize = (pMax - pMin) / bCount || 1;
      const buckets = new Array(bCount).fill(0);
      for(let i = 0; i < recC.length; i++){
        const b = Math.min(bCount-1, Math.floor((recC[i]-pMin)/bSize));
        buckets[b] += recV[i];
      }
      const curB = Math.floor((last - pMin) / bSize);
      let maxBelow = 0, maxAbove = 0;
      for(let i = 0; i < bCount; i++){
        const price = pMin + (i + 0.5) * bSize;
        if(i < curB  && buckets[i] > maxBelow){ maxBelow = buckets[i]; volClusterSup = Math.round(price); }
        if(i > curB  && buckets[i] > maxAbove){ maxAbove = buckets[i]; volClusterRes = Math.round(price); }
      }
    }

    return {
      support, resistance, periodHigh, periodLow,
      supportPct:    (last - support)    / last * 100,
      resistancePct: (resistance - last) / last * 100,
      intSupport, intResistance,
      volClusterSup, volClusterRes
    };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: SCORING（項目 2：加權；項目 14：百分位）
   ═══════════════════════════════════════════════════════════════ */
const Score = {
  // 各指標權重（按可信度與獨立性分配）
  WEIGHTS: {
    // 趨勢類（合計 5）
    ma5: 0.5, ma20: 1.0, ma60: 1.0, maAlign: 1.5, macdDir: 1.0,
    // 動能類（合計 4）
    kdCross: 1.0, kdLevel: 0.5, rsi: 1.0, psy: 1.0, macdMom: 0.5,
    // 量價類（合計 3.5）
    vol: 1.5, obv: 2.0,
    // 波動/位置類（合計 3）
    boll: 1.0, divergence: 2.0
  },
  GROUPS: {
    trend:    ['ma5','ma20','ma60','maAlign','macdDir'],
    momentum: ['kdCross','kdLevel','rsi','psy','macdMom'],
    volume:   ['vol','obv'],
    volat:    ['boll','divergence']
  },

  // 給定每個指標的方向訊號 -1/0/+1，計算加權結果
  direction(signals){
    let weighted = 0, totalW = 0;
    let bullN = 0, bearN = 0, neutN = 0;
    const groupScore = { trend: 0, momentum: 0, volume: 0, volat: 0 };
    const groupMax = { trend: 0, momentum: 0, volume: 0, volat: 0 };
    for(const [k, sig] of Object.entries(signals)){
      const w = this.WEIGHTS[k] || 0;
      weighted += sig * w;
      totalW += w;
      if(sig > 0) bullN++; else if(sig < 0) bearN++; else neutN++;
      // 找該指標所屬群組
      for(const [g, list] of Object.entries(this.GROUPS)){
        if(list.includes(k)){
          groupScore[g] += sig * w;
          groupMax[g] += w;
          break;
        }
      }
    }
    return {
      weighted,                     // -totalW ~ +totalW
      max: totalW,
      ratio: weighted / totalW,     // -1 ~ +1
      bullN, bearN, neutN,
      groupScore, groupMax
    };
  },

  // 進出場評分（保留原 3 層架構，但採用加權方向比例）
  entry(p){
    const { closes, ma20, K, pK, cRSI, cPSY, cHist, pHist,
            cBoll, cVol, cVolMA, chg, dirRatio } = p;
    const n = closes.length, last = closes[n - 1];

    // 層一：技術指標共振強度（滿分 40）
    const alignRate = Math.abs(dirRatio);
    const psyExt = dirRatio > 0
      ? F.clamp((25 - cPSY) / 25, 0, 1)
      : F.clamp((cPSY - 75) / 25, 0, 1);
    const kdExt = dirRatio > 0
      ? F.clamp((20 - K[n - 1]) / 20, 0, 1)
      : F.clamp((K[n - 1] - 80) / 20, 0, 1);
    const rsiExt = dirRatio > 0
      ? F.clamp((30 - cRSI) / 30, 0, 1)
      : F.clamp((cRSI - 70) / 30, 0, 1);
    const avgExt = (psyExt + kdExt + rsiExt) / 3;
    const macdTurn = dirRatio > 0
      ? (pHist < 0 && cHist > 0 ? 1 : cHist > pHist ? 0.5 : 0)
      : (pHist > 0 && cHist < 0 ? 1 : cHist < pHist ? 0.5 : 0);
    const layer1 = Math.round(F.clamp(alignRate * 0.6 + avgExt * 0.3 + macdTurn * 0.1, 0, 1) * 40);

    // 層二：量能配合（滿分 35）
    const volRatio = cVolMA > 0 ? cVol / cVolMA : 1;
    const volScore = volRatio >= 2 ? 20 : volRatio >= 1.5 ? 16
                    : volRatio >= 1.2 ? 11 : volRatio >= 1.0 ? 6 : 3;
    let volDir = 0;
    if(dirRatio > 0){
      volDir = (chg > 0 && cVol > cVolMA) ? 15
             : (chg < 0 && cVol < cVolMA) ? 10
             : (chg > 0 && cVol < cVolMA) ? 6 : 0;
    }else{
      volDir = (chg < 0 && cVol > cVolMA) ? 15
             : (chg > 0 && cVol < cVolMA) ? 10
             : (chg < 0 && cVol < cVolMA) ? 6 : 0;
    }
    const layer2 = Math.round(F.clamp(volScore + volDir, 0, 35));

    // 層三：價格位置適合度（滿分 25）
    const ma20v = ma20[n - 1] || last;
    const distPct = (last - ma20v) / ma20v * 100;
    let distScore = 0;
    if(dirRatio > 0){
      distScore = distPct >= -2 && distPct <= 5 ? 13
                : distPct > 5 && distPct <= 10 ? 9
                : distPct > 10 ? 4
                : distPct >= -6 && distPct < -2 ? 10 : 6;
    }else{
      distScore = distPct > 10 ? 13 : distPct > 5 ? 10 : distPct > 0 ? 7 : 4;
    }
    let bollScore = 0;
    if(cBoll){
      const bp = (last - cBoll.lower) / (cBoll.upper - cBoll.lower);
      bollScore = dirRatio > 0
        ? (bp < 0.2 ? 12 : bp < 0.4 ? 9 : bp < 0.6 ? 6 : bp < 0.8 ? 3 : 0)
        : (bp > 0.8 ? 12 : bp > 0.6 ? 9 : bp > 0.4 ? 6 : bp > 0.2 ? 3 : 0);
    }
    const layer3 = Math.round(F.clamp(distScore + bollScore, 0, 25));

    return {
      total: layer1 + layer2 + layer3,
      layer1, layer1Max: 40,
      layer2, layer2Max: 35,
      layer3, layer3Max: 25,
      volRatio, distPct,
      psyExtreme: psyExt, kdExtreme: kdExt, rsiExtreme: rsiExt
    };
  },

  // ── 歷史百分位（項目 14） ──
  // 計算當前評分在過去 N 日中的百分位（0~100）
  historicalPercentile(currentVal, historicalArr){
    const valid = historicalArr.filter(v => v != null && !isNaN(v));
    if(!valid.length) return null;
    const below = valid.filter(v => v < currentVal).length;
    return Math.round(below / valid.length * 100);
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: PREDICTION ENGINE（核心新功能：明日漲跌機率預估）
   ═══════════════════════════════════════════════════════════════ */
const Predict = {
  // 為某個歷史日索引建立特徵向量（用於 K-NN 比對）
  features(rows, ind, idx){
    if(idx < 25) return null;
    const last = rows[idx].close;
    const prev = rows[idx - 1].close;
    const ma20v = ind.ma20[idx];
    const boll = ind.boll[idx];
    const volMAv = ind.volMA[idx];
    const obvMAv = ind.obvMA[idx];
    if(!ma20v || !boll || !volMAv) return null;
    // ADX 趨勢強度（第10特徵：趨勢 vs 震盪市場的市場情境）
    const adxVal = (ind.adx && ind.adx[idx] != null) ? ind.adx[idx] : 20;
    return {
      psy: ind.psy[idx],
      kdK: ind.K[idx],
      rsi: ind.rsi[idx],
      macdHist: ind.hist[idx],
      maPos: (last - ma20v) / ma20v * 100,
      bollPos: (last - boll.lower) / (boll.upper - boll.lower),
      volRatio: rows[idx].vol / volMAv,
      obvDiv: obvMAv ? (ind.obv[idx] - obvMAv) / Math.abs(obvMAv || 1) : 0,
      chgPrev: (last - prev) / prev * 100,
      adxStr: adxVal   // ADX 趨勢強度（典型範圍 10~50）
    };
  },

  // 加權歐式距離（每維除以典型範圍以正規化）
  distance(f1, f2){
    if(!f1 || !f2) return Infinity;
    const norm = {
      psy: 30, kdK: 30, rsi: 25, macdHist: 5,
      maPos: 5, bollPos: 0.3, volRatio: 0.5, obvDiv: 0.3, chgPrev: 2,
      adxStr: 20  // ADX 典型波動範圍 ~20（10~30 最常見）
    };
    let sum = 0, count = 0;
    for(const k of Object.keys(norm)){
      const a = f1[k], b = f2[k];
      if(a == null || b == null || isNaN(a) || isNaN(b)) continue;
      sum += ((a - b) / norm[k]) ** 2;
      count++;
    }
    if(!count) return Infinity;
    return Math.sqrt(sum / count);
  },

  // K-NN 找出最相似的 K 個歷史日（排除財報週、除息期、Fed 週等特殊日）
  knn(rows, ind, currentIdx, k = CFG.KNN_K){
    const cur = this.features(rows, ind, currentIdx);
    if(!cur) return [];
    const isCurrentSpecial = SpecialDates.isSpecial(rows[currentIdx].date);
    const candidates = [];
    for(let i = CFG.KNN_MIN_HISTORY; i < currentIdx - CFG.KNN_EXCLUDE_RECENT; i++){
      if(i + 1 >= rows.length) continue;
      // 非特殊日→跳過特殊訓練日；若當前本身就是特殊日則不過濾（允許同類比對）
      if(!isCurrentSpecial && SpecialDates.isSpecial(rows[i].date)) continue;
      const f = this.features(rows, ind, i);
      if(!f) continue;
      const d = this.distance(cur, f);
      if(!isFinite(d)) continue;
      const nextChg = (rows[i + 1].close - rows[i].close) / rows[i].close * 100;
      candidates.push({ idx: i, dist: d, nextChg, dateStr: rows[i].dateStr,
                        special: SpecialDates.type(rows[i].date) });
    }
    candidates.sort((a, b) => a.dist - b.dist);
    return candidates.slice(0, k);
  },

  // 從 K 個鄰居計算機率分布
  probability(neighbors){
    if(!neighbors.length) return null;
    const ups = neighbors.filter(n => n.nextChg > 0).length;
    const upProb = ups / neighbors.length;
    const avgChg = neighbors.reduce((a, b) => a + b.nextChg, 0) / neighbors.length;
    const sorted = neighbors.map(n => n.nextChg).slice().sort((a, b) => a - b);
    const q = (p) => sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * p))];
    // 距離越近權重越高（距離倒數）
    const weights = neighbors.map(n => 1 / (n.dist + 0.01));
    const wSum = weights.reduce((a, b) => a + b, 0);
    const wAvgChg = neighbors.reduce((a, n, i) => a + n.nextChg * weights[i], 0) / wSum;
    const wUpProb = neighbors.reduce((a, n, i) => a + (n.nextChg > 0 ? weights[i] : 0), 0) / wSum;
    return {
      upProb, wUpProb,
      avgChg, wAvgChg,
      p10: q(0.1), p25: q(0.25), p50: q(0.5), p75: q(0.75), p90: q(0.9),
      n: neighbors.length,
      avgDist: neighbors.reduce((a, b) => a + b.dist, 0) / neighbors.length
    };
  },

  // 用 ATR 算波動率錐：明日的合理價格區間
  volatilityCone(currentClose, atr){
    if(!atr) return null;
    return {
      bullish: currentClose + atr * 1.0,    // ~1 ATR 樂觀
      bullExtreme: currentClose + atr * 1.65, // ~1.65 ATR ≈ 90% 信賴上緣
      base: currentClose,
      bearish: currentClose - atr * 1.0,
      bearExtreme: currentClose - atr * 1.65
    };
  },

  // 信心度評估
  confidence(prob, dirRatio, volRatio){
    if(!prob) return { level: 'low', label: '低', color: '#94a3b8', desc: '相似日不足' };
    // 三個因子：
    // 1) 鄰居方向一致性（upProb 距離 50% 越遠越一致）
    const consistency = Math.abs(prob.wUpProb - 0.5) * 2;  // 0~1
    // 2) 與當前方向訊號一致性
    const dirAlign = (prob.wUpProb > 0.5 && dirRatio > 0) ||
                     (prob.wUpProb < 0.5 && dirRatio < 0) ? 1 : 0.3;
    // 3) 量能正常（極端量能會干擾）
    const volNormal = volRatio > 0.5 && volRatio < 3 ? 1 : 0.6;
    const conf = consistency * 0.5 + dirAlign * 0.3 + volNormal * 0.2;
    if(conf >= 0.65) return { level: 'high', label: '高', color: '#10b981', desc: '訊號一致性強' };
    if(conf >= 0.4)  return { level: 'med',  label: '中等', color: '#f59e0b', desc: '部分指標分歧' };
    return { level: 'low', label: '低', color: '#ef4444', desc: '訊號分歧明顯' };
  },

  // ── 評分回測（項目：方法論可信度） ──
  // 對歷史每一日計算過去訊號 → 與次日漲跌比對 → 統計命中率
  backtest(rows, ind, signalsArr){
    const buckets = {
      strong_bull: { ret: [], hit: 0 },
      bull:        { ret: [], hit: 0 },
      neutral:     { ret: [], hit: 0 },
      bear:        { ret: [], hit: 0 },
      strong_bear: { ret: [], hit: 0 }
    };
    let totalHit = 0, totalN = 0;
    for(let i = CFG.KNN_MIN_HISTORY; i < rows.length - 1; i++){
      const sig = signalsArr[i];
      if(sig == null) continue;
      const ret = (rows[i + 1].close - rows[i].close) / rows[i].close * 100;
      let bucket;
      if(sig >= 0.55) bucket = 'strong_bull';
      else if(sig >= 0.20) bucket = 'bull';
      else if(sig > -0.20) bucket = 'neutral';
      else if(sig >= -0.55) bucket = 'bear';
      else bucket = 'strong_bear';
      buckets[bucket].ret.push(ret);
      // 命中：bull 偏向 → 次日漲；bear 偏向 → 次日跌
      const expectUp = sig > 0.20;
      const expectDown = sig < -0.20;
      const hit = (expectUp && ret > 0) || (expectDown && ret < 0)
              || (Math.abs(sig) <= 0.20 && Math.abs(ret) < 1);
      if(hit) buckets[bucket].hit++;
      if(expectUp || expectDown){
        totalN++;
        if(hit) totalHit++;
      }
    }
    const stats = {};
    for(const [k, v] of Object.entries(buckets)){
      const n = v.ret.length;
      stats[k] = {
        n,
        upRate: n ? v.ret.filter(r => r > 0).length / n : 0,
        avgRet: n ? v.ret.reduce((a, b) => a + b, 0) / n : 0,
        hitRate: n ? v.hit / n : 0
      };
    }
    return {
      buckets: stats,
      overallHitRate: totalN ? totalHit / totalN : 0,
      overallN: totalN
    };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: MULTI-TIMEFRAME（多時間框架共振）
   ═══════════════════════════════════════════════════════════════ */
const MTF = {
  // 從日 K 合成週 K（5 個交易日聚合）/ 月 K（20 個交易日）
  resample(rows, period){
    const out = [];
    for(let i = 0; i < rows.length; i += period){
      const slice = rows.slice(i, Math.min(i + period, rows.length));
      if(slice.length < Math.ceil(period * 0.6)) continue; // 跳過不完整週期
      out.push({
        open: slice[0].open,
        close: slice[slice.length - 1].close,
        high: Math.max(...slice.map(r => r.high)),
        low: Math.min(...slice.map(r => r.low)),
        vol: slice.reduce((a, b) => a + b.vol, 0),
        date: slice[slice.length - 1].date,
        dateStr: slice[slice.length - 1].dateStr
      });
    }
    return out;
  },

  // 對單一時間框架計算 6 項方向訊號 → 加總分數 -6 ~ +6
  score(bars){
    if(!bars || bars.length < 25) return null;
    const closes = bars.map(b => b.close);
    const highs = bars.map(b => b.high);
    const lows = bars.map(b => b.low);
    const ma5v = Ind.ma(closes, 5);
    const ma20v = Ind.ma(closes, 20);
    const { K, D } = Ind.kd(highs, lows, closes);
    const rsiv = Ind.rsi(closes);
    const { dif, dea, hist } = Ind.macd(closes);
    const n = bars.length;
    const last = closes[n - 1];
    const sigs = {
      ma5:    ma5v[n-1] != null ? (last > ma5v[n-1] ? 1 : -1) : 0,
      ma20:   ma20v[n-1] != null ? (last > ma20v[n-1] ? 1 : -1) : 0,
      kd:     K[n-1] != null && D[n-1] != null ? (K[n-1] > D[n-1] ? 1 : -1) : 0,
      rsi:    rsiv[n-1] != null ? (rsiv[n-1] > 50 ? 1 : -1) : 0,
      macdDir: dif[n-1] > dea[n-1] ? 1 : -1,
      macdMom: hist[n-1] > hist[n-2] ? 1 : -1
    };
    const score = Object.values(sigs).reduce((a, b) => a + b, 0);
    return {
      score, ratio: score / 6,
      direction: score >= 4 ? 'strong_bull' : score >= 2 ? 'bull'
              : score <= -4 ? 'strong_bear' : score <= -2 ? 'bear' : 'mixed',
      lastClose: last, sigs
    };
  },

  // 月線級別方向：直接用日 K 的長期均線判斷（避免月 K 資料量不足的問題）
  scoreMonthly(rows){
    if(!rows || rows.length < 80) return null;
    const closes = rows.map(r => r.close);
    const ma60 = Ind.ma(closes, 60);
    const ma120 = Ind.ma(closes, 120);
    const ma240 = Ind.ma(closes, 240);
    const n = rows.length;
    const last = closes[n - 1];
    const slope = (arr, lag) => arr[n-1] != null && arr[n-1-lag] != null
                              ? (arr[n-1] > arr[n-1-lag] ? 1 : -1) : 0;
    const sigs = {
      vsMA60:    ma60[n-1] != null ? (last > ma60[n-1] ? 1 : -1) : 0,
      vsMA120:   ma120[n-1] != null ? (last > ma120[n-1] ? 1 : -1) : 0,
      vsMA240:   ma240[n-1] != null ? (last > ma240[n-1] ? 1 : -1) : 0,
      ma60Slope: slope(ma60, 20),
      ma120Slope: slope(ma120, 20),
      maStack:   (ma60[n-1] != null && ma120[n-1] != null)
                  ? (ma60[n-1] > ma120[n-1] ? 1 : -1) : 0
    };
    const score = Object.values(sigs).reduce((a, b) => a + b, 0);
    return {
      score, ratio: score / 6,
      direction: score >= 4 ? 'strong_bull' : score >= 2 ? 'bull'
              : score <= -4 ? 'strong_bear' : score <= -2 ? 'bear' : 'mixed',
      lastClose: last, sigs
    };
  },

  analyze(rows){
    return {
      daily:   this.score(rows.slice(-150)),                              // 日線：用日 K 短中期指標
      weekly:  this.score(this.resample(rows, 5).slice(-60)),             // 週線：5 日聚合
      monthly: this.scoreMonthly(rows)                                    // 月線：用日 K 長期均線
    };
  },

  // 共振判斷：三個時間框架的方向是否一致
  resonance({ daily, weekly, monthly }){
    if(!daily || !weekly || !monthly){
      return { level: 'unknown', label: '資料不足', color: '#94a3b8', advice: '需要更多歷史資料才能判斷共振' };
    }
    const d = daily.ratio, w = weekly.ratio, m = monthly.ratio;
    const allBull = d > 0.3 && w > 0.3 && m > 0.3;
    const allBear = d < -0.3 && w < -0.3 && m < -0.3;
    const monthBullDayPull = m > 0.3 && w > 0 && d < 0;
    const monthBearDayBounce = m < -0.3 && w < 0 && d > 0;
    if(allBull) return {
      level: 'strong_bull', label: '🚀 三線共振多頭', color: '#10b981',
      advice: '日／週／月線方向一致看多，是波段最佳進場時機，可重壓。'
    };
    if(allBear) return {
      level: 'strong_bear', label: '⚠️ 三線共振空頭', color: '#ef4444',
      advice: '三個時間框架同步偏空，反彈不追、持股應減碼或出場觀望。'
    };
    if(monthBullDayPull) return {
      level: 'pullback_buy', label: '✨ 月線多頭+日線拉回', color: '#34d399',
      advice: '波段最佳進場時機之一：大方向多頭、短線回調，可分批承接。'
    };
    if(monthBearDayBounce) return {
      level: 'bounce_no_chase', label: '⚠️ 月線空頭+日線反彈', color: '#f87171',
      advice: '反彈不追、可借機減碼。月線空頭時短線反彈通常是逃命線。'
    };
    if(m > 0.3) return {
      level: 'bull_unclear_short', label: '月線多頭、短線分歧', color: '#f59e0b',
      advice: '中期方向佳，但短線進場時機未到，等日週線轉強再說。'
    };
    if(m < -0.3) return {
      level: 'bear_unclear_short', label: '月線空頭、短線分歧', color: '#f87171',
      advice: '中期偏空，謹慎觀望，避免逆勢操作。'
    };
    return {
      level: 'mixed', label: '🔄 多空分歧', color: '#94a3b8',
      advice: '時間框架方向不一致，等待趨勢明朗再行動。'
    };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: POSITION CALCULATOR（停損/停利/部位大小）
   ═══════════════════════════════════════════════════════════════ */
const Position = {
  // 根據輸入計算所有部位數據
  calc({ entryPrice, atr, totalCapital, riskPct, atrStopMult, rrRatio, direction = 'long' }){
    if(!entryPrice || !atr || !totalCapital) return null;
    const stopDist = atr * atrStopMult;
    const stopLoss = direction === 'long' ? entryPrice - stopDist : entryPrice + stopDist;
    const takeProfit = direction === 'long' ? entryPrice + stopDist * rrRatio : entryPrice - stopDist * rrRatio;
    const riskAmount = totalCapital * (riskPct / 100);
    const maxShares = Math.floor(riskAmount / stopDist);
    const positionValue = maxShares * entryPrice;
    const positionPct = positionValue / totalCapital * 100;
    // 金字塔三批：5:3:2 漸減
    const tier1Price = entryPrice;
    const tier2Price = direction === 'long' ? entryPrice * 1.03 : entryPrice * 0.97;
    const tier3Price = direction === 'long' ? entryPrice * 1.05 : entryPrice * 0.95;
    const t1 = Math.floor(maxShares * 0.5);
    const t2 = Math.floor(maxShares * 0.3);
    const t3 = maxShares - t1 - t2;
    return {
      stopLoss, takeProfit, stopDist,
      stopPct: stopDist / entryPrice * 100,
      tpPct: stopDist * rrRatio / entryPrice * 100,
      riskAmount, maxShares, positionValue, positionPct,
      tiers: [
        { name: '第一批（突破當前）', price: tier1Price, shares: t1 },
        { name: '第二批（拉回 3%）', price: tier2Price, shares: t2 },
        { name: '第三批（突破 5%）', price: tier3Price, shares: t3 }
      ]
    };
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: EXTERNAL（SOX 前夜訊號）
   ═══════════════════════════════════════════════════════════════ */
const External = {
  KEY: 'tsmc_external_sox',
  /** 取得台灣今日日期字串 YYYY-MM-DD（避免 UTC 與台灣時差 8 小時造成日期錯誤） */
  todayStr(){
    return new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
  },
  get(){
    try{
      const raw = localStorage.getItem(this.KEY);
      if(!raw) return null;
      const d = JSON.parse(raw);
      // 24 小時內有效（避免跨日污染）
      if(d.savedAt && Date.now() - d.savedAt > 18 * 3600 * 1000) return null;
      return d;
    }catch{ return null; }
  },
  set(value){
    if(value == null || isNaN(value)){
      localStorage.removeItem(this.KEY); return;
    }
    localStorage.setItem(this.KEY, JSON.stringify({
      date: this.todayStr(), value: parseFloat(value), savedAt: Date.now()
    }));
  },
  // 把 SOX 漲跌轉換為機率調整：每 1% SOX 變化 → ~3% 對台積電次日機率影響
  probAdjust(sox){
    if(sox == null || isNaN(sox)) return 0;
    return F.clamp(sox * 0.03, -0.18, 0.18);
  },
  effectDesc(sox){
    if(sox == null || isNaN(sox)) return '';
    const adj = this.probAdjust(sox);
    const adjPct = (adj * 100).toFixed(0);
    if(sox > 1.5) return `🟢 SOX 大漲，預估上修 +${adjPct}%`;
    if(sox > 0.3) return `🟢 SOX 偏多，預估上修 +${adjPct}%`;
    if(sox < -1.5) return `🔴 SOX 大跌，預估下修 ${adjPct}%`;
    if(sox < -0.3) return `🔴 SOX 偏空，預估下修 ${adjPct}%`;
    return `🟡 SOX 持平，影響輕微`;
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: JOURNAL（交易日誌 + 規則 + 設定 持久化）
   ═══════════════════════════════════════════════════════════════ */
const Journal = {
  KEY: 'tsmc_journal_v1',
  state: null,

  default(){
    return {
      trades: [],
      positions: [],   // 開倉中的部位
      rules: [],
      settings: {
        totalCapital: 1000000,
        riskPct: 1.0,
        atrStopMult: 2.5,    // 波段預設
        rrRatio: 2.5,        // 波段預設
        style: 'swing'
      }
    };
  },

  load(){
    try{
      const raw = localStorage.getItem(this.KEY);
      if(!raw){ this.state = this.default(); return this.state; }
      const parsed = JSON.parse(raw);
      // 補齊缺失欄位（向前相容）
      const def = this.default();
      this.state = {
        trades: parsed.trades || [],
        positions: parsed.positions || [],
        rules: parsed.rules || [],
        settings: { ...def.settings, ...(parsed.settings || {}) }
      };
      return this.state;
    }catch{
      this.state = this.default();
      return this.state;
    }
  },

  save(){
    try{ localStorage.setItem(this.KEY, JSON.stringify(this.state)); }
    catch(e){ console.warn('journal save failed', e); }
  },

  // 開倉買進（記錄 trade + 開新 position）
  buy({ price, shares, stopLoss, takeProfit, note, snapshot }){
    const id = 'tr_' + Date.now();
    const trade = {
      id, type: 'buy',
      date: this.todayStr(),
      price: parseFloat(price), shares: parseInt(shares),
      stopLoss: stopLoss ? parseFloat(stopLoss) : null,
      takeProfit: takeProfit ? parseFloat(takeProfit) : null,
      note: note || '', snapshot: snapshot || {}
    };
    this.state.trades.push(trade);
    // 開新部位
    const pos = {
      id: 'pos_' + Date.now(),
      openDate: trade.date,
      openPrice: trade.price,
      shares: trade.shares,
      stopLoss: trade.stopLoss,
      takeProfit: trade.takeProfit,
      status: 'open',
      tradeIds: [id],
      openSnapshot: snapshot || {}
    };
    this.state.positions.push(pos);
    this.save();
    return { trade, position: pos };
  },

  // 平倉賣出
  sell({ positionId, price, shares, note, snapshot }){
    const id = 'tr_' + Date.now();
    const trade = {
      id, type: 'sell',
      date: this.todayStr(),
      price: parseFloat(price), shares: parseInt(shares),
      note: note || '', snapshot: snapshot || {}
    };
    this.state.trades.push(trade);
    const pos = this.state.positions.find(p => p.id === positionId);
    if(pos){
      pos.shares -= trade.shares;
      pos.tradeIds.push(id);
      if(pos.shares <= 0){
        pos.status = 'closed';
        pos.closeDate = trade.date;
        pos.closePrice = trade.price;
        pos.closeSnapshot = snapshot || {};
        const buyTrade = this.state.trades.find(t => t.id === pos.tradeIds[0]);
        if(buyTrade){
          pos.pnl = (trade.price - buyTrade.price) * buyTrade.shares;
          pos.pnlPct = (trade.price / buyTrade.price - 1) * 100;
          pos.holdDays = Math.round((new Date(trade.date) - new Date(pos.openDate)) / (24 * 3600 * 1000));
        }
      }
    }
    this.save();
    return trade;
  },

  removeTrade(id){
    this.state.trades = this.state.trades.filter(t => t.id !== id);
    // 也移除空 position
    this.state.positions = this.state.positions.filter(p => !p.tradeIds.includes(id) || p.tradeIds.length > 1);
    this.save();
  },

  // 統計
  stats(){
    const closed = this.state.positions.filter(p => p.status === 'closed' && p.pnl != null);
    if(!closed.length) return null;
    const wins = closed.filter(p => p.pnl > 0);
    const losses = closed.filter(p => p.pnl <= 0);
    const totalPnl = closed.reduce((a, b) => a + b.pnl, 0);
    const avgWin = wins.length ? wins.reduce((a, b) => a + b.pnl, 0) / wins.length : 0;
    const avgLoss = losses.length ? Math.abs(losses.reduce((a, b) => a + b.pnl, 0) / losses.length) : 0;
    const avgHoldDays = closed.reduce((a, b) => a + (b.holdDays || 0), 0) / closed.length;

    // ── 進場分數桶位分析（每 15 分一桶）──
    const BUCKETS = [[0,40,'低分進場'],[40,55,'中低分'],[55,70,'中等分'],[70,85,'高分'],[85,101,'最強訊號']];
    const scoreBuckets = BUCKETS.map(([lo, hi, label]) => {
      const inBucket = closed.filter(p => {
        const es = p.openSnapshot?.entryScore;
        return es != null && es >= lo && es < hi;
      });
      if(!inBucket.length) return { label, lo, hi, count: 0, winRate: null, avgPnl: null };
      const bWins = inBucket.filter(p => p.pnl > 0);
      return {
        label, lo, hi,
        count: inBucket.length,
        winRate: bWins.length / inBucket.length,
        avgPnl: inBucket.reduce((s,p) => s+p.pnl, 0) / inBucket.length
      };
    }).filter(b => b.count > 0);

    // ── 最強進場模式偵測（>= 3 筆才分析）──
    let bestPattern = null;
    if(scoreBuckets.length){
      const withWR = scoreBuckets.filter(b => b.count >= 2);
      if(withWR.length){
        const best = withWR.reduce((a,b) => b.winRate > a.winRate ? b : a);
        if(best.winRate >= 0.6) bestPattern = best;
      }
    }

    return {
      total: closed.length,
      winRate: wins.length / closed.length,
      avgWin, avgLoss,
      profitFactor: avgLoss > 0 ? avgWin / avgLoss : (avgWin > 0 ? Infinity : 0),
      totalPnl,
      avgHoldDays,
      scoreBuckets,
      bestPattern
    };
  },

  // 設定更新
  updateSettings(patch){
    this.state.settings = { ...this.state.settings, ...patch };
    this.save();
  },

  // 規則
  addRule(rule){
    rule.id = 'rule_' + Date.now();
    rule.triggerHistory = [];
    rule.enabled = rule.enabled !== false;
    this.state.rules.push(rule);
    this.save();
    return rule;
  },
  removeRule(id){
    this.state.rules = this.state.rules.filter(r => r.id !== id);
    this.save();
  },
  toggleRule(id){
    const r = this.state.rules.find(rr => rr.id === id);
    if(r){ r.enabled = !r.enabled; this.save(); }
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: RULE ENGINE（規則評估）
   ═══════════════════════════════════════════════════════════════ */
const RuleEngine = {
  // 可用的指標選項
  METRICS: {
    entryScore: '進出場評分（0-100）',
    dirRatio:   '方向加權比例（-1 ~ +1）',
    upProb:     'K-NN 上漲機率（0-1）',
    rsi:        'RSI（0-100）',
    kdK:        'KD 中的 K 值',
    psy:        'PSY 心理線',
    macdHist:   'MACD 柱狀圖',
    distMA20:   '距 MA20 百分比',
    bollPos:    '布林位置（0-1）',
    volRatio:   '量能倍率',
    mtfRes:     '多時間框架共振分數（-3~+3）'
  },
  OPS: { '>=': '≥', '<=': '≤', '>': '>', '<': '<', '==': '=' },

  // 從目前狀態建立 snapshot 給規則引擎
  snapshot(ctx){
    const last = ctx.last;
    const ma20 = ctx.cMA20;
    const cBoll = ctx.cBoll;
    const cVolMA = ctx.cVolMA || 1;
    const mtf = ctx.mtfResult;
    const mtfScore = mtf ? ((mtf.daily?.ratio || 0) + (mtf.weekly?.ratio || 0) + (mtf.monthly?.ratio || 0)) : 0;
    return {
      entryScore: ctx.ES?.total ?? 0,
      dirRatio:   ctx.dirRatio ?? 0,
      upProb:     ctx.prob?.wUpProb ?? 0.5,
      rsi:        ctx.cRSI ?? 50,
      kdK:        ctx.cK ?? 50,
      psy:        ctx.cPSY ?? 50,
      macdHist:   ctx.cHist ?? 0,
      distMA20:   ma20 ? ((last - ma20) / ma20 * 100) : 0,
      bollPos:    cBoll ? (last - cBoll.lower) / (cBoll.upper - cBoll.lower) : 0.5,
      volRatio:   ctx.cVol / cVolMA,
      mtfRes:     mtfScore
    };
  },

  // 判斷單一條件
  checkCond(cond, snap){
    const v = snap[cond.metric];
    if(v == null || isNaN(v)) return false;
    const t = cond.value;
    switch(cond.op){
      case '>=': return v >= t;
      case '<=': return v <= t;
      case '>':  return v > t;
      case '<':  return v < t;
      case '==': return Math.abs(v - t) < 0.01;
    }
    return false;
  },

  // 判斷一條規則（所有條件 AND）
  evaluate(rule, snap){
    if(!rule.enabled || !rule.conditions || !rule.conditions.length) return false;
    return rule.conditions.every(c => this.checkCond(c, snap));
  },

  // 對所有規則跑一次，回傳今日觸發的規則列表
  evaluateAll(rules, snap){
    const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
    const triggered = [];
    for(const rule of rules){
      const fire = this.evaluate(rule, snap);
      if(fire){
        rule._currentlyMatching = true;
        // 防止重複警示：每天只警示一次
        if(!rule.triggerHistory.includes(today)){
          rule.triggerHistory.push(today);
          triggered.push(rule);
        }
      }else{
        rule._currentlyMatching = false;
      }
    }
    if(triggered.length) Journal.save();
    return triggered;
  }
};

/* ═══════════════════════════════════════════════════════════════
   MODULE: SVG HELPERS
   ═══════════════════════════════════════════════════════════════ */
const SVG = {
  gauge(score, max){
    const ratio = (score / max + 1) / 2;
    const deg = ratio * 180 - 180;
    const rad = deg * Math.PI / 180;
    // cy 從 115 降到 108：弧形中心上移，底部標籤更寬鬆；viewBox 加高至 148
    const cx = 105, cy = 108, r = 88;
    const nx = cx + r * 0.78 * Math.cos(rad);
    const ny = cy + r * 0.78 * Math.sin(rad);
    const meta = sentMeta(score, max);
    const arc = (s, e, col) => {
      const a = (s - 180) * Math.PI / 180, b = (e - 180) * Math.PI / 180;
      return `<path d="M ${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)} A ${r} ${r} 0 ${e - s > 180 ? 1 : 0} 1 ${cx + r * Math.cos(b)} ${cy + r * Math.sin(b)}" stroke="${col}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
    };
    return `<svg viewBox="0 0 210 148" class="gauge-svg">
      ${arc(0,45,'#ef4444')}${arc(45,90,'#f87171')}
      ${arc(90,135,'#f59e0b')}${arc(135,175,'#34d399')}${arc(175,180,'#10b981')}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${meta.color}" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="7" fill="${meta.color}"/>
      <text x="10"  y="144" fill="#ef4444" font-size="10" font-weight="bold">強空</text>
      <text x="99"  y="9"  fill="#f59e0b" font-size="10" font-weight="bold" text-anchor="middle">中性</text>
      <text x="198" y="144" fill="#10b981" font-size="10" font-weight="bold" text-anchor="end">強多</text>
    </svg>`;
  },
  ring(score){
    const pct = score / 100;
    const r = 46, cx = 55, cy = 55;
    const circ = 2 * Math.PI * r;
    const dash = pct * circ;
    const col = score >= 78 ? '#10b981' : score >= 58 ? '#34d399'
              : score >= 38 ? '#f59e0b' : '#94a3b8';
    return `<svg viewBox="0 0 110 110">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2d4a" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="10"
        stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ * 0.25}" stroke-linecap="round"/>
    </svg>`;
  },
  pillarBar(val, max, color){
    const pct = (val / max * 100).toFixed(0);
    return `<div class="p-bar"><div class="p-fill" style="width:${pct}%;background:${color}"></div></div>`;
  },
  meter(pct, color){
    return `<div class="pc-meter"><div class="pc-meter-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }
};

const sc = s => s > 0 ? 'bull' : s < 0 ? 'bear' : 'neut';
const st = s => s > 0 ? '▲ 多頭' : s < 0 ? '▼ 空頭' : '— 中性';

function sentMeta(score, max){
  const r = score / max;
  if(r >= 0.55) return { label: '強多頭 🚀', color: '#10b981' };
  if(r >= 0.20) return { label: '偏多',     color: '#34d399' };
  if(r > -0.20) return { label: '整理觀望', color: '#f59e0b' };
  if(r >= -0.55) return { label: '偏空',    color: '#f87171' };
  return { label: '強空頭 ⚠️', color: '#ef4444' };
}
function actionMeta(entryScore, dirRatio){
  const isBull = dirRatio > 0;
  if(entryScore >= 78) return isBull
    ? { label: '🚀 強力進場訊號', sub: '三層指標高度共振，是積極布局的好時機', color: '#10b981', tagBg: 'rgba(16,185,129,.18)' }
    : { label: '⚡ 強力退場訊號', sub: '三層指標高度共振，是積極退場或減碼的好時機', color: '#ef4444', tagBg: 'rgba(239,68,68,.18)' };
  if(entryScore >= 58) return isBull
    ? { label: '✅ 可考慮進場', sub: '多數條件符合，可分批布局，留意量能變化', color: '#34d399', tagBg: 'rgba(52,211,153,.15)' }
    : { label: '⚠️ 建議考慮減碼', sub: '退場條件逐漸成熟，可考慮分批出場', color: '#f87171', tagBg: 'rgba(248,113,113,.15)' };
  if(entryScore >= 38) return { label: '⏳ 繼續觀察等待', sub: '訊號尚未完全共振，建議等待更明確的進出場條件', color: '#f59e0b', tagBg: 'rgba(245,158,11,.15)' };
  return { label: '🔴 時機尚未成熟', sub: '三層指標多項未到位，此時進出場風險較高，耐心等候', color: '#94a3b8', tagBg: 'rgba(148,163,184,.12)' };
}

/** 判斷目前交易時段 */
function getMarketSession(){
  const now = new Date();
  const day = now.getDay(); // 0=Sun,6=Sat
  if(day === 0 || day === 6) return { key:'closed', label:'休市', desc:'週末休市，台股未開盤', color:'var(--t3)' };
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  if(mins >= 9*60 && mins <= 13*60+30) return { key:'live', label:'盤中 🟢', desc:'台股交易中（09:00 – 13:30）', color:'var(--green)' };
  if(mins > 13*60+30 && mins <= 14*60+30) return { key:'after', label:'盤後 🟡', desc:'收盤後整理（13:31 – 14:30）', color:'var(--yellow)' };
  if(mins < 9*60) return { key:'closed', label:'盤前 ⚪', desc:`距開盤約 ${9*60-mins} 分鐘`, color:'var(--t2)' };
  return { key:'closed', label:'休市 🔴', desc:'今日收盤，明日 09:00 開盤', color:'var(--t3)' };
}

function renderPredictionPanel(ctx){
  const { last, prob, cone, conf, atr, lastDate, backtest, dirRatio, sr, cBoll } = ctx;
  if(!prob){
    return `<div class="sec">🔮 盤後 & 明日預估</div>
      <div class="predict-panel"><div style="text-align:center;color:var(--t2);padding:40px 0">
        資料不足，無法計算預測（需至少 ${CFG.KNN_MIN_HISTORY} 個交易日歷史）
      </div></div>`;
  }
  const upPct = (prob.wUpProb * 100).toFixed(0);
  const downPct = (100 - prob.wUpProb * 100).toFixed(0);
  const upMore = prob.wUpProb >= 0.5;
  const upColor = upMore ? 'var(--green)' : 'var(--red)';
  const dirIcon = upMore ? '📈' : '📉';
  const dirWord = prob.wUpProb >= 0.65 ? '上漲機率明顯偏高'
                : prob.wUpProb >= 0.55 ? '略偏多'
                : prob.wUpProb >= 0.45 ? '多空均衡'
                : prob.wUpProb >= 0.35 ? '略偏空'
                : '下跌機率明顯偏高';

  // 三種情境
  let bull, base, bear, bullPct, basePct, bearPct;
  if(cone){
    bull = cone.bullish; base = last; bear = cone.bearish;
  }else{
    bull = last * 1.01; base = last; bear = last * 0.99;
  }
  bullPct = (bull - last) / last * 100;
  basePct = 0;
  bearPct = (bear - last) / last * 100;

  // 回測統計：找到當前方向所屬桶位
  let btBucket = null;
  if(backtest && backtest.buckets){
    const r = dirRatio;
    const bucketKey = r >= 0.55 ? 'strong_bull' : r >= 0.20 ? 'bull'
                    : r > -0.20 ? 'neutral' : r >= -0.55 ? 'bear' : 'strong_bear';
    btBucket = { key: bucketKey, ...backtest.buckets[bucketKey] };
  }
  const bucketName = {
    strong_bull: '強多頭', bull: '偏多', neutral: '中性',
    bear: '偏空', strong_bear: '強空頭'
  };

  return `
  <div class="sec">🔮 盤後 & 明日預估 <span class="sec-cnt">基於 ${prob.n} 個歷史相似日 + ATR 波動率錐 + 評分回測</span></div>
  <div class="predict-panel">
    <div class="predict-head">
      <span class="ph-title">${dirIcon} ${dirWord}</span>
      <span class="ph-badge">機率推估</span>
      <span class="ph-meta">資料截至 ${lastDate} ｜ 信心度：<span style="color:${conf.color};font-weight:700">${conf.label}（${conf.desc}）</span></span>
    </div>
    <div class="predict-grid">
      <div class="pred-card">
        <div class="pc-label">📊 上漲機率（加權 K-NN）</div>
        <div class="pc-big" style="color:${upColor}">${upPct}%</div>
        <div class="pc-sub">下跌機率 ${downPct}%</div>
        ${SVG.meter(upPct, upColor)}
      </div>
      <div class="pred-card">
        <div class="pc-label">📈 預期變動（中位數）</div>
        <div class="pc-big" style="color:${prob.wAvgChg >= 0 ? 'var(--green)' : 'var(--red)'}">${F.pct(prob.wAvgChg)}</div>
        <div class="pc-sub">
          P25：${F.pct(prob.p25)} ／ P50：${F.pct(prob.p50)} ／ P75：${F.pct(prob.p75)}
        </div>
      </div>
      <div class="pred-card">
        <div class="pc-label">🌪 波動範圍（ATR=${F.num(atr,2)}）</div>
        <div class="pc-big" style="color:var(--cyan)">±${F.num((bullPct - bearPct) / 2, 2)}%</div>
        <div class="pc-sub">基於 14 日 ATR 真實波幅，預估明日合理震盪區間</div>
      </div>
    </div>

    <div class="pc-label" style="margin-bottom:8px;color:var(--t2)">━━━ 三種情境（次日收盤估計） ━━━</div>
    <div class="pred-scenarios">
      <div class="scen bull">
        <div class="s-label">🚀 樂觀情境（上緣）</div>
        <div class="s-price c-g">${F.int(bull)} 元</div>
        <div class="s-pct c-g">${F.pct(bullPct)}</div>
      </div>
      <div class="scen base">
        <div class="s-label">📍 基準情境（中位數）</div>
        <div class="s-price">${F.int(last + (last * prob.wAvgChg / 100))} 元</div>
        <div class="s-pct" style="color:${prob.wAvgChg >= 0 ? 'var(--green)' : 'var(--red)'}">${F.pct(prob.wAvgChg)}</div>
      </div>
      <div class="scen bear">
        <div class="s-label">⚠️ 悲觀情境（下緣）</div>
        <div class="s-price c-r">${F.int(bear)} 元</div>
        <div class="s-pct c-r">${F.pct(bearPct)}</div>
      </div>
    </div>

    ${btBucket && btBucket.n > 0 ? `
    <div class="predict-bt">
      <div class="predict-bt-title">🧪 評分系統歷史回測｜當前狀態歸類為「${bucketName[btBucket.key]}」</div>
      <div class="predict-bt-row">
        <div class="bt-item">過去出現 <span class="hl">${btBucket.n} 次</span></div>
        <div class="bt-item">次日上漲率 <span class="${btBucket.upRate>=0.55?'hl-g':btBucket.upRate<=0.45?'hl-r':'hl-y'}">${(btBucket.upRate*100).toFixed(0)}%</span></div>
        <div class="bt-item">平均報酬 <span class="${btBucket.avgRet>=0?'hl-g':'hl-r'}">${F.pct(btBucket.avgRet)}</span></div>
        <div class="bt-item">命中率 <span class="${btBucket.hitRate>=0.55?'hl-g':btBucket.hitRate<=0.45?'hl-r':'hl-y'}">${(btBucket.hitRate*100).toFixed(0)}%</span></div>
        <div class="bt-item c-t2" style="margin-left:auto">系統整體命中率：${(backtest.overallHitRate*100).toFixed(0)}% (${backtest.overallN} 次有方向預測)</div>
      </div>
    </div>` : ''}

    <div class="predict-disclaimer">
      ⚠️ <b>方法論說明：</b>採 K-Nearest Neighbors 在過去 ${CFG.HISTORY_MONTHS} 個月歷史中找出與今日指標組合最相似的 ${prob.n} 個交易日，統計這些日子的次日漲跌機率，並以距離倒數加權。波動範圍由 ATR 計算。
      <b>此為機率推估、非預測</b>——基本面消息、國際盤、突發事件都會推翻此模型。請勿單獨作為交易依據。
    </div>

    <!-- ── 明日操作計畫 ── -->
    ${(()=>{
      const ATR = atr ?? 0;
      const pivotSup  = sr?.support   ?? (last - ATR * 1.5);
      const pivotRes  = sr?.resistance ?? (last + ATR * 1.5);
      const stopLong  = (last - ATR * 1.5).toFixed(1);
      const stopShort = (last + ATR * 1.5).toFixed(1);
      const bullTarget  = cone ? F.int(cone.bullish)  : F.int(last + ATR * 1.5);
      const bearTarget  = cone ? F.int(cone.bearish)  : F.int(last - ATR * 1.5);
      const dirMain = prob.wUpProb >= 0.52 ? 'bull' : prob.wUpProb <= 0.48 ? 'bear' : 'neut';
      const bollPos = cBoll ? ((last - cBoll.lower) / (cBoll.upper - cBoll.lower)) : 0.5;
      const bollZone = bollPos > 0.8 ? '近上軌（壓力區）' : bollPos < 0.2 ? '近下軌（支撐區）' : '中軌附近（中性區）';
      return `
      <div class="trade-plan">
        <div class="trade-plan-title">📋 明日操作計畫框架（參考用）</div>
        <div class="trade-plan-grid">
          <div class="tp-item">
            <div class="tpi-label">🛡️ 關鍵支撐</div>
            <div class="tpi-val" style="color:var(--green)">${F.int(pivotSup)} 元</div>
            <div class="tpi-note">跌破此位則趨勢轉弱<br>距現價 ${sr ? sr.supportPct.toFixed(1) : ((pivotSup-last)/last*100).toFixed(1)}%</div>
          </div>
          <div class="tp-item">
            <div class="tpi-label">⛔ 關鍵壓力</div>
            <div class="tpi-val" style="color:var(--red)">${F.int(pivotRes)} 元</div>
            <div class="tpi-note">突破此位則趨勢轉強<br>距現價 +${sr ? sr.resistancePct.toFixed(1) : ((pivotRes-last)/last*100).toFixed(1)}%</div>
          </div>
          <div class="tp-item">
            <div class="tpi-label">✅ 多方進場條件</div>
            <div class="tpi-val" style="color:var(--green);font-size:.88rem">${dirMain==='bull'?'機率偏多':'等待訊號'}</div>
            <div class="tpi-note">站穩 ${F.int(pivotSup)} 且量能放大<br>目標參考：${bullTarget} 元</div>
          </div>
          <div class="tp-item">
            <div class="tpi-label">❌ 空方警戒條件</div>
            <div class="tpi-val" style="color:var(--red);font-size:.88rem">${dirMain==='bear'?'機率偏空':'留意訊號'}</div>
            <div class="tpi-note">跌破 ${F.int(pivotSup)} 且放量<br>目標參考：${bearTarget} 元</div>
          </div>
          <div class="tp-item">
            <div class="tpi-label">🔴 建議停損（多單）</div>
            <div class="tpi-val" style="color:var(--red)">${stopLong} 元</div>
            <div class="tpi-note">現價 − 1.5×ATR（ATR≈${ATR.toFixed(1)}）<br>嚴守停損、保護本金</div>
          </div>
          <div class="tp-item">
            <div class="tpi-label">📍 布林位置</div>
            <div class="tpi-val" style="font-size:.85rem;color:var(--cyan)">${bollZone}</div>
            <div class="tpi-note">上軌 ${cBoll?F.int(cBoll.upper):'--'} ／ 下軌 ${cBoll?F.int(cBoll.lower):'--'}<br>中軌（MA20） ${cBoll?F.int(cBoll.mid):'--'}</div>
          </div>
        </div>
        <div style="font-size:.65rem;color:var(--t3);margin-top:10px">
          ⚠️ 以上操作計畫為技術面推算，非投資建議。支撐壓力基於 Pivot Point + Volume Profile + 布林通道。請務必配合基本面與市場情緒判斷。
        </div>
      </div>`;
    })()}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDERER: 逢高賣出 / 逢低買進 訊號面板（v4 全面升級）
   優化項目：
   ① 加權評分制 (0~10)：背離+2.0、OBV+0.5、MTF+1.0，取代等權計數
   ② MACD邏輯修正：零線以下柱狀翻正/連2日放大才算買進，而非DIF>DEA
   ③ K線型態偵測：槌子線（買進）/ 射擊之星（賣出）
   ④ 早期警示：RSI<38/KD<40/PSY<35/布林<25%顯示⚠️ 而非✅
   ⑤ ADX市場情境徽章：震盪市假訊號警告
   ⑥ 今日K線確認徽章：收紅=確認買進轉折，收黑=等確認
   ⑦ OBV能量潮納入第7項加分條件
   ⑧ 一眼看懂主橫幅：大字訊號+雙強度條+三徽章
   ═══════════════════════════════════════════════════════════════ */
function renderBuySellPanel(ctx){
  const { last, prev, chg,
          cK, cD, pK, pD, cRSI, cPSY, cBoll, sr, dirRatio,
          cDIF, cDEA, cHist, pHist, p2Hist,
          cVol, cVolMA, prevVol, prevChg, cATR,
          cOBV, cOBVMA, cMFI,
          divRSI, divMACD,
          cMA60, mtfResult, mtfRes,
          lastHigh, lastLow, lastOpen, prevOpen, high52, low52,
          adxCtx
        } = ctx;

  const cADX      = adxCtx?.cADX;
  const adxRegime = adxCtx?.adxRegime;

  // ═══ MTF 共振參數 ═══
  const weeklyScore  = mtfResult?.weekly?.score  ?? 0;
  const monthlyRatio = mtfResult?.monthly?.ratio ?? 0;
  const weeklyBull   = weeklyScore  >= 2;
  const weeklyBear   = weeklyScore  <= -2;
  const monthlyBull  = monthlyRatio > 0.3;
  const monthlyBear  = monthlyRatio < -0.3;

  // ═══ 布林位置（原始數值 0~1） ═══
  const bollPosRaw = cBoll ? (last - cBoll.lower) / (cBoll.upper - cBoll.lower) : 0.5;

  // ══════════════════════════════════════════════
  //  七大買進條件（含早期警示）v5：新增 MFI
  // ══════════════════════════════════════════════
  const rsiBuy    = cRSI < 30;
  const rsiEarly  = cRSI < 38 && !rsiBuy;

  const kdBuy     = cK != null && cD != null && cK < 30 && cK > cD;
  const kdEarly   = cK != null && cD != null && cK < 40 && cK > cD && !kdBuy;

  const psyBuy    = cPSY < 25;
  const psyEarly  = cPSY < 35 && !psyBuy;

  const bollBuy   = bollPosRaw < 0.15;
  const bollEarly = bollPosRaw < 0.25 && !bollBuy;

  // MACD 底部轉折：① 柱狀圖由負翻正（最強）② 零線以下連2日放大
  const macdFlipBuy  = pHist != null && cHist != null && pHist < 0 && cHist > 0;
  const macdBuildBuy = cHist != null && cHist < 0 && pHist != null && p2Hist != null
                       && cHist > pHist && pHist > p2Hist;
  const macdBuy      = macdFlipBuy || macdBuildBuy;

  // 量能/K線型態/背離
  const lowerShadow = (lastLow != null) ? Math.min(last, prev) - lastLow : 0;
  const bodySize    = Math.abs(last - prev);
  const hammerBuy   = lowerShadow > bodySize * 2 && bodySize > 0 && lowerShadow > 0;
  // 多頭吞噬：今日收紅實體完全包覆昨日收黑實體（高勝率反轉信號）
  const bullEngulf  = prevOpen != null && lastOpen != null
                      && prev < prevOpen         // 昨收黑
                      && last > prevOpen         // 今收高於昨開
                      && lastOpen <= prev        // 今開低於等於昨收
                      && chg > 0;
  // 恐慌枯竭：爆量收黑（成交量 > 3× MA = 恐慌性拋售可能見底）
  const volClimaxBuy = cVol > (cVolMA||1) * 3 && chg < 0;
  const consec2Low  = chg < 0 && cVol < (cVolMA||1) * 0.8
                      && prevChg < 0 && (prevVol||0) < (cVolMA||1) * 0.8;
  const hasBullDiv  = divRSI?.type === 'bull' || divMACD?.type === 'bull';
  const volDivBuy   = hammerBuy || bullEngulf || volClimaxBuy || consec2Low || hasBullDiv;

  // MFI（第7條件）：資金流量超賣（< 20 = 機構資金大量流出，價值區）
  const mfiBuy   = cMFI != null && cMFI < 20;
  const mfiEarly = cMFI != null && cMFI < 30 && !mfiBuy;

  const buyCnt    = [rsiBuy, kdBuy, psyBuy, bollBuy, macdBuy, volDivBuy, mfiBuy].filter(Boolean).length;
  const buyEarlyN = [rsiEarly, kdEarly, psyEarly, bollEarly, mfiEarly].filter(Boolean).length;

  // ══════════════════════════════════════════════
  //  七大賣出條件（含早期警示）v5：新增 MFI
  // ══════════════════════════════════════════════
  const rsiSell    = cRSI > 70;
  const rsiEarlyS  = cRSI > 62 && !rsiSell;

  const kdSell     = cK != null && cD != null && cK > 70 && cK < cD;
  const kdEarlyS   = cK != null && cD != null && cK > 60 && cK < cD && !kdSell;

  const psySell    = cPSY > 75;
  const psyEarlyS  = cPSY > 65 && !psySell;

  const bollSell   = bollPosRaw > 0.85;
  const bollEarlyS = bollPosRaw > 0.75 && !bollSell;

  // MACD 頂部轉折
  const macdFlipSell  = pHist != null && cHist != null && pHist > 0 && cHist < 0;
  const macdDecaySell = cHist != null && cHist > 0 && pHist != null && p2Hist != null
                        && cHist < pHist && pHist < p2Hist;
  const macdSell      = macdFlipSell || macdDecaySell;

  const upperShadow = (lastHigh != null) ? lastHigh - Math.max(last, prev) : 0;
  const shootingStar = upperShadow > bodySize * 2 && bodySize > 0 && upperShadow > 0;
  // 空頭吞噬：今日收黑實體完全包覆昨日收紅實體
  const bearEngulf  = prevOpen != null && lastOpen != null
                      && prev > prevOpen         // 昨收紅
                      && last < prevOpen         // 今收低於昨開
                      && lastOpen >= prev        // 今開高於等於昨收
                      && chg < 0;
  // 吹頂爆量：爆量收紅（> 3× MA = 主力拉高出貨，見頂信號）
  const volClimaxSell = cVol > (cVolMA||1) * 3 && chg > 0;
  const hasBearDiv    = divRSI?.type === 'bear' || divMACD?.type === 'bear';
  const consec2High   = chg < 0 && cVol > (cVolMA||1) * 1.1
                        && prevChg < 0 && (prevVol||0) > (cVolMA||1) * 0.9;
  const volDivSell    = consec2High || shootingStar || bearEngulf || volClimaxSell || hasBearDiv;

  // MFI（第7條件）：資金流量超買（> 80 = 機構資金大量流入，高估區）
  const mfiSell   = cMFI != null && cMFI > 80;
  const mfiEarlyS = cMFI != null && cMFI > 70 && !mfiSell;

  const sellCnt    = [rsiSell, kdSell, psySell, bollSell, macdSell, volDivSell, mfiSell].filter(Boolean).length;

  // MACD 頂部縮減早期警示
  const macdDecayEarlyS = cHist != null && cHist > 0 && pHist != null && p2Hist != null
                          && cHist < pHist && pHist < p2Hist && !macdSell;
  const sellEarlyN = [rsiEarlyS, kdEarlyS, psyEarlyS, bollEarlyS, macdDecayEarlyS, mfiEarlyS].filter(Boolean).length;

  // ══════════════════════════════════════════════
  //  OBV 能量潮確認（加分項）
  // ══════════════════════════════════════════════
  const obvBull = cOBV != null && cOBVMA != null && cOBV > cOBVMA;
  const obvBear = cOBV != null && cOBVMA != null && cOBV < cOBVMA;

  // ══════════════════════════════════════════════
  //  加權綜合分數（0~10）v5
  // ══════════════════════════════════════════════
  let buyW = buyCnt * (10/7);                           // 基礎 0–7 正規化到 0–10
  if(hasBullDiv)              buyW += 1.2;              // 背離：最高品質加分
  else if(bullEngulf)         buyW += 0.8;              // 多頭吞噬：K線反轉確認
  else if(volClimaxBuy)       buyW += 0.7;              // 恐慌枯竭：底部爆量
  else if(hammerBuy || consec2Low) buyW += 0.3;
  if(obvBull)                 buyW += 0.5;
  if(weeklyBull && monthlyBull) buyW += 1.0;
  else if(weeklyBull || monthlyBull) buyW += 0.5;
  buyW += buyEarlyN * 0.12;
  buyW = Math.min(10, +buyW.toFixed(2));

  let sellW = sellCnt * (10/7);                         // 基礎 0–7 正規化到 0–10
  if(hasBearDiv)              sellW += 1.2;
  else if(bearEngulf)         sellW += 0.8;             // 空頭吞噬
  else if(volClimaxSell)      sellW += 0.7;             // 吹頂爆量
  else if(shootingStar || consec2High) sellW += 0.3;
  if(obvBear)                 sellW += 0.5;
  if(weeklyBear && monthlyBear) sellW += 1.0;
  else if(weeklyBear || monthlyBear) sellW += 0.5;
  sellW += sellEarlyN * 0.12;
  sellW = Math.min(10, +sellW.toFixed(2));

  // ══════════════════════════════════════════════
  //  輔助標籤
  // ══════════════════════════════════════════════
  const aboveMA60      = cMA60 != null && last > cMA60;
  const priceConfirmBuy  = last > prev;
  const priceConfirmSell = last < prev;

  // ADX 徽章
  const adxBadge = cADX != null
    ? (cADX >= 25
      ? `<span style="background:rgba(59,130,246,.15);color:var(--blue);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">📈 趨勢盤 ADX ${cADX.toFixed(1)}｜訊號可信度高</span>`
      : cADX >= 18
      ? `<span style="background:rgba(245,158,11,.15);color:var(--yellow);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">⚠️ 趨勢萌芽 ADX ${cADX.toFixed(1)}｜可信度中等</span>`
      : `<span style="background:rgba(148,163,184,.15);color:var(--t2);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">🔄 震盪盤 ADX ${cADX.toFixed(1)}｜假訊號多，請謹慎</span>`)
    : '';

  // MA60 趨勢徽章
  const trendBadge = aboveMA60
    ? `<span style="background:rgba(16,185,129,.15);color:var(--green);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">✅ MA60 多頭結構｜逢低買進安全性高</span>`
    : `<span style="background:rgba(239,68,68,.15);color:var(--red);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">⚠️ 跌破 MA60｜逆勢，建議倉位減半</span>`;

  // K 線確認徽章
  const priceBadge = priceConfirmBuy
    ? `<span style="background:rgba(16,185,129,.12);color:var(--green2);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">🕯️ 今日收紅｜價格確認轉折</span>`
    : priceConfirmSell
    ? `<span style="background:rgba(239,68,68,.12);color:var(--red2);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">🕯️ 今日收黑｜賣壓仍存，買進需等確認</span>`
    : `<span style="background:rgba(245,158,11,.12);color:var(--yellow);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px">🕯️ 今日平盤</span>`;

  // MTF 說明文字
  const isBuyDominant = buyW >= sellW;
  let mtfNote = '';
  if(isBuyDominant){
    if(weeklyBull && monthlyBull) mtfNote = `<span style="color:var(--green);font-weight:800">🚀 週線＋月線雙重共振買進 (+1.0分)</span>`;
    else if(weeklyBull || monthlyBull) mtfNote = `<span style="color:var(--green2)">📈 ${weeklyBull?'週線':'月線'}確認買進方向 (+0.5分)</span>`;
    else if(weeklyBear || monthlyBear) mtfNote = `<span style="color:var(--yellow)">⚠️ 中長期偏空，短線超賣反彈空間有限</span>`;
    else mtfNote = `<span style="color:var(--t2)">— 多時間框架方向中性</span>`;
  } else {
    if(weeklyBear && monthlyBear) mtfNote = `<span style="color:var(--red);font-weight:800">🚨 週線＋月線雙重共振賣出 (+1.0分)</span>`;
    else if(weeklyBear || monthlyBear) mtfNote = `<span style="color:var(--red2)">📉 ${weeklyBear?'週線':'月線'}確認賣出方向 (+0.5分)</span>`;
    else if(weeklyBull || monthlyBull) mtfNote = `<span style="color:var(--yellow)">⚠️ 中長期偏多，短線超買後回調有限</span>`;
    else mtfNote = `<span style="color:var(--t2)">— 多時間框架方向中性</span>`;
  }

  // ══════════════════════════════════════════════
  //  主訊號判定（依加權分 buyW / sellW）
  // ══════════════════════════════════════════════
  let signal, sigColor, sigBg, sigIcon, sigDesc, sigLevel;
  if(buyW >= 5.5){
    signal='逢低買進'; sigIcon='📥'; sigLevel='極強';
    sigColor='var(--green)'; sigBg='rgba(16,185,129,.12)';
    sigDesc='多項超賣指標同時觸發＋量能/背離確認，歷史高勝率買點，積極分批布局';
  } else if(buyW >= 4.0){
    signal='逢低買進'; sigIcon='📥'; sigLevel='強烈';
    sigColor='var(--green)'; sigBg='rgba(16,185,129,.10)';
    sigDesc='多數超賣條件達標，可分批積極布局，務必設好停損';
  } else if(buyW >= 2.5 && buyW >= sellW){
    signal='買進醞釀中'; sigIcon='🟡'; sigLevel='成熟中';
    sigColor='var(--yellow)'; sigBg='rgba(245,158,11,.08)';
    sigDesc='部分超賣訊號浮現，可少量試探，等待更多條件確認再加碼';
  } else if(sellW >= 5.5){
    signal='逢高賣出'; sigIcon='📤'; sigLevel='極強';
    sigColor='var(--red)'; sigBg='rgba(239,68,68,.12)';
    sigDesc='多項超買指標同時觸發！高風險區域，建議積極減碼或全部離場';
  } else if(sellW >= 4.0){
    signal='逢高賣出'; sigIcon='📤'; sigLevel='強烈';
    sigColor='var(--red)'; sigBg='rgba(239,68,68,.10)';
    sigDesc='多數超買條件達標，建議分批減碼，逐步鎖定獲利';
  } else if(sellW >= 2.5 && sellW > buyW){
    signal='賣出醞釀中'; sigIcon='🟠'; sigLevel='成熟中';
    sigColor='#f97316'; sigBg='rgba(249,115,22,.08)';
    sigDesc='超買跡象浮現，可開始降低部位，留意下方支撐';
  } else {
    signal='觀望等待'; sigIcon='👀'; sigLevel='—';
    sigColor='var(--t2)'; sigBg='rgba(148,163,184,.06)';
    sigDesc='多空指標尚未到達極端值，維持觀望，等待更明確的進出場機會';
  }

  // ══════════════════════════════════════════════
  //  分批建倉/減倉邏輯表（依加權分）
  // ══════════════════════════════════════════════
  const stageTable = (score, isBuy) => {
    const trend = isBuy ? aboveMA60 : !aboveMA60;
    const stages = [
      { min:0,   max:1.4, pct:0,              action:'⏸ 觀望，不操作',                    col:'var(--t3)' },
      { min:1.5, max:2.4, pct:10,             action:'👀 關注，暫不入場',                  col:'var(--t2)' },
      { min:2.5, max:3.4, pct:trend?30:20,    action:trend?'🔸 試探 30%':'⚠️ 謹慎 20%（逆勢）', col:'var(--yellow)' },
      { min:3.5, max:4.9, pct:trend?60:35,    action:trend?'🔶 加碼至 60%':'⚠️ 謹慎 35%（逆勢）', col:trend?'var(--green2)':'var(--yellow)' },
      { min:5.0, max:6.9, pct:trend?80:50,    action:trend?'🟢 重倉 80%':'⚠️ 上限 50%（逆勢）',   col:trend?'var(--green)':'#f97316' },
      { min:7.0, max:10,  pct:trend?95:65,    action:trend?'🚀 積極布局 95%':'⚠️ 上限 65%（逆勢）', col:trend?'var(--green)':'#f97316' },
    ];
    return `
    <div style="margin-top:14px;border-radius:10px;overflow:hidden;border:1px solid var(--border)">
      <div style="background:var(--card2);padding:8px 14px;font-size:0.72rem;font-weight:700;color:var(--t2)">
        ${isBuy?'📊 分批建倉建議':'📊 分批減倉建議'}（加權分 ${score}/10）
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:0.75rem">
        ${stages.map(s => {
          const isAct = score >= s.min && score <= s.max;
          const bg    = isAct ? (isBuy?'rgba(16,185,129,.14)':'rgba(239,68,68,.14)') : 'transparent';
          const rng   = s.min === s.max ? s.min : s.min+'–'+s.max;
          return `<tr style="background:${bg};border-bottom:1px solid var(--border)">
            <td style="padding:6px 14px;color:var(--t3);white-space:nowrap">${rng} 分</td>
            <td style="padding:6px 14px;font-weight:${isAct?'800':'400'};color:${s.col}">${s.action}</td>
            <td style="padding:6px 14px;text-align:right;color:var(--t2)">${s.pct}%</td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
  };

  // ══════════════════════════════════════════════
  //  ATR 停損 / 目標
  // ══════════════════════════════════════════════
  const atrStopBuy    = cATR ? F.int(last - 1.5 * cATR) : '--';
  const atrTargetBuy  = cATR ? F.int(last + 2.5 * cATR) : '--';
  const atrStopSell   = cATR ? F.int(last + 1.5 * cATR) : '--';
  const atrTargetSell = cATR ? F.int(last - 2.5 * cATR) : '--';

  // ══════════════════════════════════════════════
  //  Pivot Point（S1/S2/PP/R1/R2）
  // ══════════════════════════════════════════════
  let pivotHtml = '';
  if(lastHigh && lastLow && last){
    const PP = (lastHigh + lastLow + last) / 3;
    const R1 = 2 * PP - lastLow;
    const R2 = PP + (lastHigh - lastLow);
    const S1 = 2 * PP - lastHigh;
    const S2 = PP - (lastHigh - lastLow);
    pivotHtml = `
    <div style="background:var(--card2);border-radius:10px;padding:14px 16px;margin-top:12px">

        🎯 Pivot 關卡（H=${F.int(lastHigh)} / L=${F.int(lastLow)} / C=${F.int(last)}）— S1/S2 是買進支撐、R1/R2 是賣出目標

      <div style="display:flex;gap:8px;flex-wrap:wrap">

  // ══════════════════════════════════════════════

  const w52Bar = (high52 && low52 && high52 > low52) ? (() => {

      <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--t3);margin-top:6px">
        <span style="color:var(--green)">52週低 <b>${F.int(low52)}</b></span>
        <span style="color:var(--t2)">現價 <b style="color:var(--t1)">${F.int(last)}</b></span>
        <span style="color:var(--red)">52週高 <b>${F.int(high52)}</b></span>
      </div>
    </div>`;
  })() : '';

  // ══════════════════════════════════════════════
  //  布林通道視覺化
  // ══════════════════════════════════════════════
  const bollPosPct = Math.min(100, Math.max(0, bollPosRaw * 100));

    <div style="position:relative;height:38px;border-radius:10px;overflow:hidden;
         background:linear-gradient(to right,
           rgba(16,185,129,.50) 0%,rgba(16,185,129,.22) 15%,rgba(52,211,153,.10) 33%,
           rgba(245,158,11,.07) 40%,rgba(245,158,11,.07) 60%,

      <span style="color:var(--red);text-align:right">📤 強賣區<br><b>${F.int(cBoll.upper)}</b></span>
    </div>` : '<div style="color:var(--t2);font-size:0.75rem">布林通道資料不足</div>';

  // ══════════════════════════════════════════════
  //  費波那契支撐壓力（從52週高低展開）
  // ══════════════════════════════════════════════
  const fibHtml = (high52 && low52 && high52 > low52) ? (() => {
    const r52 = high52 - low52;
    const fibs = [
      { pct:0,     price: low52,                  label:'0%（年低）',   type:'support', strong:true  },
      { pct:23.6,  price: low52 + 0.236 * r52,   label:'23.6%',       type:'support', strong:false },
      { pct:38.2,  price: low52 + 0.382 * r52,   label:'38.2%',       type:'support', strong:true  },
      { pct:50,    price: low52 + 0.500 * r52,   label:'50%（黃金）',  type:'neutral', strong:true  },
      { pct:61.8,  price: low52 + 0.618 * r52,   label:'61.8%（黃金）',type:'resist',  strong:true  },
      { pct:78.6,  price: low52 + 0.786 * r52,   label:'78.6%',       type:'resist',  strong:false },
      { pct:100,   price: high52,                 label:'100%（年高）', type:'resist',  strong:true  },
    ];
    const tol = cATR ? cATR * 0.6 : r52 * 0.012;
    const nearFib = fibs.find(f => Math.abs(last - f.price) <= tol);
    const nearLabel = nearFib
      ? `<span style="background:${nearFib.type==='support'?'rgba(16,185,129,.18)':nearFib.type==='resist'?'rgba(239,68,68,.18)':'rgba(245,158,11,.15)'};
           color:${nearFib.type==='support'?'var(--green)':nearFib.type==='resist'?'var(--red)':'var(--yellow)'};
           font-size:0.72rem;font-weight:800;padding:3px 10px;border-radius:20px">
           📍 現價貼近費波 ${nearFib.label}（${nearFib.type==='support'?'支撐區':nearFib.type==='resist'?'壓力區':'關鍵中樞'}）
         </span>` : '';
    return `
    <div style="background:var(--card2);border-radius:10px;padding:12px 16px;margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <span style="font-size:0.75rem;font-weight:700;color:var(--t2)">📐 費波那契關卡（從52週高低展開）</span>
        ${nearLabel}

      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${fibs.map(f => {
          const isNear = Math.abs(last - f.price) <= tol;
          const col = f.type==='support'?'var(--green)':f.type==='resist'?'var(--red)':'var(--yellow)';
          const bg  = isNear
            ? (f.type==='support'?'rgba(16,185,129,.22)':f.type==='resist'?'rgba(239,68,68,.22)':'rgba(245,158,11,.2)')

          return `<div style="flex:1;min-width:52px;background:${bg};border:1px solid var(--border);

            <div style="font-size:0.62rem;color:${col};font-weight:700">${f.label}</div>
            <div style="font-size:0.82rem;font-weight:800;color:var(--t1);margin-top:2px">${F.int(f.price)}</div>

  // ══════════════════════════════════════════════
  //  條件列元件（✅ 達標 / ⚠️ 早期警示 / ⏳ 未達標）
  // ══════════════════════════════════════════════
  const condRow = (ok, early, label, detail='') =>
    `<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
       <span style="font-size:1.1rem;margin-top:1px;flex-shrink:0">${ok?'✅':early?'⚠️':'⏳'}</span>
       <div>
         <div style="font-size:0.8rem;color:${ok?'var(--t1)':early?'var(--yellow)':'var(--t2)'};font-weight:${ok||early?'600':'400'}">${label}</div>
         ${detail?`<div style="font-size:0.68rem;color:var(--t3);margin-top:2px;line-height:1.5">${detail}</div>`:''}
       </div>
     </div>`;

  // ══════════════════════════════════════════════
  //  渲染輸出
  // ══════════════════════════════════════════════
  return `
  <div class="sec">💹 買賣訊號總覽 <span class="sec-cnt">KD · RSI · MACD · 布林 · 均線 · 量能 — 綠色＝買進訊號，紅色＝賣出訊號，數量越多代表訊號越強</span></div>
  <div class="sec" style="display:none">💹 逢高賣出 ／ 逢低買進 訊號

  <!-- ★★ 一眼看懂主橫幅 ★★ -->
  <div style="background:${sigBg};border:3px solid ${sigColor};border-radius:20px;padding:26px 28px;margin-bottom:14px">

    <!-- 頂部：大訊號 + 雙分數 -->

        ${sigLevel!=='—'?`<div style="display:inline-flex;align-items:center;margin-top:8px;background:${sigColor};color:#fff;padding:5px 16px;border-radius:20px;font-size:0.85rem;font-weight:700">訊號強度：${sigLevel}</div>`:''}

        <div style="font-size:2.8rem;font-weight:900;color:var(--red);line-height:1">${sellW}</div>

    <!-- 雙強度進度條 -->
    <div style="margin-bottom:16px">

        <span style="font-size:0.75rem;color:var(--t2);font-weight:700;min-width:68px">📥 買進</span>
        <div style="flex:1;background:var(--border);border-radius:6px;height:13px;overflow:hidden">

        ${condRow(rsiBuy, rsiEarly,

        ${condRow(kdBuy, kdEarly,
